        // Function to handle folder selection
        function selectFolder(folderName) {
            selectedFolder = folderName;
        
            // Show upload input only for the 'drs' folder
            if (folderName === 'lab') {
                divvv.style.display= 'flex';
                divvv.style.marginTop= '15px';
                fileInput.style.display = 'block';
                fileInput.style.marginRight = '5px';
                uploadButton.style.display = 'block';
            } else {
                divvv.style.display= 'none';
                fileInput.style.display = 'none';
                uploadButton.style.display = 'none';
            }
        
            // Fetch files for the selected folder
            fetchFiles();
        }

        // Modified to support multiple file uploads
        function uploadFile() {
            const files = fileInput.files;
            if (files.length === 0) {
                alert("No files selected for upload.");
                return;
            }

            const totalFiles = files.length;
            let currentFileIndex = 0;
            let totalProgress = 0; // Track total progress across files

            // Show progress bar
            const progressBarContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('fileUploadProgress');
            const progressText = document.getElementById('progressText');
            progressBarContainer.style.display = 'flex';

            // Function to upload each file one by one
            function uploadNextFile() {
                if (currentFileIndex < totalFiles) {
                    const file = files[currentFileIndex];
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('patient_no', patientNo);
                    formData.append('folder', selectedFolder); // Assign the current folder

                    // Create XMLHttpRequest to monitor upload progress for this file
                    const xhr = new XMLHttpRequest();

                    xhr.upload.onprogress = function(event) {
                        if (event.lengthComputable) {
                            const fileProgress = (event.loaded / event.total) * 100;
                            const overallProgress = totalProgress + (fileProgress / totalFiles);
                            progressBar.value = overallProgress;  // Update progress bar
                            progressText.textContent = `Uploading file ${currentFileIndex + 1} of ${totalFiles}: ${Math.round(overallProgress)}%`;
                        }
                    };

                    xhr.onreadystatechange = function() {
                        if (xhr.readyState == 4) {
                            if (xhr.status == 200) {
                                // Update total progress and move to the next file
                                totalProgress += 100 / totalFiles;
                                currentFileIndex++;

                                // Start uploading the next file
                                uploadNextFile();
                            } else {
                                alert('Error uploading file: ' + xhr.responseText);
                            }
                        }
                    };

                    // Set up request to POST the file
                    xhr.open('POST', `/uploadFile/${gid}/${patientNo}`, true);
                    xhr.send(formData);
                } else {
                    // Hide progress bar and reset when all files are uploaded
                    progressBarContainer.style.display = 'none';
                    progressBar.value = 0;
                    progressText.textContent = '';
                    fileInput.value = '';
                    fetchFiles();  // Refresh the file list after successful upload
                }
            }

            // Start uploading the first file
            uploadNextFile();
        }

        // Fetch files based on the selected folder
        function fetchFiles() {
            const folderQuery = selectedFolder === 'drs' ? 'drs' : selectedFolder; // Query for the current folder

            let url = `/${gid}/getFiles?patient_no=${patientNo}&folder=${folderQuery}`;  // Use query parameters

            //if (folderQuery === 'drs'){
            //    url = `/getFiles?patient_no=${patientNo}`;
            //}

            fetch(url, {
                method: 'GET'
            })
            .then(response => response.json())
            .then(files => {
                document.getElementById("filePreviews").innerHTML = '';
                renderFiles(files);
            })
            .catch(error => console.error('Error:', error));
        }

        // Render file previews
        function renderFiles(files) {
            files.forEach(file => {
                const fileElement = createFilePreviewElement(file);
                document.getElementById("filePreviews").appendChild(fileElement);
            });
        }

        // Delete file function (same as before)
        function deleteFile(fileUrl) {
            const isConfirmed = confirm("Are you sure you want to delete this file?");
            if (!isConfirmed) return;
        
            fetch(`/deleteFile?url=${encodeURIComponent(fileUrl)}`, { method: 'DELETE' })
            .then(response => {
                if (!response.ok) throw new Error(`Server error: ${response.statusText}`);
                return response.json();
            })
            .then(data => {
                console.log('File deleted successfully:', data);
                fetchFiles(); // Refresh the file list
            })
            .catch(error => console.error('Error deleting file:', error));
        }

        // Create a file preview element (same as before)
        function createFilePreviewElement(file) {
            const filePreview = document.createElement("div");
            filePreview.classList.add("file-preview");
        
            const fileLink = document.createElement("a");
            fileLink.href = file.data;
            fileLink.target = "_blank";
        
            let previewElement;
            if (file.file_type.includes('image')){
                previewElement = document.createElement("img");
                previewElement.src = file.data; // Use file URL
            }else if(file.file_type.includes('video')) {
                previewElement = document.createElement("video");
                previewElement.controls = true;
                previewElement.classList.add("vidPerv");
                previewElement.src = file.data; // Use file URL
            }else if (file.file_type.includes('text')) {
                previewElement = document.createElement("h3");
                previewElement.classList.add("txtPrev");
                previewElement.innerText = file.name; // Use file URL
            }else if (file.file_type.includes('pdf')) {
                previewElement = document.createElement("h3");
                previewElement.classList.add("txtPrev");
                previewElement.innerText = file.name; // Use file URL
            }else{
                previewElement = document.createElement("h3");
                previewElement.classList.add("txtPrev");
                previewElement.innerText = file.name; // Use file URL
            }
        
            const deleteBtn = document.createElement('span');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.onclick = () => deleteFile(file.data);
        
            fileLink.appendChild(previewElement);
            if (selectedFolder === 'lab') {
                filePreview.appendChild(deleteBtn);
            }
            filePreview.appendChild(fileLink);
            return filePreview;
        }
        </script>
