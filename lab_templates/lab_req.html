        <div class="main-frame">
            <div id="srchapp" class="datee">
                <input type="text" id="appointmentDate" class="date-picker">
                <button id="srchh" class="button srch">Search</button>
            </div>
            <div class="datee">
                <h4 id="appnum"></h4>
                <p>Appointments</p>
            </div>
            
            <div id="tags" class="lab-request">
                <h2 class="lab-request-item ">Name</h2>
                <h2 class="lab-request-item">Number</h2>
                <h2 class="lab-request-item">Phone</h2>
                <h2 class="lab-request-item ">Note</h2>
                <h2 class="lab-request-item "> </h2>
                <h2 class="lab-request-item "> </h2>

    <script>
        let appointments = []; 
        document.addEventListener("DOMContentLoaded", function() {
            const today = new Date().toISOString().split('T')[0];

            const menuBtn = document.querySelector('.hamburger-menu');
            const menuBox = document.querySelector('.menu__box');
            const menuBar = document.getElementById('menuBar');
            
            // Toggle menu and spin transition
            menuBtn.addEventListener('click', () => {
                menuBar.classList.toggle('menu-active');
            });

            document.getElementById("srchapp").addEventListener("click", function() {
                const selectedDate = document.getElementById('appointmentDate').value;
                get_appointments(selectedDate);
            });
        })

        function get_appointments(date) {
            console.log('hmm')
            fetch(`/srchlab/${date}`)
                .then(response => response.json())
                .then(data => {
                    console.log(data);  // Log the data to see its structure
                    const reqsDiv = document.getElementById("labRequests");
                    const appnumm = document.getElementById("appnum");
                    console.log("<p>No appointments found.</p>");
                
                    // Check if data is an array
                    if (Array.isArray(data)) {
                        // If it's an array, render the appointments
                        if (data.length === 0) {
                            console.log("<p>No appointments found.</p>");
                            reqsDiv.innerHTML = `
                            <div class="lab-request">
                            </div>`;
                            appnumm.textContent="0"
                        } else {
                            reqsDiv.innerHTML = data.map((req, index) => `
                                <div class="lab-request">
                                    <h3 class="lab-request-item">${req.name}</h3>
                                    <h3 class="lab-request-item">${req.no}</h3>
                                    <h3 class="lab-request-item">${req.phone}</h3>
                                    <textarea onchange="updateAppointment(${index}, 'msg', this.value)" class="lab-request-item inforeq">${req.msg}</textarea>
                                    <h2 class="lab-request-item "> </h2>
                                    <button class="button show-button" onclick="show(${index})">Show</button>
                                </div>
                            `).join('');
                            appnumm.textContent=`${data.length}`
                            appointments=data;
                        }
                    } else {
                        // Handle the case when data is not an array
                        reqsDiv.innerHTML = `
                        <div class="lab-request">
                        </div>`;
                    }
                })
                .catch(error => console.error('Error fetching appointments:', error));
        }

        function save() {
            console.log(`appointments :${appointments}`)
            // Send the updated appointments to the server
            const data = { appointments : appointments };
            fetch('/save_appointments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                console.log("Saved appointments successfully:", result);
                alert("Saved appointments successfully!")
            })
            .catch(error => console.error('Error saving:', error));
        }

        function updateAppointment(index, field, value) {
            // Update the specific field in the corresponding appointment
            appointments[index].msg = value;
        }
