<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/icn/icon.ico">
    <title>Activation options</title>
    <!-- Add your CSS styles or link external stylesheets here if needed -->
    <style>
        html{
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            width: 100%;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            width: 100%;
        }

        .plans-container {
            justify-items: center;
            justify-self: center;
            margin: 0;
            margin-top: 20px;
            display:grid;
            width: 75%;
            padding: 10px;
            grid-template-columns: repeat(auto-fit, minmax(10px, 1fr));
            height: 75%;
        }

        .plan {
            background: #abb0bb;
            padding: 20px;
            margin: 20px;
            height: 100%;
            /*width: 65%;*/
            margin-top: 5px;
            text-align: center;

            box-shadow: -5px 7px 7px 0px rgb(0, 0, 0);
            border-color: #000;
            border-radius: 5px;
            background-color: #abb0bb;
            padding: 25px;
            border: 1px solid #000;
        }

        .plan h2 {
            color: #000000;
        }

        p {
            color: #000000;
        }

        .button {
            background-color: #000;
            border: none;
            padding: 5px 10px;
            margin-top:5px;
            border-radius: 4.5px;
            font-size: 15px;
            cursor: pointer;
            color: rgb(255, 255, 255);
        }

        .plns{
            display:grid;
            justify-items: center;
            background: #8b8c8e;
            margin: 0;
            height: 100%;
            width: 100%;
        }

        #titel{
            height: 5%;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .plan ul {
            list-style: none;
            padding: 20px;
        }

        .plan li {
            color: #000000;
        }

        .subscribe-button {
            margin-top: 20px;
            padding: 10px;
            background: #FFFFFF;
            cursor: pointer;
            border: 2px;
            border-radius: 5px;
        }

        .actvbox{
            justify-items: center;
            margin-top: 10px;
        }

        input{
            height: 20px;
        }

        .uppln {
            height: 75%;
        }
    </style>
</head>
<body>
  <div class="plns">
   <!--h2 id="titel">sub plans</h2-->
    <div class="plans-container">
        <!-- pay optins
        <div class="plan">
            <div class="uppln">
            <h2>Get rid of Ads</h2>
            <div></div>
            </div>
            <a href="/pay_basic"><button class="button">PayPal</button></a>
        </div>-->

        <!-- Code -->
        <div class="plan">
            <h2>Secretary Code:</h2>
            <div class="actvbox">
                <input id="activationCodeInput" placeholder="XXXX-XXXX-XXXX"/>
                <button id="actvbtn" class="button" onclick="checkActivationCode()">Activate</button>
            </div>
        </div>
    </div>
  </div>
  <script>
    function checkActivationCode() {
        var activationCode = document.getElementById('activationCodeInput').value;
        console.log(activationCode);
        // Use fetch to send a request to your Flask server to check the code
        fetch('/chk_bcode', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ code: activationCode }),
        })
            .then(response => response.json())
            .then(data => {
                console.log(data);
                // Check the response data and redirect accordingly
                if (data.result === 'accepted') {
                    // Redirect to /pay_accepted
                    window.location.href = '/check_bcode';
                } else {
                    // Redirect to /pay_cancelled
                    console.log(activationCode);
                }
            })
            .catch((error) => {
                console.error('Error:', error);
            });
    }
</script>
</body>
</html>
