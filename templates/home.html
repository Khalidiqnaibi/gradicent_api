<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Binder Medical</title>
  
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: white;
      --text: #2b2b2b;
    }

    html,body {
      height: 100%;
      background: linear-gradient(180deg, var(--bg-main) 0%, #E6D6C0 60%);
      color: var(--text);
      -webkit-font-smoothing:antialiased;
    }

    /* Hamburger lines */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 26px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.28s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    /* Toggle open */
    .menu-active .menu__btn span {
      transform: rotate(45deg);
      background-color: var(--accent);
    }
    .menu-active .menu__btn span::before {
      transform: rotate(90deg);
      top: 0;
    }
    .menu-active .menu__btn span::after {
      opacity: 0;
    }

    /* Menu slide */
    .menu__box {
      transition: transform 0.28s cubic-bezier(.2,.9,.2,1), opacity 0.2s;
      transform: translateX(-110%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }

    /* Small touch-ups */
    .form-label { color: #44372f; font-weight: 600; }
    .decorative-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.62));
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 8px 28px rgba(18,18,18,0.08);
    }
  </style>
</head>
<body class="font-inter antialiased">

  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Page content -->
  <div class="ac-frame min-h-screen flex items-center justify-center px-6 py-12">
    <div class="bd max-w-3xl w-full decorative-card rounded-3xl p-8 sm:p-10 border border-[rgba(0,0,0,0.04)]">

      <!-- Header -->
      <div class="header mb-6 text-center">
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight" style="color: #2b2b2b;">Add A Patient</h1>
        <p class="mt-2 text-sm text-[rgba(0,0,0,0.55)]">Add patient details quickly — press Enter to jump between fields.</p>
      </div>

      <!-- Form -->
      <div class="main-frame">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Patient Name</label>
            <input id="PName" type="text" placeholder="Full name" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">ID Number</label>
            <input id="idnum" type="text" placeholder="National ID / MRN" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Phone Number</label>
            <input id="PNum" type="text" placeholder="+970 59 ..." class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Location</label>
            <input id="loc" type="text" placeholder="City / Clinic" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group sm:col-span-2">
            <label class="form-label block mb-1 text-sm">Medical History</label>
            <input id="medh" type="text" placeholder="PMH, chronic conditions..." class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Allergies</label>
            <input id="allergies" type="text" placeholder="e.g., Penicillin" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Blood Type</label>
            <input id="btype" type="text" placeholder="A+, O-, etc." class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Sex</label>
            <input id="sex" type="text" placeholder="M / F" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div class="form-group">
            <label class="form-label block mb-1 text-sm">Age</label>
            <input id="age" type="text" placeholder="Years" class="px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/80 w-full focus:outline-none focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

        </div>

        <!-- Add button -->
        <div class="mt-6 flex justify-center">
          <button class="add-patient-btn px-6 py-2 rounded-2xl bg-[var(--accent)] text-[var(--text)] font-semibold shadow-md hover:scale-[1.02] transition" onclick="add_btn()">
            Add
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    const entryWidgets = {};
    document.addEventListener("DOMContentLoaded", function() {
        // Initialize entryWidgets with references to input elements
        entryWidgets["PName"] = document.getElementById("PName");
        entryWidgets["idnum"] = document.getElementById("idnum");
        entryWidgets["PNum"] = document.getElementById("PNum");
        entryWidgets["loc"] = document.getElementById("loc");
        entryWidgets["medh"] = document.getElementById("medh");
        entryWidgets["allergies"] = document.getElementById("allergies");
        entryWidgets["btype"] = document.getElementById("btype");
        entryWidgets["sex"] = document.getElementById("sex");
        entryWidgets["age"] = document.getElementById("age");

        const menuBtn = document.querySelector('.hamburger-menu');
        const menuBar = document.getElementById('menuBar');

        // Toggle menu (keeps same interaction as previous)
        menuBtn.addEventListener('click', () => {
            menuBar.classList.toggle('menu-active');
        });

        const binder = '{{ binder }}';
        const appa = document.getElementById('appa');
        const appimg = document.getElementById('appimg');
        const apph6 = document.getElementById('apph6');
        var link = document.querySelector("link[rel~='icon']");

        if (binder === 'lab'){
            appa.title='Search Lab';
            appa.href='/srchlab';
            appimg.src='/static/images/srchlab.png';
            document.title= 'Binder Labratory';
            link.href = '/static/images/binderlab.jpg';
            apph6.textContent = 'Search Lab';
        }

        // Set up Enter navigation behavior for inputs
        Object.values(entryWidgets).forEach(widget => {
            widget.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    nextEntry(event, widget);
                }
            });
        });
    });

    function formatt() {
        const today = new Date().toISOString().split('T')[0];
        const d = new Date(today);
        let month = '' + (d.getMonth() + 1);
        let day = '' + d.getDate();
        const year = d.getFullYear()+1;

        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function get_info() {
        const PatientName = document.getElementById("PName");
        const idnum = document.getElementById("idnum");
        const PhoneNumber = document.getElementById("PNum");
        const loc = document.getElementById("loc");
        const medh = document.getElementById("medh");
        const age = document.getElementById("age");
        const btype = document.getElementById("btype");
        const sex = document.getElementById("sex");
        const allergies = document.getElementById("allergies");

        const fields = [
            PatientName,
            idnum,
            PhoneNumber,
            loc,
            medh,
            allergies,
            sex,
            btype,
            age
        ];

        var info = {
            "no":1,
            "name": PatientName.value,
            "id": idnum.value,
            "phone": PhoneNumber.value,
            "location": loc.value,
            "pmh": medh.value,
            "allergies":allergies.value,
            "payed": 0,
            "debit": 0,
            "age": age.value,
            "sex": sex.value,
            "div":"aha",
            "btype":btype.value,
            "visits": [
                {
                    "coast": 0,
                    "debit": 0,
                    "details": "",
                    "diagnosis": " ",
                    "lab": "",
                    "payed": 0,
                    "treatment": "",
                    "visit_date": formatt(),
                    "vno": 1
                }
            ]
        };

        for (let i = 0, len = fields.length; i < len; i++) {
            fields[i].value = "";
        }

        return info;
    }

    async function addPatient(data) {
        try {
            const response = await fetch('/addPatient', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                throw new Error('Network response was not ok');
            }else{
                const result = await response.json();
                console.log(result.message);
                window.location.href = `/meddata`;
            }

        } catch (error) {
            console.error('Error adding patient:', error);
            alert('Error adding patient. See console for details.');
        }
    }

    function add_btn() {
        var info = get_info();
        var data = {
            google_id: "{{ user_data.google_id }}",
            patient_info: info
        };
        if (info.name){
            addPatient(data);
        }else{
            alert(`Please provide a patient name` );
        }
    }

    function nextEntry(event, entryWidget) {
        try {
            const keyForWidget = Object.keys(entryWidgets).find(k => entryWidgets[k] === entryWidget);
            if (!['visit_date','search'].includes(keyForWidget)) {
                // special handling not present in this form — fall back to normal tabbing
                const nextWidget = getNextWidget(entryWidget);
                if (nextWidget) {
                    nextWidget.focus();
                    event.preventDefault();
                }
            }
        } catch (error) {
            console.error('Error in nextEntry function:', error);
        }
    }

    function getNextWidget(currentWidget) {
        const keys = Object.keys(entryWidgets);
        const currentKey = keys.find(k => entryWidgets[k] === currentWidget);
        const currentIndex = keys.indexOf(currentKey);

        if (currentIndex >= 0 && currentIndex < keys.length - 1) {
            return entryWidgets[keys[currentIndex + 1]];
        }
        return null;
    }
  </script>
</body>
</html>
