<body>
    <div id="menuBar">
        <a class="menuItem lll" href="/acc"><img class="icoo" src="/static/images/acc.png" alt="Account"><h6>Account</h6></a>

        <a class="menuItem" href="/srch"><img class="icoo" src="/static/images/sss.png" alt="Search"><h6>Search</h6></a>
        <a class="menuItem" href="/stats"><img class="icoo" src="/static/images/stst.png" alt="Stats"><h6>Stats</h6></a>
        <a class="menuItem" href="/settings"><img class="icoo" src="/static/images/sett.png" alt="Settings"><h6>Settings</h6></a>
    </div>

    <div id="topp-frame">
        <div class="ree">
            <div class="inpuu">
                <label for="details-entry">Visit Details:</label>
                <input type="text" id="details-entry" class="details-entry">
            </div>
        </div>
        <div class="ll" id="ll">
            <div class="checkbox-wrapper-3">
                <label for="show-date" class="checkbox-label">Date</label>
                <input type="checkbox" id="show-date" onclick="toggleDateEntries()" />
                <label for="show-date" class="toggle"><span></span></label>
            </div>
            <div class="checkbox-wrapper-3">
                <label for="show-visit-info" class="checkbox-label">Visit Info</label>
                <input type="checkbox" id="show-visit-info" onclick="toggleDateEntries()" />
                <label for="show-visit-info" class="toggle"><span></span></label>
            </div>
        </div>
    </div>

    <div id="mm-frame">
        <div id="search-entries">
            <div id="leftl-frame">
                <label for="start-date-entry">Start Date:</label>
                <input type="date" id="start-date-entry" class="date-entry">
            </div>
            <div id="rightr-frame">
                <label for="end-date-entry">End Date:</label>
                <input type="date" id="end-date-entry" class="date-entry">
            </div>
        </div>

        <div id="dropp-frame">
            <div id="left-frame">
                <div class="inpuu">
                    <label for="loc">Location:</label>
                    <input type="text" id="loc" class="input-field">
                </div>
                <div class="inpuu">
                    <label for="treatment">Treatment:</label>
                    <input type="text" id="treatment" class="input-field">
                </div>
            </div>

            <div id="right-frame">
                <div class="inpuu">
                    <label for="diagnosis">Diagnosis:</label>
                    <input type="text" id="diagnosis" class="input-field">
                </div>
                <div class="inpuu">
                    <label for="lab">Lab:</label>
                    <input type="text" id="lab" class="input-field">
                </div>
            </div>
        </div>
    </div>

    <div id="result-frame">
        <div class="ree">
            <div class="inpuu">
                <label for="totalPatients">Total Patients:</label>
                <input type="text" id="totalPatients" class="result-field">
            </div>
            <div class="inpuu">
                <label for="patientsWithDebit">Patients With Debit:</label>
                <input type="text" id="patientsWithDebit" class="result-field">
            </div>
        </div>
        <div class="ree" id="mo">
            <div class="inpuu">
                <label for="totalDebit">Total Debit:</label>

            </div>

            </div>
        </div>
    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const plan = '{{plan}}';
        let patss = [];

        function toggleDateEntries() {
            const showDateCheckbox = document.getElementById("show-date");
            const showVisitInfoCheckbox = document.getElementById("show-visit-info");
            const droppFrame = document.getElementById("dropp-frame");
            const dateFrame = document.getElementById("search-entries");
            const resultFrame = document.getElementById("result-frame");
            const searchButton = document.getElementById("searchButton");

            if (showDateCheckbox.checked && showVisitInfoCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                dateFrame.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "flex";
                droppFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else if (showDateCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else if (showVisitInfoCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                dateFrame.style.display = "none";
                droppFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "none";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            }
        }


        document.addEventListener("DOMContentLoaded", function() {

            if (plan === 'sec') {
                document.getElementById('mo').style.display = 'none';
            }

            document.getElementById("patients").style.display = 'none';

            document.getElementById("patients").addEventListener("click", function () {
                if (patss.length > 0) {
                    showpats();
                }
            });

            document.getElementById("searchButton").addEventListener("click", function () {
                ssearch();
            });


            const showDateCheckbox = document.getElementById("show-date");
            const showVisitInfoCheckbox = document.getElementById("show-visit-info");
            const droppFrame = document.getElementById("dropp-frame");
            const dateFrame = document.getElementById("search-entries");
            const resultFrame = document.getElementById("result-frame");
            const searchButton = document.getElementById("searchButton");


            resultFrame.style.display = "none";
            searchButton.style.display = "none";
            droppFrame.style.display = "none";
            dateFrame.style.display = "none";
            resultFrame.style.display = "flex";
            searchButton.style.display = "block";

            // Chart.js initialization for financial data
            const cctx = document.getElementById('mymyChart').getContext('2d');
            const mycChart = new Chart(cctx, {
                type: 'line',  // Changed to line chart
                data: {
                    labels: [],  // Empty initially, will be filled with dates
                    datasets: [{
                        label: 'Total Debit',
                        data: [],
                        borderColor: 'rgb(203 163 64)',
                        backgroundColor: 'rgb(255 182 0)',
                        borderWidth: 2
                    }, {
                        label: 'Total Payed',
                        data: [],
                        borderColor: 'rgb(96 56 196)',
                        backgroundColor: 'rgb(99 46 234)',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            function updatecChart(patients) {
                const labels = [];
                const debitData = [];
                const payedData = [];

                // Loop through patients and visits to calculate chart data
                patients.forEach(patient => {
                    patient.visits.forEach(visit => {
                        labels.push(visit.visit_date);  // Assuming visit_date is in a format suitable for the chart
                        debitData.push(visit.debit);
                        payedData.push(visit.payed);
                    });
                });

                // Update the chart with new data
                mycChart.data.labels = labels;
                mycChart.data.datasets[0].data = debitData;
                mycChart.data.datasets[1].data = payedData;
                mycChart.update();
            }

            // Chart.js initialization for patients data
            const ctx = document.getElementById('myChart').getContext('2d');
            const myChart = new Chart(ctx, {
                type: 'bar',  // Changed to line chart
                data: {
                    labels: [],  // Empty initially, will be filled with dates
                    datasets: [{
                        label: 'Total Patients',
                        data: [],
                        borderColor: 'rgb(52 160 196)',
                        backgroundColor: 'rgb(0 191 255)',
                        borderWidth: 2
                    }, {
                        label: 'Patients with Debit',
                        data: [],
                        borderColor: 'rgb(194 56 132)',
                        backgroundColor: 'rgb(252 4 140)',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            function updateChart(patients) {
                const datePatientCount = {};
                const datePatientWithDebitCount = {};

                // Loop through patients and visits to count the number of patients per date
                patients.forEach(patient => {
                    patient.visits.forEach(visit => {
                        const visitDate = visit.visit_date;

                        // Increment the count of patients for this visit date
                        if (datePatientCount[visitDate]) {
                            datePatientCount[visitDate]++;
                        } else {
                            datePatientCount[visitDate] = 1;
                        }

                        // Increment the count of patients with debit for this visit date
                        if (patient.debit > 0) {
                            if (datePatientWithDebitCount[visitDate]) {
                                datePatientWithDebitCount[visitDate]++;
                            } else {
                                datePatientWithDebitCount[visitDate] = 1;
                            }
                        }
                    });
                });

                // Extract labels (unique dates) and data (number of patients per date)
                const labels = Object.keys(datePatientCount).sort(); // Sort dates for a better display
                const totalPatientsData = labels.map(date => datePatientCount[date]);
                const totalPatientsWithDebitData = labels.map(date => datePatientWithDebitCount[date] || 0);

                // Update the chart with the new data
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = totalPatientsData;
                myChart.data.datasets[1].data = totalPatientsWithDebitData;
                myChart.update();
            }

            // Search functionality
            function ssearch() {
                const searchParams = {
                    startDate: document.getElementById("start-date-entry").value,
                    endDate: document.getElementById("end-date-entry").value,
                    details: document.getElementById("details-entry").value,
                    location: document.getElementById("loc").value,
                    treatment: document.getElementById("treatment").value,
                    diagnosis: document.getElementById("diagnosis").value,
                    lab: document.getElementById("lab").value,
                    showDate: document.getElementById("show-date").checked,
                    showVisitInfo: document.getElementById("show-visit-info").checked
                };

                fetch('/ssearch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(searchParams)
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data)
                    document.getElementById('totalPatients').value = data.total_customers;
                    document.getElementById('patientsWithDebit').value = data.unpaid_customers;
                    document.getElementById('totalDebit').value = data.total_debit;
                    document.getElementById('totalPayed').value = data.total_payed;
                    document.getElementById("patients").style.display = 'block';
                    patss = data.patients;

                    // Update charts with only the patients returned from the search
                    updateChart(data.patients);
                    updatecChart(data.patients);
                })
                .catch(error => console.error('Error:', error));
            }

            function showpats() {
                window.location.href = `/search_stats`;
            }
        });
    </script>

</body>
</html>
