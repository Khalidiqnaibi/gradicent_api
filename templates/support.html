        .checkbox-wrapper-3 input[type="checkbox"] {
          visibility: hidden;
          display: none;
        }
    
        .checkbox-wrapper-3 .toggle {
          position: relative;
          display: block;
          width: 40px;
          height: 20px;
          cursor: pointer;
          -webkit-tap-highlight-color: transparent;
          transform: translate3d(0, 0, 0);
        }
        .checkbox-wrapper-3 .toggle:before {
          content: "";
          position: relative;
          top: 3px;
          left: 3px;
          width: 34px;
          height: 14px;
          display: block;
          background: #9A9999;
          border-radius: 8px;
          transition: background 0.2s ease;
        }
        .checkbox-wrapper-3 .toggle span {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 20px;
            height: 20px;
            display: block;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(154, 153, 153, 0.5);
            transition: all 0.2s ease;
        }
        .checkbox-wrapper-3 {
            display: flex;
            width: 100%;
            justify-content: center;
        }
        .checkbox-wrapper-3 .toggle span:before {
          content: "";
          position: absolute;
          display: block;
          margin: -18px;
          width: 56px;
          height: 56px;
          background: rgb(0 0 0 / 78%);
          border-radius: 50%;
          transform: scale(0);
          opacity: 1;
          pointer-events: none;
        }
    
        .checkbox-wrapper-3 #cbx-3:checked + .toggle:before {
          background: #575757;
        }
        .checkbox-wrapper-3 #cbx-3:checked + .toggle span {
          background: #000;
          transform: translateX(20px);
          transition: all 0.2s cubic-bezier(0.8, 0.4, 0.3, 1.25), background 0.15s ease;
          box-shadow: 0 3px 8px rgba(79, 46, 220, 0.2);
        }
        .checkbox-wrapper-3 #cbx-3:checked + .toggle span:before {
          transform: scale(1);
          opacity: 0;
          transition: all 0.4s ease;
        }

    .menu__btn {
        position: fixed;
        top: 15px;
        left: 15px;
        width: 16px;
        height: 26px;
        cursor: pointer;
        z-index: 1;
    }
    
    .menu__btn > span,
    .menu__btn > span::before,
    .menu__btn > span::after {
        display: block;
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: #ffffff;
        transition-duration: .25s;
    }
    
    .menu__btn > span::before {
        content: '';
        top: -8px;
    }
    
    .menu__btn > span::after {
        content: '';
        top: 8px;
    }
    
    .menu__box {
        display: block;
        position: fixed;
        top: 0;
        left: -100%;
        width: 250px;
        height: 100%;
        margin: 0;
        padding: 80px 0;
        list-style: none;
        background-color: #abb0bb;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, .4);
        transition-duration: .25s;
    }
    
    .menu__item {
        display: flex;
        padding: 12px 24px;
        color: #333;
        font-family: 'Roboto', sans-serif;
        font-size: 20px;
        font-weight: 600;
        align-items: center;
        text-decoration: none;
        transition-duration: .25s;
    }
    
    .menu__item:hover {
        background-color: #CFD8DC;
    }
    
    /* Spin transition when menu is active */
    .menu-active .menu__btn > span {
        background-color: #000;
        transform: rotate(45deg);
    }
    
    .menu-active .menu__btn > span::before {
        background-color: #000;
        top: 0;
        transform: rotate(0deg);
    }
    
    .menu-active .menu__btn > span::after {
        background-color: #000;
        top: 0;
        transform: rotate(90deg);
    }
    
    .menu-active .menu__box {
        left: 0 !important;
    }
    
    .hamburger-menu {
        width: 100px;
        cursor: pointer;
    }
