<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Binder — Appointments</title>
  <link rel="icon" href="/static/images/w3.jpg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/utils.js"></script> <!-- contains safe_fetch -->

  <style>
    :root{
      --bg-1:#F2ECE6;
      --bg-2:#E6D6C0;
      --card:#FFFFFF;
      --muted:#6b7280;
      --accent:#ce7a35;
      --text:#0f172a;
    }

    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-1),var(--bg-2));font-family:Inter,-apple-system,system-ui;}
    .wrap{max-width:1100px;margin:48px auto;padding:20px;}
    .card{background:var(--card);padding:24px;border-radius:16px;box-shadow:0 12px 36px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04);}
    .input{padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,0.08);width:100%;font-size:15px;background:rgba(255,255,255,0.9);}
    .btn-primary{padding:10px 14px;border-radius:12px;background:linear-gradient(90deg,var(--accent),#cfa174);font-weight:700;color:#071620;border:none;cursor:pointer;}
    .btn-ghost{padding:8px 12px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,0.06);cursor:pointer;font-weight:600;color:#071620;}
    .slot{display:grid;grid-template-columns:200px 80px 120px 1fr auto;gap:12px;padding:14px;border-radius:14px;background:linear-gradient(180deg,#fff,#fbfbfb);border:1px solid rgba(0,0,0,0.05);}
    .slot h3{margin:0;font-size:16px;font-weight:700;color:var(--text);}
    .slot p{margin:0;font-size:13px;color:var(--muted);}
    @media(max-width:900px){.slot{grid-template-columns:1fr;}}

    #toasts{position:fixed;top:18px;right:18px;z-index:999;}

    /* --- hamburger --- */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 26px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.28s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after { content: ""; position: absolute; left: 0; }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    .menu-active .menu__btn span { transform: rotate(45deg); }
    .menu-active .menu__btn span::before { transform: rotate(90deg); top: 0; }
    .menu-active .menu__btn span::after { opacity: 0; }

    .menu__box {
      transition: transform 0.28s cubic-bezier(.2,.9,.2,1), opacity 0.2s;
      transform: translateX(-110%);
      opacity: 0;
    }
    .menu-active .menu__box { transform: translateX(0); opacity: 1; }
  </style>
</head>

<body>

<!-- LEFT MENU -->
<div id="menuBar" class="fixed top-4 left-4 z-50">
  <div class="hamburger-menu p-2">
    <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
      <span></span>
    </label>

    <ul class="menu__box absolute mt-3 left-0 w-64 bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-gray-200">
      <li><a href="/acc"      class="menu__item flex items-center gap-3 p-2">Account</a></li>
      <li><a href="/home_page" class="menu__item flex items-center gap-3 p-2">Add</a></li>
      <li><a href="/srch"     class="menu__item flex items-center gap-3 p-2">Search</a></li>
      <li><a href="/stats"    class="menu__item flex items-center gap-3 p-2">Stats</a></li>
      <li><a href="/appointments" class="menu__item flex items-center gap-3 p-2">Appointments</a></li>
      <li class="border-t border-gray-200 my-1"></li>
      <li><a href="/settings" class="menu__item flex items-center gap-3 p-2">Settings</a></li>
      <li><a href="/support"  class="menu__item flex items-center gap-3 p-2">Support</a></li>
    </ul>
  </div>
</div>

<div class="wrap">
  <div class="card">
    
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-5">
      <h1 class="text-2xl font-bold">Appointments</h1>
      <div class="flex gap-3 items-center">
        <div class="text-sm text-gray-500">Total</div>
        <div id="count" class="px-3 py-1 rounded-full bg-[var(--accent)] text-[#071620] font-bold">0</div>
        <button id="refresh" class="btn-ghost">Refresh</button>
        <button id="save" class="btn-primary">Save</button>
      </div>
    </div>

    <!-- DATE + FILTER -->
    <div class="flex gap-4 flex-col sm:flex-row mb-4">
      <div class="w-full sm:w-64">
        <label class="text-sm text-gray-500">Date</label>
        <input id="dateInput" type="date" class="input" />
      </div>

      <div class="flex gap-3 items-end">
        <select id="filter" class="input" style="width:170px;">
          <option value="all">All</option>
          <option value="has">With Note</option>
          <option value="none">No Note</option>
        </select>
        <button id="clear" class="btn-ghost">Clear notes</button>
      </div>
    </div>

    <!-- APPOINTMENT LIST -->
    <div id="list" class="flex flex-col gap-3"></div>

    <div id="empty" class="hidden flex justify-center bg-white/60 rounded-lg p-8 text-gray-500 border border-gray-200">
      No appointments.
    </div>

  </div>
</div>

<div id="toasts"></div>

<script>

// -------------------------------------------------------------
// Helper
// -------------------------------------------------------------
function $(id){ return document.getElementById(id); }

function toast(msg,type='info'){
  const wrap=$("toasts");
  const t=document.createElement("div");
  t.textContent=msg;
  t.style.padding="10px 14px";
  t.style.borderRadius="10px";
  t.style.marginTop="6px";
  t.style.color="white";
  t.style.fontWeight="600";
  t.style.background=type==='error'?'#dc2626':type==='success'?'#059669':'#1e3a8a';
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),300);},2600);
}

function todayISO(){
  const d=new Date();
  d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
}

// -------------------------------------------------------------
// USER (Binder Authentication)
// -------------------------------------------------------------
let CURRENT_USER_ID = null;
let CURRENT_DOMAIN = "medical"; // can be dynamic

async function getCurrentUser(){
  const r = await u.safe_fetch("/api/auth/me");
  return r.data;
}

// -------------------------------------------------------------
// API BINDER
// -------------------------------------------------------------
async function api_getAppointments(date){
  const url = `/api/binder/appointments/${date}?domain=${CURRENT_DOMAIN}&user_id=${CURRENT_USER_ID}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error("Failed");
  return r.json();
}

async function api_save(date, appointments){
  const url = `/api/binder/appointments/${date}?domain=${CURRENT_DOMAIN}&user_id=${CURRENT_USER_ID}`;
  const r = await fetch(url,{
    method:"PATCH",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ appointments })
  });
  if(!r.ok) throw new Error("Save failed");
  return r.json();
}

async function api_lock(no){
  const url = `/api/binder/appointments/lock`;
  const r = await fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      no: no,
      user_id: CURRENT_USER_ID,
      domain: CURRENT_DOMAIN
    })
  });
  if(!r.ok) throw new Error("Lock failed");
}

// -------------------------------------------------------------
// STATE
// -------------------------------------------------------------
let APPOINTMENTS = [];

// -------------------------------------------------------------
// Rendering
// -------------------------------------------------------------
function render(){
  const list = $("list");
  const empty = $("empty");
  const filter = $("filter").value;

  list.innerHTML = "";

  const filtered = APPOINTMENTS.filter(a=>{
    const has = a.msg?.trim().length > 0;
    if(filter==="has") return has;
    if(filter==="none") return !has;
    return true;
  });

  $("count").textContent = filtered.length;

  if(filtered.length === 0){
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  filtered.forEach(a=>{
    const slot = document.createElement("div");
    slot.className="slot";

    slot.innerHTML = `
      <div>
        <h3>${a.name||"Unknown"}</h3>
        <p>No. ${a.no||""}</p>
      </div>
      <div class="text-sm text-gray-600">${a.no||""}</div>
      <div class="text-sm text-gray-600">${a.phone||""}</div>
      <div><textarea class="input" style="min-height:70px;">${a.msg||""}</textarea></div>
      <div class="flex flex-col gap-2">
        <button class="btn-ghost show">Show</button>
        <button class="btn-ghost lock">Lock</button>
      </div>
    `;

    slot.querySelector("textarea").addEventListener("input",e=>{
      a.msg = e.target.value;
    });

    slot.querySelector(".show").onclick=()=>location.href=`/show_search_by_number/${a.no}`;
    slot.querySelector(".lock").onclick=async()=>{
      try{
        await api_lock(a.no);
        toast("Locked","success");
      }catch{ toast("Failed","error"); }
    };

    list.appendChild(slot);
  });
}

// -------------------------------------------------------------
// Load Appointments
// -------------------------------------------------------------
async function load(date){
  try{
    const res = await api_getAppointments(date);
    APPOINTMENTS = res.data?.appointments || [];

    APPOINTMENTS = APPOINTMENTS.map(a=>({...a, msg:a.msg||""}));

    render();
    toast("Loaded","success");
  }catch{
    APPOINTMENTS = [];
    render();
    toast("Failed","error");
  }
}

// -------------------------------------------------------------
// Save
// -------------------------------------------------------------
async function save(){
  const date = $("dateInput").value;
  try{
    await api_save(date, APPOINTMENTS);
    toast("Saved","success");
    load(date);
  }catch{
    toast("Failed","error");
  }
}

// -------------------------------------------------------------
// Menu
// -------------------------------------------------------------
function menu_init(){
  const menuBtn=document.querySelector('.hamburger-menu');
  const menuBar=document.getElementById('menuBar');

  menuBtn.onclick = ()=> menuBar.classList.toggle('menu-active');

  document.addEventListener("click",e=>{
    if(!menuBar.contains(e.target)) menuBar.classList.remove('menu-active');
  });
}

// -------------------------------------------------------------
// Page Init
// -------------------------------------------------------------
(async function init(){
  menu_init();

  const user = await getCurrentUser();
  CURRENT_USER_ID = user.id;
  CURRENT_DOMAIN = user.domain || "medical";

  $("dateInput").value = todayISO();
  load($("dateInput").value);

  $("refresh").onclick = ()=> load($("dateInput").value);
  $("save").onclick    = save;
  $("filter").onchange = render;
  $("clear").onclick   = ()=>{
    APPOINTMENTS.forEach(a=> a.msg="");
    render();
    toast("Cleared (local)","info");
  };
})();
</script>
</body>
</html>
