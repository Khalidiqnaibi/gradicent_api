<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Binder Medical</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <style>
    /* Custom palette mapped into Tailwind */
    :root {
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: white;
    }

    body {
      background-color: var(--bg-main);
    }

    /* Hamburger lines */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 25px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.3s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    /* Toggle open */
    .menu-active .menu__btn span {
      transform: rotate(45deg);
      background-color: var(--accent);
    }
    .menu-active .menu__btn span::before {
      transform: rotate(90deg);
      top: 0;
    }
    .menu-active .menu__btn span::after {
      opacity: 0;
    }

    /* Menu transitions */
    .menu__box {
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateX(-100%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen font-sans text-gray-800">

   <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Account Frame -->
  <div class="ac-frame flex items-center justify-center min-h-screen px-6">
    <div class="bd max-w-lg w-full bg-white/80 backdrop-blur-md shadow-xl rounded-3xl p-8 space-y-6 border border-[var(--secondary)]">
      
      <!-- Header -->
      <div class="header text-center">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Account</h1>
      </div>

      <!-- Main -->
      <div class="main-frame space-y-3 text-center">
        <h3 id="hello" class="text-xl font-semibold text-[var(--secondary)]">Hello Khalid Qnabi!</h3>
        <h3 id="msg" class="text-gray-700">Thank you for supporting us</h3>
      </div>

      <!-- Buttons -->
      <div class="btns flex justify-center gap-4 pt-4">
        <button id="btn1" onclick="opentab(btn1herf)" class="px-5 py-2 rounded-xl bg-[var(--accent)] text-gray-900 font-semibold shadow-md hover:shadow-lg hover:scale-105 transition">
          Get full version
        </button>
        <button id="btn2" onclick="opentab(btn2herf)" class="px-5 py-2 rounded-xl bg-[var(--secondary)] text-white font-medium shadow-md hover:bg-opacity-90 hover:scale-105 transition">
          Switch account
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts (unchanged from your code except styling tweaks apply automatically) -->
  <script>
    var btn1herf = 'https://www.google.com';
    var btn2herf = "https://www.google.com/search?q=potato&tbm=isch";

    function calculateTrialDaysLeft(plan,firstDateStr) {
        if (plan=== "free"){
            try {
                const firstDate = new Date(firstDateStr);
                const today = new Date();
                const trialDuration = 7 * 24 * 60 * 60 * 1000;
                const trialEndDate = new Date(firstDate.getTime() + trialDuration);
                return Math.max(0, Math.ceil((trialEndDate - today) / (1000 * 60 * 60 * 24)));
            } catch (error) { return 0; }
        } else if (plan === "basic") {
            try {
                const firstDate = new Date(firstDateStr);
                const today = new Date();
                const trialDuration = 30 * 24 * 60 * 60 * 1000;
                const trialEndDate = new Date(firstDate.getTime() + trialDuration);
                return Math.max(0, Math.ceil((trialEndDate - today) / (1000 * 60 * 60 * 24)));
            } catch (error) { return 0; }
        }
    }

    function opentab(url) { window.location.href = url; }

    window.addEventListener('DOMContentLoaded', async () => {
      const menuBtn = document.querySelector('.hamburger-menu');
      const menuBar = document.getElementById('menuBar');
      menuBtn.addEventListener('click', () => {
          menuBar.classList.toggle('menu-active');
      });

      try {
          const userData = JSON.parse('{{ user_data | tojson | safe }}');
          const { name, first, payed, plan } = userData;
          const trialDaysLeft = calculateTrialDaysLeft(plan,first);
          const trialStatus = trialDaysLeft > 0 ? "gud" : "bad";

          const HH = document.getElementById("hello");
          const Msg = document.getElementById("msg");
          const Btn1 = document.getElementById("btn1");
          const Btn2 = document.getElementById("btn2");

          const binder = '{{ binder }}';
          const appa = document.getElementById('appa');
          const appimg = document.getElementById('appimg');
          const apph6 = document.getElementById('apph6');
          var link = document.querySelector("link[rel~='icon']");
      
          if (binder === 'lab'){
              appa.title='Search Lab';
              appa.href='/srchlab';
              appimg.src='/static/images/srchlab.png';
              document.title= 'Binder Labratory'
              link.href = '/static/images/binderlab.jpg';
              apph6.textContent = 'Search Lab';
          }

          if (userData.google_id === 1) {
              HH.textContent = "Please sign up with Google";
              Msg.textContent = "";
              Btn1.textContent = "Sign Up with Google";
              btn1herf = "/logme";
              Btn2.style.display = "none";
          } else if (plan === "free" && trialStatus === "gud") {
              HH.textContent = `Welcome, ${name}`;
              Msg.textContent = "Have a nice day";
              Btn2.style.display = "inline-block";
              Btn1.textContent = "Log out";
              btn1herf = "/logout";
              btn2herf = "/logme";
          } else {
              HH.textContent = `Welcome, ${name}`;
              Msg.textContent = "Thank you for supporting us";
              Btn2.style.display = "inline-block";
              Btn1.textContent = "Log out";
              btn1herf = "/logout";
              btn2herf = "/logme";
          }
      } catch (error) {
          console.error('Error initializing app:', error);
      }
    });
  </script>
</body>
</html>
