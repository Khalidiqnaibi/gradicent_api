    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#menuBar {
    display: flex;
    background-color: #000;
    border-bottom: 2px solid #000;
    position: fixed;
    width: 100%;
}

a {
    text-decoration: none;
    color: inherit;
}

.menuItem {
    font-size: 16px;
    color: #abb0bb;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 15px;
}

.menuItem:hover {
    background-color: #fff;
    color: #333;
}

.menuItem:hover  .icoo{
    filter: invert(0);
}

.icoo{
    filter: invert(1);
    width: 25px;
    height: 25px;
}

.ac-frame {
    display: flex;
    flex-direction: column;

    justify-content: center;

    background-image:url("/static/images/home.jpg");
}

.bdo {
    background-color: #000;

}

.bd {
    width: 300px;
    height: 450px;
    display:grid;
    background-color: #abb0bb;
    border: 1.5px solid #000;
    padding: 5px;
    border-radius: 5px;
    box-shadow: -5px 7px 7px 0px rgb(0, 0, 0);

}

.header {
    justify-self: center;
    text-align: center;
    width: 85%;
    background-color:#abb0bb;
    padding: 22px 0 20px;
    margin-bottom: 20px;
}

h1 {
    font-size: 30px;
    margin: 0;
}

.main-frame {
    background-color: #abb0bb;
    padding: 5px 20px;
}

.form-group {
    display: flex;
    margin-bottom: 30px;
    text-align: center;
    justify-content: center;
}

label {
    font-size: 17px;
    margin-right: 5px;
}

.form-input {
    width: 175px;
    padding: 5px;
    line-height: 1.5;
    font-size: 13px;
    outline: none;
    border: 1px solid #000;
    border-radius: 2.5px;
}


.btns{
    height: 60%;
    display: flex;
    justify-content: space-evenly;
    margin-bottom: 10px;
}

#btn1,#btn2{
    justify-self: center;
    background-color: #000;
    border: none;
    padding: 5px 10px;
    width: 100%;
    border-radius: 4.5px;
    font-size: 15px;
    cursor: pointer;
    color: rgb(255, 255, 255);
}
a.menuItem {
    display: flex;
    flex-direction: column;
    align-items: center;

}

h6 {
    margin: 0px;

    <title>Binder Medical</title>
</head>
<body>
    <div id="menuBar">
        <a class="menuItem lll" title="Account" href="/acc"><img class="icoo" src="/static/images/acc.png" title="Account" alt="Account"><h6>Account</h6></a>
        <a class="menuItem" title="Add" href="/home_page"><img class="icoo" src="/static/images/hoo.png" title="Add" alt="Add"><h6>Add</h6></a>
        <a class="menuItem" title="Search"  href="/srch"><img class="icoo" src="/static/images/sss.png" title="Search"  alt="Search"><h6>Search</h6></a>
        <a class="menuItem" title="Stats" href="/stats"><img class="icoo" src="/static/images/stst.png" title="Stats" alt="Stats"><h6>Stats</h6></a>
        <a class="menuItem" title="Settings" href="/settings"><img class="icoo" src="/static/images/sett.png" title="Settings" alt="Settings"><h6>Settings</h6></a>
        <a class="menuItem" title="support" href="/support"><img class="icoo" src="/static/images/supp.png" title="support" alt="support"><h6>support</h6></a>
    </div>
    <div class="ac-frame">
        <div class="background">
            <!-- Background image -->
        </div>
            <div class="bd">
                <div class="header">
                    <h1>Account</h1>
                </div>
                <div class="main-frame">
                    <!-- Patient form fields go here -->
                    <div class="form-group">
                        <h3 id="hello">Hello Khalid Qnabi!</h3>
                    </div>
                    <div class="form-group">
                        <h3 id="msg">Thank you for supporting us</h3>
                    </div>
                </div>
                <div class="btns">
                    <button id="btn1" class="non" onclick="opentab(btn1herf)">Get full version</button>
                    <button id="btn2" class="non" onclick="opentab(btn2herf)">Switch account</button>
                </div>

        </div>
    </div>

    <script>
        var btn1herf = 'https://www.google.com';
        var btn2herf = "https://www.google.com/search?client=opera&hs=a7O&sca_esv=a56599857971a1ee&sca_upv=1&sxsrf=ACQVn0-wUK10bMtc0-jHwLG5RZwUQWhZbQ:1707302539870&q=potato&tbm=isch&source=lnms&sa=X&ved=2ahUKEwiduabLhZmEAxVucvEDHW7IC1MQ0pQJegQIDBAB&biw=1278&bih=588&dpr=1.5";

        function calculateTrialDaysLeft(plan,firstDateStr) {
            
            if (plan=== "free"){
                try {
                    const firstDate = new Date(firstDateStr);
                    const today = new Date();
                    const trialDuration = 7 * 24 * 60 * 60 * 1000; // 7 days in milliseconds
                    const trialEndDate = new Date(firstDate.getTime() + trialDuration);
                    const daysLeft = Math.max(0, Math.ceil((trialEndDate - today) / (1000 * 60 * 60 * 24))); // Convert milliseconds to days
                    return daysLeft;
                } catch (error) {
                    return 0;
                }
            }else if (plan === "basic") {
                try {
                    const firstDate = new Date(firstDateStr);
                    const today = new Date();
                    const trialDuration = 30 * 24 * 60 * 60 * 1000; // 7 days in milliseconds
                    const trialEndDate = new Date(firstDate.getTime() + trialDuration);
                    const daysLeft = Math.max(0, Math.ceil((trialEndDate - today) / (1000 * 60 * 60 * 24))); // Convert milliseconds to days
                    return daysLeft;
                } catch (error) {
                    return 0;
                }
            }
        }

        function opentab(url) {
            window.location.href =url;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const userData = JSON.parse('{{ user_data | tojson | safe }}'); // Replace with actual Google ID
                const { name, first, payed, plan } = userData;
                const trialDaysLeft = calculateTrialDaysLeft(plan,first);
                const trialStatus = trialDaysLeft > 0 ? "gud" : "bad";

                const HH = document.getElementById("hello");
                const Msg = document.getElementById("msg");
                const Btn1 = document.getElementById("btn1");
                const Btn2 = document.getElementById("btn2");

                console.log(userData);
                console.log(trialDaysLeft);

                if (userData.google_id === 1) {
                    HH.textContent = "Please sign up with Google";
                    Msg.textContent = "";
                    Btn1.textContent = "Sign Up with Google";
                    btn1herf = "/logme";
                    Btn2.style.display = "none";
                } else if (plan === "free" && trialStatus === "gud") {
                    HH.textContent = `Welcome, ${name}`;
                    Msg.textContent = "have a nice day";//`Trial ends in ${trialDaysLeft} days`;
                    Btn2.style.margin = "5px";
                    Btn2.style.display = "inline-block";
                    Btn1.textContent = "Log out";
                    Btn1.style.margin = "5px";
                    btn1herf = "/logout";
                    btn2herf = "/logme";
                } else if (plan === "free" && trialStatus === "bad") {
                    HH.textContent = `Welcome, ${name}`;
                    Msg.textContent = "Have a nice day";//"Subscription has ended\n Please pay to continue using the app";
                    Btn2.style.display = "inline-block";
                    Btn2.style.margin = "5px";
                    Btn1.textContent = "Log out";
                    Btn1.style.margin = "5px";
                    btn1herf = "/logout";
                    btn2herf = "/logme";
                }else if (plan === "fam") {
                    HH.textContent = `Welcome, ${name}`;
                    Msg.textContent = "Have a nice day 🙂";
                    Btn2.style.display = "inline-block";
                    Btn1.style.display = "none";
                    btn2herf = "/logme";
                } else {
                    HH.textContent = `Welcome, ${name}`;
                    Msg.textContent = `Thank you for supporting us \n Subscription ends in ${trialDaysLeft} days`; // Assuming payed is available in user data
                    Btn2.style.display = "inline-block";
                    Btn1.textContent = "Log out";
                    Btn1.style.margin = "5px";
                    btn1herf = "/logout";
                    btn2herf = "/logme";
                }
            } catch (error) {
                console.error('Error initializing app:', error);
            }
        });

    </script>
</body>
</html>
