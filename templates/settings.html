    .checkbox-wrapper-3 input[type="checkbox"] {
      visibility: hidden;
      display: none;
    }
  
    .checkbox-wrapper-3 .toggle {
      position: relative;
      display: block;
      width: 40px;
      height: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transform: translate3d(0, 0, 0);
    }
    .checkbox-wrapper-3 .toggle:before {
      content: "";
      position: relative;
      top: 3px;
      left: 3px;
      width: 34px;
      height: 14px;
      display: block;
      background: #9A9999;
      border-radius: 8px;
      transition: background 0.2s ease;
    }
    .checkbox-wrapper-3 .toggle span {
        position: absolute;
        top: 5px;
        left: 5px;
        width: 20px;
        height: 20px;
        display: block;
        background: white;
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(154, 153, 153, 0.5);
        transition: all 0.2s ease;
    }
    .checkbox-wrapper-3 {
        display: flex;
        width: 100%;
        justify-content: center;
    }
    .checkbox-wrapper-3 .toggle span:before {
      content: "";
      position: absolute;
      display: block;
      margin: -18px;
      width: 56px;
      height: 56px;
      background: rgb(0 0 0 / 78%);
      border-radius: 50%;
      transform: scale(0);
      opacity: 1;
      pointer-events: none;
    }
  
    .checkbox-wrapper-3 #cbx-3:checked + .toggle:before {
      background: #575757;
    }
    .checkbox-wrapper-3 #cbx-3:checked + .toggle span {
      background: #000;
      transform: translateX(20px);
      transition: all 0.2s cubic-bezier(0.8, 0.4, 0.3, 1.25), background 0.15s ease;
      box-shadow: 0 3px 8px rgba(79, 46, 220, 0.2);
    }
    .checkbox-wrapper-3 #cbx-3:checked + .toggle span:before {
      transform: scale(1);
      opacity: 0;
      transition: all 0.4s ease;
    }

    <script>
        const plan = '{{plan}}';
        document.addEventListener("DOMContentLoaded", function() {
            if (plan === 'sec') {
                document.getElementById("ccc").style.display='none';
                console.log('ya')
            }
            console.log(plan)

            fetch(`/getsett`)
                .then(response => response.json())
                .then(sett => {
                    console.log(sett)
                    populatesettingsData(sett);
                })
                .catch(error => console.error('Error fetching settings data:', error));

            // Initialize code visibility
            let isVisible = false;

            // Toggle visibility
            document.getElementById("toggle-visibility").addEventListener("click", function(event) {
                event.preventDefault();
                isVisible = !isVisible;
                const codeInput = document.getElementById("code");
                const visibilityIcon = document.getElementById("visibility-icon");

                if (isVisible) {
                    visibilityIcon.src = "/static/images/blind.png";
                    codeInput.type = "text";
                } else {
                    visibilityIcon.src = "/static/images/see.png";
                    codeInput.type = "password";
                }
            });

            // Make the code input read-only
            document.getElementById("code").readOnly = true;
                
            // Fetch new code and place it in the input
            document.getElementById("refresh-code").addEventListener("click", function(event) {
                event.preventDefault();
                fetchNewCode();
            });
        
            function fetchNewCode() {
                const currentCode = document.getElementById("code").value;
            
                fetch('/codesec', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code: currentCode })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code) {
                        document.getElementById("code").value = data.code;
                    } else {
                        console.error('Error fetching new code:', data.error);
                    }
                })
                .catch(error => console.error('Error fetching new code:', error));
            }
        });

        function populatesettingsData(sett) {
            document.getElementById("cbx-3").checked = sett.send;
            document.getElementById("pkey").value = sett.pkey;
            document.getElementById("drname").value = sett.drname;
            document.getElementById("msg").value = sett.msg;
            document.getElementById("code").value = sett.ac.code;
        }
