<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings — Binder Medical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: #e6ded9;
      --text: #2b2b2b;
    }
    body {
      background: linear-gradient(180deg, var(--bg-main), #f4e9df 65%);
      font-family: Inter, system-ui, sans-serif;
    }
    /* Hamburger lines */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 25px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.3s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    /* Toggle open */
    .menu-active .menu__btn span {
      transform: rotate(45deg);
      background-color: var(--accent);
    }
    .menu-active .menu__btn span::before {
      transform: rotate(90deg);
      top: 0;
    }
    .menu-active .menu__btn span::after {
      opacity: 0;
    }

    /* Menu transitions */
    .menu__box {
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateX(-100%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }

    /* Toggle styles tuned to palette */
    .checkbox-wrapper-3 .toggle:before {
      background: #9A9999;
    }
    .checkbox-wrapper-3 #show-date:checked + .toggle:before,
    .checkbox-wrapper-3 #show-visit-info:checked + .toggle:before {
      background: var(--secondary);
    }
    .checkbox-wrapper-3 #show-date:checked + .toggle span,
    .checkbox-wrapper-3 #show-visit-info:checked + .toggle span {
      background: #fff;
      transform: translateX(20px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Settings Card -->
  <div class="flex items-center justify-center min-h-screen px-6">
    <div class="max-w-2xl w-full bg-white/85 backdrop-blur-md shadow-xl rounded-3xl p-8 border border-[var(--secondary)] space-y-6">
      <h1 class="text-3xl font-bold text-center text-gray-900">Settings</h1>

      <div class="space-y-4">
        <!-- Clinic Name -->
        <div class="flex items-center justify-between">
          <label class="font-medium">Clinic name:</label>
          <input id="drname" type="text" class="w-2/3 px-3 py-2 border rounded-lg">
        </div>

        <!-- Reminder Message -->
        <div class="flex items-center justify-between">
          <label class="font-medium">Reminder message:</label>
          <input id="msg" type="text" class="w-2/3 px-3 py-2 border rounded-lg">
        </div>

        <!-- Country Key -->
        <div class="flex items-center justify-between">
          <label class="font-medium">Country key:</label>
          <input id="pkey" type="text" class="w-2/3 px-3 py-2 border rounded-lg">
        </div>

        <!-- Permission Code -->
        <div id="ccc" class="space-y-2">
          <label class="font-medium">Permission code:</label>
          <div class="flex items-center gap-2">
            <input id="code" type="password" class="flex-1 px-3 py-2 border rounded-lg" readonly>
            <button id="toggle-visibility" class="p-2 bg-[var(--secondary)]/80 rounded-lg"><img id="visibility-icon" src="/static/images/see.png" class="w-5"></button>
            <button id="refresh-code" class="p-2 bg-[var(--accent)]/80 rounded-lg"><img src="/static/images/re.png" class="w-5"></button>
          </div>
        </div>

        <!-- Auto Reminder -->
        <div class="flex items-center gap-3">
        <label class="font-medium">Send auto reminder message:</label>
        
        <!-- Toggle -->
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="cbx-3" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-400 rounded-full peer peer-checked:bg-[var(--secondary)] transition-colors"></div>
            <div class="absolute left-0.5 top-0.5 bg-white w-5 h-5 rounded-full shadow-md transition-transform peer-checked:translate-x-5"></div>
        </label>
        </div>
 
      </div>

      <!-- Save Button -->
      <div class="pt-4 text-center">
        <button onclick="savePatientInfo()" class="px-6 py-2 bg-[var(--accent)] text-white font-semibold rounded-xl shadow hover:scale-105 transition">Save changes</button>
      </div>
    </div>
  </div>

  <script>
    const plan = '{{plan}}';
    const menuBtn=document.querySelector('.hamburger-menu');
    const menuBar=document.getElementById('menuBar');
    menuBtn.addEventListener('click',()=>menuBar.classList.toggle('menu-active'));

    const binder='{{ binder }}';
    if(binder==='lab'){
      const appa=document.getElementById('appa');
      const appimg=document.getElementById('appimg');
      const apph6=document.getElementById('apph6');
      const link=document.querySelector("link[rel~='icon']");
      appa.title='Search Lab';appa.href='/srchlab';appimg.src='/static/images/srchlab.png';
      apph6.textContent='Search Lab';document.title='Binder Laboratory';
      link.href='/static/images/binderlab.jpg';
      document.getElementById("namee").textContent="Lab name:";
    }

    if(plan==='sec'){document.getElementById("code").parentElement.style.display="none";}

    fetch(`/getsett`).then(r=>r.json()).then(sett=>{
      document.getElementById("cbx-3").checked=sett.send;
      document.getElementById("pkey").value=sett.pkey;
      document.getElementById("drname").value=sett.drname;
      document.getElementById("msg").value=sett.msg;
      document.getElementById("code").value=sett.ac.code;
    });

    let isVisible=false;
    document.getElementById("toggle-visibility").addEventListener("click",()=>{
      const codeInput=document.getElementById("code");
      const visibilityIcon=document.getElementById("visibility-icon");
      isVisible=!isVisible;
      codeInput.type=isVisible?"text":"password";
      visibilityIcon.src=isVisible?"/static/images/blind.png":"/static/images/see.png";
    });
    document.getElementById("refresh-code").addEventListener("click",()=>{
      fetch('/codesec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:document.getElementById("code").value})})
        .then(r=>r.json()).then(d=>{if(d.code){document.getElementById("code").value=d.code}})
    });

    function savePatientInfo(){
      const data={
        drname:document.getElementById("drname").value,
        msg:document.getElementById("msg").value,
        pkey:document.getElementById("pkey").value,
        code:document.getElementById("code").value,
        send:document.getElementById("cbx-3").checked
      };
      fetch('/updatesettings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({correctedPatientData:data})})
        .then(r=>r.json()).then(()=>alert('Settings saved successfully.'));
    }
  </script>
</body>
</html>
