<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="CdS-jnmDkiXrSvujf6OARsOgBIBGsMPk0GrTKOs2w2Q" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <title>Binder Medical</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: #e6ded9;
      --text: #2b2b2b;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--bg-main) 0%, #E6D6C0 60%);
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      margin: 0;
    }

    /* Hamburger + Menu */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display:block;
      width:28px;
      height:3px;
      background:var(--accent);
      border-radius:6px;
      transition:0.28s ease;
      position:relative;
    }
    .menu__btn span::before,
    .menu__btn span::after { content:""; position:absolute; left:0; }
    .menu__btn span::before { top:-8px; }
    .menu__btn span::after { top:8px; }

    .menu__box {
      transition: transform 0.28s cubic-bezier(.2,.9,.2,1), opacity .22s;
      transform: translateX(-110%);
      opacity: 0;
    }
    .menu-active .menu__box { transform: translateX(0); opacity: 1; }
    .menu-active .menu__btn span { transform: rotate(45deg); background:var(--accent); }
    .menu-active .menu__btn span::before { top:0; transform: rotate(90deg); }
    .menu-active .menu__btn span::after { opacity:0; }

    /* Cards / panels */
    .decorative-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,255,255,0.72));
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 10px 30px rgba(18,18,18,0.06);
      border-radius: 14px;
    }

    /* Result area background media */
    .result {
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      min-height: 48vh;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 12px;
    }

    .scrollbar {
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.6) rgba(0,0,0,0.1);
    }

    /* Keep inputs from causing overflow in flex containers */
    .flex-safe > * { min-width: 0; }

    /* The new hint box: placed above the media area (won't overlap) */
    #srchHint {
      margin-top: 0.75rem;
      font-size: 0.95rem;
      color: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 10px;
      background: linear-gradient(90deg, rgba(255,255,255,0.72), rgba(255,255,255,0.64));
      border: 1px solid rgba(0,0,0,0.03);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(90deg, var(--accent), rgb(207, 161, 117));
      color: #142022;
    }
    .btn-ghost {
      background: var(--secondary);
      color: #fff;
    }

    /* small hint icon */
    #srchHint .dot {
      width: 14px;
      height: 10px;
      background: var(--accent);
      border-radius: 90%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    /* Responsive tweaks */
    @media (min-width: 900px) {
      .layout-center { max-width: 1100px; margin: 48px auto; }
    }
    @media (max-width: 899px) {
      .result { min-height: 36vh; }
    }
  </style>
</head>
<body>

  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Page content -->
  <div class="layout-center px-6 py-10">
    <div class="decorative-card p-6 shadow-sm">
      <div class="flex flex-col md:flex-row items-start gap-4 flex-safe">
        <!-- Left: search controls -->
        <div class="w-full md:w-1/3">
          <label class="block text-sm font-semibold mb-2">Search by name / number</label>
          <input id="idEntry" type="text" placeholder="Enter patient name or number" class="w-full px-4 py-2 rounded-xl border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />

          <div class="mt-4 flex gap-3">
            <button id="searchNameBtn" onclick="searchByName()" class="px-4 py-2 rounded-xl btn-primary shadow">Search by Name</button>
            <button id="searchNumberBtn" onclick="searchByNumber('{{plan}}')" class="px-4 py-2 rounded-xl btn-ghost shadow">Search by Number</button>
          </div>

          <div id="srchHint" aria-live="polite">
            <div>
              <div class="font-semibold">Tip: press Enter after typing to search by name.</div>
                <div class="text-sm">Results will appear here. Ads rotate when no results are shown.</div>
            </div>
          </div>
        </div>

        <!-- Right: result area -->
        <div class="w-full md:w-2/3 mt-4 md:mt-0">
          <div id="srchMain" class="result decorative-card p-4 scrollbar">
            <!-- Initially empty. Media rotation will set background-image. -->
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- Chart.js not used here; keep scripts for app logic -->
  <script>
    const PLAN = '{{plan}}';
    document.addEventListener("DOMContentLoaded", function() {
      const nono = '{{nono}}';
      const pats = '{{pats}}';

      const menuBtn = document.querySelector('.hamburger-menu');
      const menuBar = document.getElementById('menuBar');

      // Toggle menu and spin transition
      menuBtn.addEventListener('click', () => {
        menuBar.classList.toggle('menu-active');
      });

      // binder logic preserved
      const binder = '{{ binder }}';
      const appa = document.getElementById('appa');
      const appimg = document.getElementById('appimg');
      const apph6 = document.getElementById('apph6');
      var link = document.querySelector("link[rel~='icon']");
      if (binder === 'lab'){
        appa.title='Search Lab';
        appa.href='/srchlab';
        appimg.src='/static/images/srchlab.png';
        document.title= 'Binder Labratory';
        link.href = '/static/images/binderlab.jpg';
        apph6.textContent = 'Search Lab';
      }

      // Attach enter key search for convenience
      const idEntry = document.getElementById('idEntry');
      idEntry.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchByName();
      });

      // Attach button for number search (keeps your original behaviour)
      document.getElementById("searchNumberBtn").addEventListener("click", function(event) {
        searchByNumber(PLAN);
      });

      // if nono, auto search
      if (nono === 'yup'){
        autoSearchByNumber(PLAN);
      }

      // if pats provided, call searchStats (preserve original flow)
      if (pats !== 'nope') {
        searchStats();
      }

      // start rotating media when idle
      initMediaRotation();
    });

    /* -------------------------
       Search / render logic (kept from your original file)
       IDs and endpoint calls unchanged
       ------------------------- */

    function searchByName() {
      const nameEntry = document.getElementById('idEntry').value;
      const srchMain = document.getElementById('srchMain');

      fetch('/search_by_name', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name: nameEntry }),
      })
      .then(response => response.json())
      .then(data => {
          if (Array.isArray(data)) {
              renderSearchResult(data, srchMain);
              srchMain.style.justifyContent="space-around";
              srchMain.style.backgroundImage="none";
              srchMain.style.backgroundColor = "var(--w)";
          } else {
              srchMain.innerHTML = `Error: ${data.error || 'Unexpected error'}`;
              srchMain.style.backgroundImage="none";
          }
      })
      .catch(error => {
          console.error('Fetch error:', error);
          srchMain.innerHTML = 'Error fetching data. Please try again.';
          srchMain.style.backgroundImage="none";
      });
    }

    function searchStats() {
      const srchMain = document.getElementById('srchMain');
      fetch('/searchh_stats', { method: 'POST', headers: {'Content-Type': 'application/json'} })
      .then(response => {
        if (!response.ok) return response.text().then(t => { throw new Error(t); });
        return response.json();
      })
      .then(data => {
        if (Array.isArray(data)) {
          renderSearchResult(data, srchMain);
          srchMain.style.justifyContent = "space-around";
          srchMain.style.backgroundImage = "none";
        } else {
          srchMain.innerHTML = `Error: ${data.error || 'Unexpected error'}`;
          srchMain.style.backgroundImage = "none";
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        srchMain.innerHTML = 'Error fetching data. Please try again.';
        srchMain.style.backgroundImage = "none";
      });
    }

    function searchByNumber(PLAN) {
      const numberEntry = document.getElementById('idEntry').value;
      const srchMain = document.getElementById('srchMain');

      fetch('/search_by_number', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ number: numberEntry }),
      })
      .then(response => {
        if (!response.ok) return response.text().then(t => { throw new Error(t); });
        return response.json();
      })
      .then(data => {
        if (data.error) {
          srchMain.innerHTML = `Error: ${data.error}`;
        } else {
          if (Object.keys(data).length === 0) {
            srchMain.innerHTML = 'No patient found.';
          } else {
            renderPatientInfo(data, srchMain, PLAN);
          }
          srchMain.style.backgroundImage="none";
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        srchMain.innerHTML = 'Error fetching data. Please try again.';
        srchMain.style.backgroundImage="none";
      });
    }

    function renderSearchResult(patients, srchMain) {
      srchMain.innerHTML = '';
      const s = document.getElementById('idFrame');
      s && s.classList && s.classList.add('aha');

      if (!patients || patients.length === 0) {
        const message = document.createElement('label');
        message.textContent = 'The name is not registered';
        srchMain.appendChild(message);
      } else {
        patients.forEach((patient) => {
          const patientDiv = createPatientDiv(patient);
          srchMain.appendChild(patientDiv);
        });
      }
    }

    function renderPatientInfo(patient, srchMain, PLAN) {
      srchMain.innerHTML = '';
      if (patient) {
        const infoDiv = createPatientInfoDiv(patient ,PLAN);
        srchMain.appendChild(infoDiv);
        const maxwidth = document.documentElement.clientWidth;
        if (maxwidth > 750) srchMain.style.justifyContent = "center";
      } else {
        const message = document.createElement('label');
        message.textContent = 'The number is not registered';
        srchMain.appendChild(message);
      }
    }

    // createPatientDiv / createPatientInfoDiv / helpers are preserved (copied with minimal formatting)
    // For brevity they are included verbatim from your original file but adapted to use the new styles.
    function createPatientDiv(patient) {
      const patientDiv = document.createElement('div');
      patientDiv.classList.add('decorative-card','p-4','mb-4');

      const inpuu = document.createElement('div');
      inpuu.classList.add('flex','flex-col','gap-3');

      const idRow = document.createElement('div');
      idRow.classList.add('flex','items-center','gap-3');

      const idLabel = document.createElement('label');
      idLabel.textContent = 'Patient Number:';
      idLabel.classList.add('text-sm','w-36');

      const idEntry = document.createElement('input');
      idEntry.type = 'text';
      idEntry.classList.add('px-3','py-2','rounded-xl','border','border-[var(--secondary)]','w-full');
      idEntry.value = patient.no;

      const searchBtn = document.createElement('button');
      searchBtn.textContent = 'Search';
      searchBtn.classList.add('px-3','py-2','rounded-lg','btn-primary');
      searchBtn.onclick = function() { searchById(patient.no); };

      idRow.appendChild(idLabel);
      idRow.appendChild(idEntry);
      idRow.appendChild(searchBtn);
      inpuu.appendChild(idRow);

      // Name / Location / Age / Debit (conditionally)
      const nameRow = document.createElement('div');
      nameRow.classList.add('flex','flex-wrap','gap-3');
      nameRow.innerHTML = `
        <div class="w-full sm:w-1/2"><label class="text-sm">Patient Name:</label><input class="px-3 py-2 rounded-xl border border-[var(--secondary)] w-full" value="${patient.name || ''}" /></div>
        <div class="w-full sm:w-1/2"><label class="text-sm">Location:</label><input class="px-3 py-2 rounded-xl border border-[var(--secondary)] w-full" value="${patient.location || ''}" /></div>
        <div class="w-1/3"><label class="text-sm">Age:</label><input class="px-3 py-2 rounded-xl border border-[var(--secondary)] w-full" value="${patient.age || ''}" /></div>
      `;
      inpuu.appendChild(nameRow);

      if (PLAN !== 'sec') {
        const debitRow = document.createElement('div');
        debitRow.classList.add('mt-2');
        debitRow.innerHTML = `<label class="text-sm">Debit:</label><input class="px-3 py-2 rounded-xl border border-[var(--secondary)] w-full" value="${patient.debit || 0}" />`;
        inpuu.appendChild(debitRow);
      }

      patientDiv.appendChild(inpuu);
      return patientDiv;
    }

    // recreate createPatientInfoDiv, savePatientInfo, searchById, autoSearchByNumber and media rotation
    // to preserve behaviour I reuse your functions with minimal modification for DOM/query selectors
    function createPatientInfoDiv(patient, PLAN) {
      const infoDiv = document.createElement('div');
      infoDiv.classList.add('decorative-card','p-4','mb-4');
      infoDiv.setAttribute('data-patient-no', patient.no || '');

      const labels = [
        { key: 'name', text: 'Patient Name' },
        { key: 'id', text: 'ID Number' },
        { key: 'phone', text: 'Phone Number' },
        { key: 'location', text: 'Location' },
        { key: 'pmh', text: 'Medical History' },
        { key: 'allergies', text: 'Allergies' },
        { key: 'age', text: 'Age' },
        { key: 'next', text: 'Next visit' },
        { key: 'btype', text: 'Blood Type' },
        { key: 'sex', text: 'Sex' },
        { key: 'payed', text: 'Paid' },
        { key: 'debit', text: 'Debit' }
      ];

      const container = document.createElement('div');
      container.classList.add('grid','grid-cols-1','md:grid-cols-2','gap-3');

      labels.forEach(label => {
        const wrapper = document.createElement('div');
        wrapper.classList.add('flex','flex-col','gap-1');

        const entryLabel = document.createElement('label');
        entryLabel.classList.add('text-sm');
        entryLabel.textContent = label.text + ':';

        let entry;
        if (label.key === "next") {
          entry = document.createElement('input');
          entry.type = 'datetime-local';
          entry.value = patient[label.key] || formatyear();
          entry.classList.add('px-3','py-2','rounded-xl','border','border-[var(--secondary)]');
        } else {
          entry = document.createElement('input');
          entry.type = 'text';
          entry.value = (patient[label.key] !== undefined ? patient[label.key] : '');
          entry.classList.add('px-3','py-2','rounded-xl','border','border-[var(--secondary)]');
        }

        wrapper.appendChild(entryLabel);
        wrapper.appendChild(entry);
        container.appendChild(wrapper);
      });

      // buttons row
      const btnRow = document.createElement('div');
      btnRow.classList.add('mt-3','flex','gap-3','justify-center');

      const saveButton = document.createElement('button');
      saveButton.textContent = 'Save';
      saveButton.classList.add('px-4','py-2','rounded-xl','btn-primary');
      saveButton.onclick = () => savePatientInfo(patient.no);

      const printBtn = document.createElement('button');
      printBtn.textContent = 'Print';
      printBtn.classList.add('px-4','py-2','rounded-xl','btn-ghost');
      printBtn.onclick = () => showPage('kprint');

      const openBtn = document.createElement('button');
      openBtn.textContent = 'Open';
      openBtn.classList.add('px-4','py-2','rounded-xl','bg-white','border','border-[var(--secondary)]');
      openBtn.onclick = () => showPage('meddata');

      btnRow.appendChild(saveButton);
      btnRow.appendChild(printBtn);
      if (PLAN !== 'sec') btnRow.appendChild(openBtn);

      infoDiv.appendChild(container);
      infoDiv.appendChild(btnRow);
      return infoDiv;
    }

    function savePatientInfo(patientNo) {
      // gather inputs from the visible patient card
      const patientDiv = document.querySelector(`[data-patient-no="${patientNo}"]`);
      if (!patientDiv) { alert('Error: Patient block not found'); return; }

      const inputs = Array.from(patientDiv.querySelectorAll('input'));
      const payload = {};
      inputs.forEach((input, idx) => {
        payload['field_' + idx] = input.value;
      });

      // send minimal sanity payload; keep your original endpoint
      fetch('/updatePatientData', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ patientNo, payload })
      })
      .then(() => alert('Patient data saved successfully.'))
      .catch((err) => { console.error(err); alert('Error saving patient data.'); });
    }

    function autoSearchByNumber(PLAN) {
      const srchMain = document.getElementById('srchMain');
      fetch('/auto_search_by_number', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number: 'ya' }),
      })
      .then(res => { if (!res.ok) return res.text().then(t => { throw new Error(t); }); return res.json(); })
      .then(data => {
        if (data.error) { srchMain.innerHTML = `Error: ${data.error}`; srchMain.style.backgroundImage="none"; }
        else {
          if (Object.keys(data).length === 0) srchMain.innerHTML = 'No patient found.';
          else {
            document.getElementById('idEntry').value = data.no || '';
            renderPatientInfo(data, srchMain, PLAN);
          }
          srchMain.style.backgroundImage="none";
        }
      })
      .catch(err => { console.error(err); srchMain.innerHTML = 'Error fetching data.'; srchMain.style.backgroundImage="none"; });
    }

    function searchById(patientNumber) {
      const srchMain = document.getElementById('srchMain');
      fetch('/search_by_number', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ number: patientNumber }),
      })
      .then(res => { if (!res.ok) return res.text().then(t => { throw new Error(t); }); return res.json(); })
      .then(data => {
        if (data.error) srchMain.innerHTML = `Error: ${data.error}`;
        else {
          if (Object.keys(data).length === 0) srchMain.innerHTML = 'No patient found.';
          else {
            document.getElementById('idEntry').value = data.no || '';
            renderPatientInfo(data, srchMain, PLAN);
          }
        }
      })
      .catch(err => { console.error(err); srchMain.innerHTML = 'Error fetching data.'; });
    }

    function showPage(page) { window.location.href = `/${page}`; }

    /* --------------------------
       Media rotation when result area is empty
       -------------------------- */
    const mediaSources = [
      { type: 'image', src: '/static/images/ad.jpg' },
      { type: 'image', src: 'https://firebasestorage.googleapis.com/v0/b/monydb-f2cdb.appspot.com/o/freebindermed.png?alt=media&token=55b86ff5-fd63-4a9d-bc41-79302130c7ba' },
      { type: 'image', src: 'https://firebasestorage.googleapis.com/v0/b/monydb-f2cdb.appspot.com/o/ad1.jpg?alt=media&token=dc248e7d-3806-4364-ba9c-d575736d6253' }
    ];
    let mediaIndex = 0;
    let mediaTimer = null;

    function getStartIndexBasedOnTime() {
      const currentTime = new Date();
      const totalSeconds = currentTime.getHours() * 3600 + currentTime.getMinutes() * 60 + currentTime.getSeconds();
      const mediaDuration = 15;
      return Math.floor(totalSeconds / mediaDuration) % mediaSources.length;
    }

    function initMediaRotation() {
      const srchMain = document.getElementById('srchMain');
      mediaIndex = getStartIndexBasedOnTime();

      function showNextMedia() {
        // only change media if srchMain has no inner result (no child .decorative-card)
        const hasResultCards = !!srchMain.querySelector('.decorative-card');
        if (hasResultCards) return; // don't override results

        const media = mediaSources[mediaIndex];
        if (media.type === 'image') {
          srchMain.style.backgroundImage = `url(${media.src})`;
          // remove inner placeholder text if exists
          if (!srchMain.querySelector('.decorative-card')) {
            // ensure centered message displayed over bg
            srchMain.innerHTML = `<div class="w-full h-full flex items-center justify-center text-[rgba(0,0,0,0.55)]"></div>`;
          }
        }
        mediaIndex = (mediaIndex + 1) % mediaSources.length;
        clearTimeout(mediaTimer);
        mediaTimer = setTimeout(showNextMedia, 15000);
      }

      // start rotating
      showNextMedia();
      // restart on user clearing results
      const observer = new MutationObserver(() => {
        // if results removed, resume rotation
        if (!srchMain.querySelector('.decorative-card')) {
          if (!mediaTimer) mediaTimer = setTimeout(showNextMedia, 15000);
        } else {
          clearTimeout(mediaTimer); mediaTimer = null;
        }
      });
      observer.observe(srchMain, { childList: true, subtree: true });
    }

    function formatyear() {
      const today = new Date().toISOString().split('T')[0];
      return today;
    }
  </script>
