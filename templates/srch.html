<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="CdS-jnmDkiXrSvujf6OARsOgBIBGsMPk0GrTKOs2w2Q" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <title>Binder Medical</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: #e6ded9;
      --text: #2b2b2b;
    }

    /* Base reset */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--bg-main) 0%, #E6D6C0 60%);
      color: var(--text);
      line-height: 1.4;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* Main layout */
    main.layout-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1100px;
      margin: 45px auto;
      padding: 16px;
    }

    /* Decorative card */
    .decorative-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.84));
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 10px 30px rgba(18,18,18,0.06);
      border-radius: 16px;
    }

    section.decorative-card.p-6 {
      min-height: auto;
      max-height: none;
    }

    /* Controls grid */
    .controls-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    @media (min-width: 900px) {
      .controls-grid {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px;
        align-items: start;
      }
    }

    /* Inputs & Buttons */
    input[type="text"] {
      -webkit-appearance:none; 
      -moz-appearance:none;
    }

    .big-input {
      font-size: 1.05rem; 
      padding: 14px 16px; 
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.253);
      background: rgba(255,255,255,0.98);
      width: 100%;
      box-sizing: border-box;
    }

    .big-btn {
      min-height: 48px; 
      padding: 12px 18px; 
      border-radius: 14px; 
      font-weight: 600; 
      font-size: 1rem;
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px; 
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(12,12,12,0.06);
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), rgb(207,161,117));
      color: #142022;
      border: none;
    }

    .btn-secondary {
      background: linear-gradient(90deg, var(--secondary), #7ecbf5);
      color: #fff; 
      border: none;
    }

    .btn-ghost {
      background: transparent; 
      border: 1px solid rgba(0,0,0,0.06); 
      color: var(--text);
    }

    /* Accessibility focus */
    .big-input:focus, .big-btn:focus, .menu__btn:focus, .menu-item:focus {
      outline: 3px solid rgba(206,122,53,0.14);
      outline-offset: 3px;
    }

    /* Search hint */
    #srchHint { 
      margin-top:10px; 
      padding:12px; 
      border-radius:12px; 
      background: linear-gradient(90deg, rgba(255,255,255,0.88), rgba(255,255,255,0.8)); 
      border:1px solid rgba(0,0,0,0.03); 
      color:rgba(0,0,0,0.6); 
      font-size:0.98rem; 
      display:flex; 
      gap:12px; 
      align-items:center; 
    }

    /* Search results */
    #srchMain {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-height: none;         /* remove artificial height limit */
      min-height: 150px;
      overflow-y: visible;      /* allow natural flow */
      justify-content: flex-start;
      margin-bottom: 20px;      /* give breathing room before patient cards */
    }

    #srchMain img {
      width: 100%;
      max-height: 60vh;
      object-fit: cover;
      border-radius: 12px;
    }

    /* Patient card grid */
    .patient-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .patient-info-grid input.patient-value {
      width: 100%;
      box-sizing: border-box;
    }

    .patient-card > div:last-child {
      flex-wrap: wrap;
    }

    .flex.gap-6.items-center {
      gap: 18rem;
    }

    /* Patient labels & values */
    .patient-card {
      margin-top: 0;            /* no more manual top margin needed */
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.84));
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .patient-row { display:flex; gap:12px; align-items:center; width: 100%; }
    .patient-label { font-weight:600; min-width:120px; color:rgba(0,0,0,0.7); }
    .patient-value { background:rgba(255,255,255,0.92); padding:10px; border-radius:10px; border:1px solid rgba(0,0,0,0.04); flex:1; }

    /* Responsive tweaks */
    @media (max-width: 500px) {
      .patient-value {
        font-size: 0.95rem;
        padding: 8px;
      }
      .patient-label {
        min-width: auto;
        font-size: 0.9rem;
      }
      #srchHint, #textupper {
        display: none;
      }
    }

    /* Smooth scroll for results */
    #srchMain {
      scroll-behavior: smooth;
    }

    /* Hamburger menu lines */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 26px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.28s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    .menu-active .menu__btn span {
      transform: rotate(45deg);
      background-color: var(--accent);
    }
    .menu-active .menu__btn span::before {
      transform: rotate(90deg);
      top: 0;
    }
    .menu-active .menu__btn span::after {
      opacity: 0;
    }

    /* Menu slide */
    .menu__box {
      transition: transform 0.28s cubic-bezier(.2,.9,.2,1), opacity 0.2s;
      transform: translateX(-110%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      max-width: 350px;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      font-size: 0.95rem;
      font-weight: 500;
      animation: slideIn 0.4s ease, fadeOut 0.6s ease 3.4s forwards;
    }
    .toast-success { background: #d1fae5; color: #065f46; border-left: 6px solid #10b981; }
    .toast-error   { background: #fee2e2; color: #991b1b; border-left: 6px solid #ef4444; }
    .toast-info    { background: #dbeafe; color: #1e3a8a; border-left: 6px solid #3b82f6; }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(120%); }
    }

  </style>
</head>
<body>

  <!-- Floating menu (kept same items + icons) -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Page content -->
  <main class="layout-center">
    <section class="decorative-card p-6">
      <div class="flex items-center justify-between gap-4 mb-4">
        <div class="flex gap-6 items-center">
          <div class="flex items-center gap-4">
            <img src="/static/images/w3.jpg" class="w-16 h-16 rounded-full shadow">
            <h1 style="font-size:1.6rem; font-weight:700; letter-spacing:-0.6px;">Search patients</h1>
          </div>
          <p id="textupper" style="color:rgba(0,0,0,0.6); margin-top:6px; font-size:0.98rem;">
            Enter a patient name, ID, or phone number.
          </p>
        </div>
      </div>

      <div class="controls-grid">
        <!-- Left controls -->
        <div>
          <input id="idEntry" type="text" class="big-input" aria-label="Search by patient name or number"
                 value="" />

          <div class="mt-4 flex flex-col sm:flex-row sm:items-center sm:gap-3 gap-3">
            <button id="searchNameBtn" onclick="searchByName()" class="big-btn btn-primary w-full sm:w-auto" title="Search by name">
              Search by Name
            </button>

            <button id="searchNumberBtn" onclick="searchByNumber('{{plan}}')" class="big-btn btn-secondary w-full sm:w-auto" title="Search by number">
              Search by Number
            </button>
          </div>

          <div id="srchHint" aria-live="polite">
            <div style="display:flex; gap:10px; align-items:center;">
              <div>
                <div style="font-weight:600;">Tips:</div>
                <div style="font-weight: 600;">- press Enter to quickly search by name.</div>
                <div style="font-weight: 600;">- search ID or phone number using 'search by number' button.</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right result area -->
        <div>
          <div id="srchMain" class="result decorative-card scrollbar" role="region" aria-live="polite" aria-label="Search results">
            <!-- Rotating media / results will appear here -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-3"></div>


  <!-- scripts (logic preserved and slightly refactored for the new layout) -->
  <script>
    const PLAN = '{{plan}}';

    function showToast(message, type = "info") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${message}</span>`;

      container.appendChild(toast);

      // auto remove after animation
      setTimeout(() => {
        toast.remove();
      }, 4000);
    }


    document.addEventListener("DOMContentLoaded", function() {
      // template tokens (unchanged)
      const nono = '{{nono}}';
      const pats = '{{pats}}';
      const binder = '{{ binder }}';

      // MENU toggle accessibility
      const menuBtn = document.querySelector('.hamburger-menu');
        const menuBar = document.getElementById('menuBar');

        // Toggle menu (keeps same interaction as previous)
        menuBtn.addEventListener('click', () => {
            menuBar.classList.toggle('menu-active');
        });

      // binder-specific adjustments (kept from original)
      const appa = document.getElementById('appa');
      const appimg = document.getElementById('appimg');
      const apph6 = document.getElementById('apph6');
      var link = document.querySelector("link[rel~='icon']");
      if (binder === 'lab'){
        appa.title='Search Lab';
        appa.href='/srchlab';
        appimg.src='/static/images/srchlab.png';
        document.title= 'Binder Labratory';
        link.href = '/static/images/binderlab.jpg';
        apph6.textContent = 'Search Lab';
      }

      // quick-enter support
      const idEntry = document.getElementById('idEntry');
      idEntry.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          // prefer name search on enter
          searchByName();
        }
      });

      document.getElementById("searchNumberBtn").addEventListener("click", function(event) {
        searchByNumber(PLAN);
      });

      // auto flows from template
      if (nono === 'yup') {
        autoSearchByNumber(PLAN);
      }
      if (pats !== 'nope') {
        searchStats();
      }

      // start rotating media when empty
      initMediaRotation();
    });
    const labels = [
        { key: 'name', text: 'Patient Name' },
        { key: 'id', text: 'ID Number' },
        { key: 'phone', text: 'Phone Number' },
        { key: 'location', text: 'Location' },
        { key: 'pmh', text: 'Medical History' },
        { key: 'allergies', text: 'Allergies' },
        { key: 'age', text: 'Age' },
        { key: 'next', text: 'Next visit' },
        { key: 'btype', text: 'Blood Type' },
        { key: 'sex', text: 'Sex' },
        { key: 'payed', text: 'Paid' },
        { key: 'debit', text: 'Debit' }
    ];

    function searchByName() {
      const nameEntry = document.getElementById('idEntry').value.trim();
      const srchMain = document.getElementById('srchMain');

      if (!nameEntry) {
        showToast("Please type a name or number above.", "info");
        return;
      }

      if (/^\d+$/.test(nameEntry)) {
        showToast("That looks like a number. Please use the number search instead.", "error");
        return;
      }

      fetch('/search_by_name', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name: nameEntry }),
      })
      .then(response => response.json())
      .then(data => {
          if (Array.isArray(data)) {
              renderSearchResult(data, srchMain);
              srchMain.style.backgroundImage="none";
              srchMain.style.backgroundColor = "var(--w)";
          } else {
              showToast(`Error: ${data.error || 'Unexpected error'}`, "error");
          }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        showToast("Error fetching data. Please try again.", "error");
      });
    }

    function searchStats() {
      const srchMain = document.getElementById('srchMain');
      fetch('/searchh_stats', { method: 'POST', headers: {'Content-Type': 'application/json'} })
      .then(response => {
        if (!response.ok) return response.text().then(t => { throw new Error(t); });
        return response.json();
      })
      .then(data => {
        if (Array.isArray(data)) {
          renderSearchResult(data, srchMain);
          srchMain.style.backgroundImage = "none";
        } else {
          showToast(`Error: ${data.error || 'Unexpected error'}`, "error");
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        showToast("Error fetching data. Please try again.", "error");
      });
    }

    function searchByNumber(PLAN) {
      const numberEntry = document.getElementById('idEntry').value.trim();
      const srchMain = document.getElementById('srchMain');

      if (!numberEntry) {
        showToast("Please enter an ID or phone number.", "info");
        return; 
      }

      // 🚫 validate numeric input (digits only)
      if (!/^\d+$/.test(numberEntry)) {
        showToast("Invalid number. Please enter digits only.", "error");
        return;
      }

      fetch('/search_by_number', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ number: numberEntry }),
      })
      .then(response => {
        if (!response.ok) return response.text().then(t => { throw new Error(t); });
        return response.json();
      })
      .then(data => {
        if (data.error) {
          showToast(`Error: ${data.error}`, "error");
        } else {
          if (Object.keys(data).length === 0) {
            showToast('No patient found.', "info");
          } else {
            renderPatientInfo(data, srchMain, PLAN);
            srchMain.style.backgroundImage = "none";
          }
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        showToast("Error fetching data. Please try again.", "error");
      });
    }

    function renderSearchResult(patients, srchMain) {
      srchMain.innerHTML = '';
      if (!patients || patients.length === 0) {
        showToast(`No matches found. Try another spelling or try searching by number.`, "info");
        return;
      }

      patients.forEach(patient => {
        const container = document.createElement('div');
        container.className = 'patient-card decorative-card';
        container.innerHTML = `
          <div class="patient-row" style="justify-content:space-between;">
            <div>
              <div style="font-weight:800; font-size:1.05rem;">${patient.name || '—'}</div>
              <div style="color:rgba(0,0,0,0.6); margin-top:6px;">ID: ${patient.no || '—'} • Age: ${patient.age || '—'}</div>
            </div>
            <div style="text-align:right;">
              <button class="big-btn btn-secondary" style="min-width:110px;" onclick="searchById('${patient.no}')">Open</button>
            </div>
          </div>
        `;
        srchMain.appendChild(container);
      });
    }

    function renderPatientInfo(patient, srchMain, PLAN) {
      srchMain.innerHTML = '';
      if (!patient) {
        showToast('The number is not registered', "info");
        return;
      }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'patient-card decorative-card';
      infoDiv.setAttribute('data-patient-no', patient.no || '');

      // grid of fields (simple clear layout for older eyes)
      const grid = document.createElement('div');
      grid.className = 'patient-info-grid';

      labels.forEach(label => {
        const field = document.createElement('div');
        const fldLabel = document.createElement('div');
        fldLabel.className = 'patient-label';
        fldLabel.style.fontWeight = '700';
        fldLabel.style.marginBottom = '6px';
        fldLabel.textContent = label.text + ':';

        let entry;
        if (label.key === 'next') {
          entry = document.createElement('input');
          entry.type = 'datetime-local';
          entry.value = patient[label.key] || formatyear();
          entry.className = 'patient-value';
        } else {
          entry = document.createElement('input');
          entry.type = 'text';
          entry.value = (patient[label.key] !== undefined ? patient[label.key] : '');
          entry.className = 'patient-value';
        }

        // set data-key for save extraction
        entry.setAttribute('data-key', label.key);

        field.appendChild(fldLabel);
        field.appendChild(entry);
        grid.appendChild(field);
      });

      // actions
      const btnRow = document.createElement('div');
      btnRow.style.marginTop = '14px';
      btnRow.style.display = 'flex';
      btnRow.style.gap = '10px';
      btnRow.style.justifyContent = 'center';

      const saveButton = document.createElement('button');
      saveButton.className = 'big-btn btn-primary';
      saveButton.textContent = 'Save';
      saveButton.onclick = () => savePatientInfo(patient.no);

      const printBtn = document.createElement('button');
      printBtn.className = 'big-btn btn-ghost';
      printBtn.textContent = 'Print';
      printBtn.onclick = () => showPage('kprint');

      const openBtn = document.createElement('button');
      openBtn.className = 'big-btn';
      openBtn.textContent = 'Open';
      openBtn.style.background = 'white';
      openBtn.style.border = '1px solid rgba(0,0,0,0.06)';
      openBtn.onclick = () => showPage('meddata');

      btnRow.appendChild(saveButton);
      btnRow.appendChild(printBtn);
      if (PLAN !== 'sec') btnRow.appendChild(openBtn);

      infoDiv.appendChild(grid);
      infoDiv.appendChild(btnRow);
      srchMain.appendChild(infoDiv);

      // center for wide screens
      const maxwidth = document.documentElement.clientWidth;
      if (maxwidth > 750) srchMain.style.justifyContent = "center";
    }

    /* Save function (keeps original conversion logic) */
    async function savePatientInfo(patientNo) {
      const patientDiv = document.querySelector(`[data-patient-no="${patientNo}"]`);
      if (!patientDiv) {
        showToast('Error: Patient block not found', "error");
        return;
      }

      // Build payload with top-level keys (endpoint expects { patientNo, name, id, ... })
      const payload = { patientNo: Number(patientNo) };

      labels.forEach((lbl, idx) => {
        let input = patientDiv.querySelector(`[data-key="${lbl.key}"]`)
                || patientDiv.querySelector(`[name="${lbl.key}"]`)
                || patientDiv.querySelector(`#${lbl.key}-${patientNo}`);

        if (!input) {
          const els = patientDiv.querySelectorAll('input, textarea, select');
          input = els[idx];
        }

        let val = '';
        if (input) {
          if (input.type === 'checkbox') val = input.checked ? (input.value || true) : false;
          else val = input.value ?? '';
        }

        if (['age', 'payed', 'debit'].includes(lbl.key)) {
          const cleaned = String(val).trim().replace(',', '.');
          const n = parseFloat(cleaned);
          payload[lbl.key] = Number.isFinite(n) ? n : 0;
        } else {
          payload[lbl.key] = val;
        }
      });

      try {
        const res = await fetch('/updatePatientData', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          console.error('Save failed:', data);
          showToast(`Error saving patient data:${(data.message || res.statusText)}` ,"error");
          return;
        }

        showToast('Patient data saved successfully.',"success");
      } catch (err) {
        console.error(err);
        showToast('Error saving patient data.', "error");
      }
    }

    function showPage(page) { window.location.href = `/${page}`; }

    const mediaSources = [
      { type: 'image', src: '/static/images/ad.jpg' },
      { type: 'image', src: 'https://firebasestorage.googleapis.com/v0/b/monydb-f2cdb.appspot.com/o/freebindermed.png?alt=media&token=55b86ff5-fd63-4a9d-bc41-79302130c7ba' },
      { type: 'image', src: 'https://firebasestorage.googleapis.com/v0/b/monydb-f2cdb.appspot.com/o/ad1.jpg?alt=media&token=dc248e7d-3806-4364-ba9c-d575736d6253' }
    ];
    let mediaIndex = 0;
    let mediaTimer = null;

    function getStartIndexBasedOnTime() {
      const currentTime = new Date();
      const totalSeconds = currentTime.getHours() * 3600 + currentTime.getMinutes() * 60 + currentTime.getSeconds();
      const mediaDuration = 15;
      return Math.floor(totalSeconds / mediaDuration) % mediaSources.length;
    }

    function initMediaRotation() {
      const srchMain = document.getElementById('srchMain');
      mediaIndex = getStartIndexBasedOnTime();

      // create an img element once
      let adImg = document.createElement('img');
      adImg.style.maxWidth = "100%";
      adImg.style.borderRadius = "16px";
      adImg.style.boxShadow = "0 4px 16px rgba(0,0,0,0.1)";
      adImg.style.display = "none";
      srchMain.appendChild(adImg);

      function showNextMedia() {
        const hasResultCards = !!srchMain.querySelector('.patient-card');
        if (hasResultCards) { adImg.style.display = 'none'; return; }

        const media = mediaSources[mediaIndex];
        if (media.type === 'image') {
          adImg.src = media.src;
          adImg.style.display = 'block';
        }

        mediaIndex = (mediaIndex + 1) % mediaSources.length;
        clearTimeout(mediaTimer);
        mediaTimer = setTimeout(showNextMedia, 15000);
      }

      showNextMedia();

      const observer = new MutationObserver(() => {
        const hasCards = !!srchMain.querySelector('.patient-card');
        if (!hasCards && !mediaTimer) mediaTimer = setTimeout(showNextMedia, 15000);
        if (hasCards) { clearTimeout(mediaTimer); mediaTimer = null; adImg.style.display='none'; }
      });
      observer.observe(srchMain, { childList: true, subtree: true });
    }

    function formatyear() {
      const today = new Date().toISOString().split('T')[0];
      return today;
    }
  </script>
