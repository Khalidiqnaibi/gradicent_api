<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Binder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="/static/css/settings.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Menu (unchanged / kept) -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Settings Card -->
  <div class="flex items-center justify-center min-h-screen px-6 w-full">
    <div class="max-w-2xl w-full bg-white/95 backdrop-blur-md shadow-xl rounded-3xl p-8 border border-[var(--secondary)] space-y-6">
      <h1 class="text-3xl font-bold text-center text-gray-900">Settings</h1>

      <div class="space-y-4">
        <!-- Clinic Name -->
        <div class="flex items-center justify-between gap-4">
          <label class="font-medium min-w-[36%]">Clinic name:</label>
          <input id="drname" type="text" class="flex-1 px-3 py-2 border rounded-lg" placeholder="e.g. Al-Binder Clinic">
        </div>

        <!-- Reminder Message -->
        <div class="flex items-center justify-between gap-4">
          <label class="font-medium min-w-[36%]">Reminder message:</label>
          <input id="msg" type="text" class="flex-1 px-3 py-2 border rounded-lg" placeholder="Appointment reminder template">
        </div>

        <!-- Country Key -->
        <div class="flex items-center justify-between gap-4">
          <label class="font-medium min-w-[36%]">Country key:</label>
          <input id="pkey" type="text" class="flex-1 px-3 py-2 border rounded-lg" placeholder="+970">
        </div>

        <!-- Permission code + icons (responsive) -->
        <div id="ccc" class="space-y-2">
          <label class="font-medium block">Permission code:</label>

          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
            <input id="code" type="password" class="flex-1 px-3 py-2 border rounded-lg" readonly aria-label="permission code">

            <!-- icon buttons group -->
            <div class="flex gap-2 items-center">
              <!-- visibility toggle -->
              <button id="toggle-visibility" class="flex items-center gap-2 px-3 py-2 rounded-lg border bg-white hover:bg-[var(--secondary)]/8 transition" title="Show/Hide code" aria-pressed="false">
                <!-- eye SVG -->
                <svg id="eye-svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M2.5 12s4.5-7.5 9.5-7.5S21.5 12 21.5 12 17 19.5 12 19.5 2.5 12 2.5 12z"></path>
                  <circle cx="12" cy="12" r="3" stroke-width="1.6"></circle>
                </svg>
                <span class="hidden sm:inline text-sm">Show</span>
              </button>

              <!-- refresh (same as before but inline svg) -->
              <button id="refresh-code" class="flex items-center gap-2 px-3 py-2 rounded-lg border bg-white hover:bg-[var(--secondary)]/10 transition" title="Refresh code">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M20 12a8 8 0 10-3.2 6.1L21 21"></path>
                </svg>
                <span class="hidden sm:inline text-sm">Refresh</span>
              </button>

              <!-- copy code -->
              <button id="copy-code" class="flex items-center gap-2 px-3 py-2 rounded-lg border bg-white hover:bg-[var(--accent)]/10 transition" title="Copy code">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <rect x="9" y="9" width="8" height="8" rx="1" ry="1" stroke-width="1.6"></rect>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M5 15V5a2 2 0 012-2h8"></path>
                </svg>
                <span class="hidden sm:inline text-sm">Copy</span>
              </button>
            </div>
          </div>

          <!-- code preview (collapsed by default) -->
          <div id="codePreviewWrap" class="mt-2 hidden">
            <div class="flex items-center justify-between mb-2">
              <div class="text-xs text-[var(--muted)]">Generated code</div>
              <div class="text-xs text-[var(--muted)]">Format: text</div>
            </div>
            <pre id="codePreview" class="code-preview max-h-56 whitespace-pre-wrap break-words">/* code preview will appear here */</pre>
          </div>
        </div>

        <!-- Auto Reminder -->
        <div class="flex items-center gap-3">
          <label class="font-medium min-w-[36%]">Send auto reminder message:</label>

          <!-- Toggle -->
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="cbx-3" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-400 rounded-full peer peer-checked:bg-[var(--secondary)] transition-colors"></div>
            <div class="absolute left-0.5 top-0.5 bg-white w-5 h-5 rounded-full shadow-md transition-transform peer-checked:translate-x-5"></div>
          </label>
        </div>

      </div>

      <!-- Save Button -->
      <div class="pt-4 text-center">
        <button onclick="savePatientInfo()" class="px-6 py-2 bg-[var(--accent)] text-white font-semibold rounded-xl shadow hover:scale-105 transition">Save changes</button>
      </div>
    </div>
  </div>

  <!-- toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/js/settings.js"></script>
</body>
</html>
