<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Binder — Add Patient</title>

  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="/static/css/home.css" rel="stylesheet">
</head>

<body class="font-inter antialiased">

  
  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

<div class="ac-frame min-h-screen flex justify-center items-center px-6 py-12">
  <div class="decorative-card max-w-3xl w-full rounded-3xl p-10">

    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold">Add a Patient</h1>
      <p class="text-[rgba(0,0,0,0.60)] mt-2">
        Fill out medical and personal details. Press Enter to navigate fields quickly.
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

      <div>
        <label class="font-semibold">Patient Name</label>
        <input id="PName"
               placeholder="Full name"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80 focus:ring-2 focus:ring-[var(--accent)]">
      </div>

      <div>
        <label class="font-semibold">National ID</label>
        <input id="idnum"
               placeholder="ID / Gov Number"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Phone</label>
        <input id="PNum"
               placeholder="+970 59 …"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Location</label>
        <input id="loc" placeholder="City / Area / Building"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div class="sm:col-span-2">
        <label class="font-semibold">Medical History</label>
        <input id="medh"
               placeholder="PMH, chronic conditions…"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Allergies</label>
        <input id="allergies" placeholder="e.g., Penicillin"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Blood Type</label>
        <input id="btype" placeholder="A+, O-, etc."
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Sex</label>
        <input id="sex" placeholder="M / F"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

      <div>
        <label class="font-semibold">Age</label>
        <input id="age" placeholder="Years"
               class="w-full p-3 rounded-xl border border-[var(--secondary)] bg-white/80">
      </div>

    </div>

    <!-- ADD BUTTON -->
    <div class="mt-10 flex justify-center">
      <button onclick="submitPatient()"
              class="px-8 py-3 bg-[var(--accent)] rounded-2xl text-white font-semibold shadow hover:scale-105 transition">
        Add Patient
      </button>
    </div>

  </div>
</div>

<div id="toasts" class="toast-wrap" aria-live="polite"></div>
<script src="/static/js/home.js"></script>

</body>
</html>
