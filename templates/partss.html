<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Body Part Selection</title>
    <style>
        .container {
            position: relative;
            max-width: 800px;
            margin: auto;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            border: 2px solid transparent;
            cursor: pointer;
        }

        /* Main body part regions */
        .head {
            top: 5%;
            left: 60%;
            width: 17%;
            height: 15%;
        }

        .right-arm {
            top: 17%;
            left: 46%;
            width: 15%;
            height: 45%;
        }

        .left-arm {
            top: 19%;
            left: 77%;
            width: 20%;
            height: 45%;
        }

        .chest {
            top: 20%;
            left: 60%;
            width: 17%;
            height: 16%;
        }

        .stomach {
            top: 36%;
            left: 59%;
            width: 18%;
            height: 17%;
        }

        .right-leg {
            top: 43%;
            left: 68%;
            width: 10%;
            height: 53%;
        }

        .left-leg {
            top: 45%;
            left: 54%;
            width: 14%;
            height: 50%;
        }

        .zoomed-container {
            margin-top: 20px;
            display: none;
        }

        .zoomed-container.active {
            display: block;
        }

        .zoomed-image {
            max-width: 100%;
        }

        .back-button {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        .overlay.left-arm.woman {
            top: 19%;
            left: 30%;
            width: 10%;
            height: 45%;
            background: green;
        }

        .overlay.head.woman {
            top: 6%;
            left: 16%;
            width: 17%;
            height: 16%;
            background: green;
        }

    </style>
</head>
<body>

<div class="container">
    <img src="0_gojgkQb92LyLHOIH.jpg" alt="Human Body" id="bodyImage">
    <!-- Defining overlay regions -->
    <div class="overlay head" data-part="head"></div>
    <div class="overlay chest" data-part="chest"></div>
    <div class="overlay right-arm" data-part="right-arm"></div>
    <div class="overlay left-arm" data-part="left-arm"></div>
    <div class="overlay right-leg" data-part="left-leg"></div>
    <div class="overlay left-leg" data-part="right-leg"></div>
    <div class="overlay stomach" data-part="stomach"></div>
    <!-- Defining overlay regions -->
    <div class="overlay head woman" data-part="woman-head"></div>
    <div class="overlay chest woman" data-part="woman-chest"></div>
    <div class="overlay right-arm woman" data-part="woman-right-arm"></div>
    <div class="overlay left-arm woman" data-part="woman-left-arm"></div>
    <div class="overlay right-leg woman" data-part="woman-left-leg"></div>
    <div class="overlay left-leg woman" data-part="woman-right-leg"></div>
    <div class="overlay stomach woman" data-part="woman-stomach"></div>
</div>

<div class="zoomed-container" id="zoomedContainer">
    <h2 id="zoomedTitle">Zoomed In: </h2>
    <img src="" alt="Zoomed Part" class="zoomed-image" id="zoomedImage">
    <button class="back-button" onclick="goBack()">Go Back</button>
</div>

<script>
    document.querySelectorAll('.overlay').forEach(function(region) {
        region.addEventListener('click', function() {
            const selectedPart = region.getAttribute('data-part');
            handleMainPartClick(selectedPart);
        });
    });

    function handleMainPartClick(part) {
        let zoomedTitle = document.getElementById('zoomedTitle');
        let zoomedImage = document.getElementById('zoomedImage');
        let zoomedContainer = document.getElementById('zoomedContainer');

        // Logic to switch the zoomed image based on the part clicked
        zoomedTitle.innerText = `Zoomed In: ${part}`;
        zoomedImage.src = getZoomedImage(part);

        document.querySelector('.container').style.display = 'none';
        zoomedContainer.classList.add('active');
    }

    function getZoomedImage(part) {
        // Placeholder: You would replace this with actual zoomed-in images for each body part.
        switch(part) {
            case 'head': return 'head_zoom.jpg';
            case 'right-arm': return 'right_arm_zoom.jpg';
            case 'left-arm': return 'left_arm_zoom.jpg';
            case 'chest': return 'chest_zoom.jpg';
            case 'stomach': return 'stomach_zoom.jpg';
            case 'right-leg': return 'right_leg_zoom.jpg';
            case 'left-leg': return 'left_leg_zoom.jpg';
            case 'woman-head': return 'whead_zoom.jpg';
            case 'woman-right-arm': return 'wright_arm_zoom.jpg';
            case 'woman-left-arm': return 'wleft_arm_zoom.jpg';
            case 'woman-chest': return 'wchest_zoom.jpg';
            case 'woman-stomach': return 'wstomach_zoom.jpg';
            case 'woman-right-leg': return 'wright_leg_zoom.jpg';
            case 'woman-left-leg': return 'wleft_leg_zoom.jpg';
            default: return '';
        }
    }

    function goBack() {
        document.querySelector('.container').style.display = 'block';
        document.getElementById('zoomedContainer').classList.remove('active');
    }
</script>

</body>
</html>
