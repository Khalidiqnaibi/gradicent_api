<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
    <title>Log in</title>
    <!-- Add your CSS styles or link external stylesheets here if needed -->
    <style>
        html{
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            width: 100%;
        }
        #t{
            font-weight: 400;
            margin-top:50px;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            width: 100%;
        }

        .plans-container {
            justify-items: center;
            justify-self: center;
            margin: 0;
            margin-top: 20px;
            display:grid;
            background: #8b8c8e;
            width: 75%;
            padding: 10px;
            grid-template-columns: repeat(auto-fit, minmax(10px, 1fr));
            height: 75%;
        }

        .plan {
            background: #abb0bb;
            padding: 20px;
            margin: 20px;
            height: 100%;
            width: 300px;
            text-align: center;
            border-radius: 10px;
            border: 1.5px solid #000;
            box-shadow: -5px 7px 7px 0px rgb(0, 0, 0);
        }

        .plan h2 {
            color: #000000;
        }

        p {
            color: #000000;
        }

        .plns{
            display:grid;
            justify-items: center;
            background: #8b8c8e;
            margin: 0;
            height: 100%;
            width: 100%;
        }

        #titel{
            height: 5%;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .plan ul {
            list-style: none;
            padding: 20px;
        }

        .plan li {
            color: #000000;
        }

        .subscribe-button {
            margin-top:100px;
            padding: 10px;
            width:150px;
            background: black;
            color:white;
            cursor: pointer;
            border: 2px;
            border-radius: 5px;
        }

        input{
            height: 20px;
        }

        
        .bruh {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #actvbtn{
            height: 25px;
            width: 50px;
            padding-top: 5px;
        }

        a {
            text-decoration: none;
        }

        .uppln {
            display: flex;
            height: 90%;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .button {
            background-color: #000;
            border: none;
            padding: 12px;
            margin-top:5px;
            border-radius: 4.5px;
            font-size: 15px;
            cursor: pointer;
            color: rgb(255, 255, 255);
            width: 150px;
        }
    </style>
</head>
<body>
  <div class="plns">
   <!--h2 id="titel">sub plans</h2-->
    <div class="plans-container">
        <!-- pay optins -->
        <div class="plan">
            <div class="uppln">
            <div></div>
            <h2 id='t'>Log in Using Google:</h2>
            <div class="bruh ">
                <input id="tr" type="checkbox">
                <label for="tr">I have read the <a href="/terms">TERMS AND CONDITIONS</a> and the <a href="/privacy"> PRIVACY NOTICE </a>
                     and agree to all what was stated there</label>
            </div>
            <button id="login-btn" class="subscribe-button">Log in</button>
            <div class="sec">
                <h4>Or use secretary Code:</h4>
                <button class="button"  onclick="sec()">Secretary Code</button>
            </div>
            </div>
        </div>
    </div>
  </div>
</body>
<script>
    const termsCheckbox = document.getElementById('tr');
    const loginButton = document.getElementById('login-btn');

    function sec(){
        if (termsCheckbox.checked){
            window.location.href ='/loginb'
        } else{
            alert('Please read the terms and conditions and the privacy notice and check agree if you do to continue.');
        }
    }

    document.getElementById("login-btn").addEventListener("click", function(event) {
        if (termsCheckbox.checked){
            window.location.href ='/login'
        }else{
            alert('Please read the terms and conditions and the privacy notice and check agree if you do to continue.');
        }
    });

    // Enable/disable the button based on checkbox state
    termsCheckbox.addEventListener('change', function() {

        loginButton.disabled = !termsCheckbox.checked;
    });
  </script>
</html>
