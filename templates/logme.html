<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <title>Login — Binder Medical</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: #e6ded9;
      --text: #2b2b2b;
    }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, var(--bg-main), #f8f1ea 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .decorative-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(255,255,255,0.86));
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 10px 30px rgba(18,18,18,0.08);
      border-radius: 20px;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--accent), rgb(207, 161, 117));
      color: #142022;
    }
    .btn-secondary {
      background: var(--secondary);
      color: #fff;
    }
    input {
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 0.65rem 0.9rem;
      width: 100%;
      background: #fff;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(187,220,229,0.35);
    }
  </style>
</head>
<body>
  <div class="decorative-card max-w-md w-full p-8 space-y-6 text-center">
    <!-- Logo / Illustration -->
    <div class="flex justify-center">
      <img src="/static/images/w3.jpg" alt="Binder Logo" class="h-16 w-16 rounded-full shadow-md" />
    </div>

    <h1 class="text-2xl font-bold text-[var(--text)]">Welcome to Binder Medical</h1>
    <p class="text-sm text-gray-600">Your secure medical records assistant</p>

    <!-- Terms -->
    <div class="flex items-start gap-3 text-sm text-left p-3 rounded-lg bg-[var(--accent)]/15">
      <input id="tr" type="checkbox" class="mt-1 h-4 w-4 border-gray-300 rounded" />
      <label for="tr" class="leading-snug text-[var(--text)]">
        I agree to the
        <a href="/terms" class="text-[var(--secondary)] underline hover:opacity-80">Terms & Conditions</a>
        and
        <a href="/privacy" class="text-[var(--secondary)] underline hover:opacity-80">Privacy Notice</a>.
      </label>
    </div>

    <!-- Login with Google -->
    <button id="login-btn" class="w-full py-3 rounded-xl btn-primary font-medium shadow disabled:opacity-50 disabled:cursor-not-allowed">
      Log in with Google
    </button>

    <!-- Divider -->
    <div class="relative my-4">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="bg-white/90 px-2 text-gray-500">Or</span>
      </div>
    </div>

    <!-- Secretary code -->
    <div class="text-left space-y-2">
      <label for="activationCodeInput" class="block text-sm font-semibold text-[var(--text)]">Secretary Code</label>
      <div class="flex gap-2">
        <input id="activationCodeInput"
       placeholder="XXXX-XXXX-XXXX"
       class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[var(--accent)]" />
        <button id="actvbtn" class="px-4 rounded-xl btn-secondary font-medium shadow" onclick="checkActivationCode()">Activate</button>
      </div>
    </div>
  </div>

  <script>
    const termsCheckbox = document.getElementById('tr');
    const loginButton = document.getElementById('login-btn');

    function checkActivationCode() {
      if (termsCheckbox.checked) {
        var activationCode = document.getElementById('activationCodeInput').value;
        fetch('/chk_bcode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: activationCode }),
        })
        .then(response => response.json())
        .then(data => {
          if (data.result === 'accepted') {
            window.location.href = '/check_bcode';
          } else {
            alert('Invalid code. Please try again.');
          }
        })
        .catch((error) => {
          console.error('Error:', error);
        });
      } else {
        alert('Please agree to the Terms and Privacy Notice before continuing.');
      }
    }

    loginButton.addEventListener("click", function() {
      if (termsCheckbox.checked) {
        window.location.href = '/login';
      } else {
        alert('Please agree to the Terms and Privacy Notice before continuing.');
      }
    });

    // Disable login button until checked
    loginButton.disabled = true;
    termsCheckbox.addEventListener('change', () => {
      loginButton.disabled = !termsCheckbox.checked;
    });
  </script>
</body>
</html>
