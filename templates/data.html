    <script>
        let currentVisitIndex = 0;
        let visits = []; // Array to hold visit data
        let patientNumber = ""; // Patient number
        const entryWidgets = {}; // Object to hold references to input elements

        document.addEventListener("DOMContentLoaded", function() {
            // Initialize entryWidgets with references to input elements
            entryWidgets["visit_date"] = document.getElementById("visitDate");
            entryWidgets["drname"] = document.getElementById("drname");
            entryWidgets["diagnosis"] = document.getElementById("diagnosis");
            entryWidgets["treatment"] = document.getElementById("treatment");
            entryWidgets["lab"] = document.getElementById("lab");
            entryWidgets["wight"] = document.getElementById("wight");
            entryWidgets["height"] = document.getElementById("height");
            entryWidgets["coast"] = document.getElementById("coast");
            entryWidgets["payed"] = document.getElementById("payed");
            entryWidgets["debit"] = document.getElementById("debit");
            entryWidgets["details"] = document.querySelector(".entry-details");
            entryWidgets["search"] = document.getElementById("search");

            document.getElementById("drname").disabled  = false;

            const menuBtn = document.querySelector('.hamburger-menu');
            const menuBox = document.querySelector('.menu__box');
            const menuBar = document.getElementById('menuBar');
            
            // Toggle menu and spin transition
            menuBtn.addEventListener('click', () => {
                menuBar.classList.toggle('menu-active');
            });

            // Fetch patient data
            fetch(`/getPatientData`)
                .then(response => response.json())
                .then(data => {
                    console.log(data)
                    visits = data.visits;
                    patientNumber = data.patientss_number+1; // Set patient number
                    if (visits.length > 0) {
                        populatePatientData(visits[0]);
                        currentVisitIndex = 0;
                        
                        
                    }
                })
                .catch(error => console.error('Error fetching patient data:', error));

            // Set up event listeners for input elements
            Object.values(entryWidgets).forEach(widget => {
                widget.addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        nextEntry(event, widget);
                    }
                });
            });

            document.querySelector(".entry-details").addEventListener("focus", function(event) {
                if (document.querySelector(".entry-details").value === 'Details'){
                    document.querySelector(".entry-details").value= ''
                }
            });

            document.querySelector(".entry-details").addEventListener("focusout", function(event) {
                if (document.querySelector(".entry-details").value === ''){
                    document.querySelector(".entry-details").value= 'Details'
                }
            });

            // Set up event listeners for buttons
            document.getElementById("searchButton").addEventListener("click", search);
            document.getElementById("prevButton").addEventListener("click", prev);
            document.getElementById("nextButton").addEventListener("click", next);
            document.getElementById("firstButton").addEventListener("click", first);
            document.getElementById("lastButton").addEventListener("click", last);
            document.getElementById("savee").addEventListener("click", tacc);
            
            document.getElementById("kp").addEventListener("click", function() {
                tacc();
                printVisit();
            });
        });

        function populatePatientData(visit) {
            document.getElementById("visitDate").value = visit.visit_date;
            if (visit["drname"] === undefined || visit["drname"] === ''|| visit["drname"] === ' '){
                document.getElementById("drname").value = '';
            }else{
                document.getElementById("drname").value = visit.drname;
            }
            document.getElementById("treatment").value = visit.treatment;
            document.getElementById("diagnosis").value = visit.diagnosis;
            document.getElementById("lab").value = visit.lab;

            if (visit["wight"] !== undefined){
                document.getElementById("wight").value = visit.wight;
            }else{
                document.getElementById("wight").value = '0';
            }

            if (visit["coast"] !== undefined){
                document.getElementById("coast").value = visit.coast;
            }else{
                document.getElementById("coast").value = 0;
            }

            if (visit["payed"] !== undefined){
                document.getElementById("payed").value = visit.payed;
            }else{

        function formatDate(date) {
            const d = new Date(date);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();

            if (month.length < 2)
                month = '0' + month;
            if (day.length < 2)
                day = '0' + day;

            return [year,day ,month ].join('-');
        }

        function formatyear() {
            const today = new Date().toISOString().split('T')[0];
            const d = new Date(today);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear()+1;

            if (month.length < 2)
                month = '0' + month;
            if (day.length < 2)
                day = '0' + day;

            return [year, "01", "01"].join('-');
        }

        function totald(visitData){

            if (parseFloat(visitData.payed)>0 && parseFloat(visitData.coast)>0){
                res= parseFloat(visitData.coast) - parseFloat(visitData.payed);
                document.getElementById("debit").value = res;
                visitData.debit = res;
            }else if (parseFloat(visitData.debit)!==0 && parseFloat(visitData.coast)>0){
                if (parseFloat(visitData.debit)>0){
                    res= parseFloat(visitData.coast) - parseFloat(visitData.debit);
                    document.getElementById("payed").value =res;
                    visitData.payed = res;
                }else{
                    res= parseFloat(visitData.coast) + parseFloat(visitData.debit);
                    document.getElementById("payed").value =res;
                    visitData.payed = res;
                }
            }else if (parseFloat(visitData.debit)!==0 && parseFloat(visitData.payed)>0){
                res=parseFloat(visitData.payed) + parseFloat(visitData.debit);
                document.getElementById("coast").value = res;
                visitData.coast = res;
            }else if (parseFloat(visitData.coast)>0){
                res=parseFloat(visitData.coast);
                document.getElementById("debit").value = res;
                visitData.coast = res;
            }
            return visitData;
        }

        function getNextWidget(currentWidget) {
            const keys = Object.keys(entryWidgets);
            const currentKey = keys.find(k => entryWidgets[k] === currentWidget);
            const currentIndex = keys.indexOf(currentKey);

            if (currentIndex >= 0 && currentIndex < keys.length - 1) {
                return entryWidgets[keys[currentIndex + 1]];
            }
            return null;
        }

            // Find visit by date

            if (result) {
                // Update the current visit index based on the search result
                const visitIndex = visits.findIndex(visit => visit.visit_date === result.visit_date && visit.patient_no === result.patient_no);

        function deleteFile(fileUrl) {
            const isConfirmed = confirm("Are you sure you want to delete this file?");
            if (!isConfirmed) {
                return; // Exit the function if the user does not confirm
            }
            fetch(`/deleteFile?url=${encodeURIComponent(fileUrl)}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Server error response: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('File deleted successfully:', data);
                // Update the UI or perform further actions
                fetchFiles();  // Refresh file list
            })
            .catch(error => {
                console.error('Error deleting file:', error);
            });
        }

        function createFilePreviewElement(file) {
            const filePreview = document.createElement("div");
            filePreview.classList.add("file-preview");

            // Create a clickable link element
            const fileLink = document.createElement("a");
            fileLink.href = file.data;
            fileLink.target = "_blank";

            let previewElement;
                if (file.file_type.includes('image')){
                    previewElement = document.createElement("img");
                    previewElement.src = file.data; // Use file URL
                }else if(file.file_type.includes('video')) {
                    previewElement = document.createElement("video");
                    previewElement.controls = true;
                    previewElement.classList.add("vidPerv");
                    previewElement.src = file.data; // Use file URL
                }else if (file.file_type.includes('text')) {
                    previewElement = document.createElement("h3");
                    previewElement.classList.add("txtPrev");
                    previewElement.innerText = file.name; // Use file URL
                }else if (file.file_type.includes('pdf')) {
                    previewElement = document.createElement("h3");
                    previewElement.classList.add("txtPrev");
                    previewElement.innerText = file.name; // Use file URL
                }else{
                    previewElement = document.createElement("h3");
                    previewElement.classList.add("txtPrev");
                    previewElement.innerText = file.name; // Use file URL
                }

            const deleteBtn = document.createElement('span');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerHTML = '&times;';
            deleteBtn.onclick = () => deleteFile(file.data);

            fileLink.appendChild(previewElement);
            filePreview.appendChild(deleteBtn)
            filePreview.appendChild(fileLink);
            return filePreview;
        }
        
        function printVisit() {
            const isConfirmed = confirm("After printing you cant change this visits info , are you sure you want to print this visit? \n في حال الطباعة لا يمكن تغيير معلومات الزيارة ,هل تريد الطباعة؟");
            if (!isConfirmed) {
                return; // Exit the function if the user does not confirm
            }
            fetch('/kkprint', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vno: currentVisitIndex })
            })
            .then(response => {
                if (response.ok) {
                    // Extract the filename from the Content-Disposition header
                    const disposition = response.headers.get('Content-Disposition');
                    const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : 'visit.docx';
        
                    return response.blob().then(blob => {
                        // Create a link element to trigger the download
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'visit.docx';
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                    });
                    
                } else {
                    throw new Error('Failed to download the visit document');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to print visit. Please try again.');
            });

            fetch(`/getPatientData`)
            .then(response => response.json())
            .then(data => {
                visits = data.visits;
                patientNumber = data.patientss_number+1; // Set patient number// Display patient number
                populatePatientData(visits[currentVisitIndex]);
                
                
                
            })
            .catch(error => console.error('Error fetching patient data:', error));
        }
