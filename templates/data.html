<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="google-site-verification" content="CdS-jnmDkiXrSvujf6OARsOgBIBGsMPk0GrTKOs2w2Q" />
  <link rel="icon" href="/static/images/w3.jpg" />
  <title>Binder Medical</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --bg-main: #D9C4B0;    /* background */
      --accent:  #ce7a35;    /* accent */
      --secondary:#78cee6;   /* secondary */
      --card: rgba(255,255,255,0.96);
      --muted: #6b6b6b;
      --text: #1f2937;
    }

    html,body { height: 100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, var(--bg-main), #f6efe6 65%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ----------------------
       MENU (unchanged style requested)
       ---------------------- */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 25px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.3s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }
    .menu-active .menu__btn span { transform: rotate(45deg); background-color: var(--accent); }
    .menu-active .menu__btn span::before { transform: rotate(90deg); top:0; }
    .menu-active .menu__btn span::after { opacity:0; }
    .menu__box { transition: transform 0.3s ease, opacity 0.3s ease; transform: translateX(-100%); opacity: 0; }
    .menu-active .menu__box { transform: translateX(0); opacity: 1; }
    .menu__item { display:flex; gap:10px; align-items:center; padding:12px 18px; border-radius:10px; color:var(--text); }
    .menu__item:hover { background: rgba(255,255,255,0.6); }

    /* PAGE LAYOUT */
    .page-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:3.5rem 1rem; }
    .card {
      width:100%; max-width:1100px;
      background: var(--card);
      border-radius:18px;
      padding:1.5rem;
      box-shadow: 0 14px 40px rgba(12,12,14,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }

    /* INPUT STYLING: gradient border effect + padding for all inputs and textareas */
    .input-control {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 12px;
      padding: 0.75rem 0.95rem;
      font-size: 0.98rem;
      line-height: 1.2;
      background: linear-gradient(180deg,#fff,#fbfbfb);
      border: 2px solid transparent; /* transparent because we use background-clip trick */
      background-image:
        linear-gradient(#fff,#fff),
        linear-gradient(90deg, rgba(187,220,229,0.9), rgba(207,171,141,0.65));
      background-origin: padding-box, border-box;
      background-clip: padding-box, border-box;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.03);
      transition: box-shadow .14s ease, transform .06s ease, filter .12s ease;
      color: var(--text);
      width:100%;
      box-sizing:border-box;
      outline: none;
    }

    /* textarea same visual style */
    textarea.input-control { min-height: 98px; resize: vertical; padding-top:0.85rem; padding-bottom:0.85rem; }

    /* focus */
    .input-control:focus {
      transform: translateY(-1px);
      box-shadow:
        0 10px 30px rgba(11,20,23,0.06),
        0 0 0 6px rgba(187,220,229,0.18); /* soft halo using accent */
    }

    .field-label { font-weight: 600; color: #111827; margin-bottom: 6px; display:block; }

    /* white (ghost) buttons: clearer, bordered, hover */
    .ghost-btn {
      background: linear-gradient(180deg, var(--secondary), rgba(131, 207, 226, 0.98));
      border: 1px solid rgba(16,24,40,0.06);
      color: #111827;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(2,6,23,0.04);
      transition: transform .08s ease, box-shadow .12s ease, background .12s;
      font-weight: 600;
    }
    .ghost-btn:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(16,24,40,0.09); }

    /* primary/colored btns */
    .primary-btn {
      background: linear-gradient(90deg, var(--secondary), rgba(187,220,229,0.9));
      color: #072024;
      padding: 0.68rem 1rem;
      border-radius: 12px;
      border: none;
      font-weight:700;
      box-shadow: 0 10px 30px rgba(11,20,23,0.06);
      cursor: pointer;
      transition: transform .08s ease;
    }
    .primary-btn:hover { transform: translateY(-3px); }

    .muted { color: var(--muted); font-size: .95rem; }
    .grid-cols-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:1.25rem; }
    @media (max-width:860px){ .grid-cols-2{ grid-template-columns: 1fr; } }

    .file-preview { position: relative; display:inline-block; margin:.5rem; }
    .file-preview img, .file-preview video { height: 110px; border-radius:8px; display:block; }
    .file-remove { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.6); color:white; width:28px; height:28px; border-radius:999px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:80; }
    .modal-card { width:95%; max-width:1000px; background:white; border-radius:12px; padding:1rem; box-shadow:0 18px 50px rgba(0,0,0,0.28); }
    .toast { position: fixed; right: 20px; bottom: 20px; z-index: 90; display:flex; flex-direction:column; gap:.5rem; }
    .toast .item { background:#111827; color:#fff; padding:.65rem 1rem; border-radius:8px; box-shadow:0 8px 20px rgba(2,6,23,0.4); }
  </style>
</head>
<body>

  <!-- MENU -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li><a class="menu__item" href="/acc"><img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account"/><span>Account</span></a></li>
        <li><a class="menu__item" href="/home_page"><img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add"/><span>Add</span></a></li>
        <li><a class="menu__item" href="/srch"><img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search"/><span>Search</span></a></li>
        <li><a class="menu__item" href="/stats"><img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats"/><span>Stats</span></a></li>
        <li><a id="appa" class="menu__item" href="/appointments"><img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments"/><span id="apph6">Appointments</span></a></li>

        <li class="border-t border-[var(--secondary)] my-1"></li>
        <li><a class="menu__item" href="/back"><img class="icoo w-6 h-6" src="/static/images/back.png" alt="Back"/><span>Back</span></a></li>
        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li><a class="menu__item" href="/lab_page"><img class="icoo w-6 h-6" src="/static/images/lab.png" alt="Lab"/><span>Lab</span></a></li>
        <li><a class="menu__item" href="/radio_page"><img class="icoo w-6 h-6" src="/static/images/radio.png" alt="Radiology"/><span>Radiology</span></a></li>
        <li><a class="menu__item" href="/pharma_page"><img class="icoo w-6 h-6" src="/static/images/pharma.png" alt="Pharmacy"/><span>Pharmacy</span></a></li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li><a class="menu__item" href="/settings"><img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings"/><span>Settings</span></a></li>
        <li><a class="menu__item" href="/support"><img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support"/><span>Support</span></a></li>
      </ul>
    </div>
  </div>

  <!-- MAIN -->
  <div class="page-wrap">
    <div class="card">

      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
          <img src="/static/images/w3.jpg" class="w-14 h-14 rounded-full shadow-sm" alt="logo"/>
          <div>
            <h2 class="text-2xl font-semibold">Patient Visit</h2>
            <p class="muted text-sm">Create or edit visit entries, attach files, print and lock visits.</p>
          </div>
        </div>

        <div class="space-x-3">
          <button id="openFolderBtn" class="primary-btn">Patient Folder</button>
          <button id="printBtn" class="primary-btn">Print visit</button>
          <button id="saveBtn" class="ghost-btn">Save</button>
        </div>
      </div>

      <form id="visitForm" class="grid-cols-2">
        <div class="space-y-4">
          <label class="field-label">Visit Date</label>
          <input id="visitDate" type="date" class="input-control" />

          <label class="field-label">Dr. name</label>
          <input id="drname" type="text" class="input-control" />

          <label class="field-label">Diagnosis</label>
          <textarea id="diagnosis" class="input-control" placeholder="Enter diagnosis..."></textarea>

          <label class="field-label">Treatment</label>
          <textarea id="treatment" class="input-control" placeholder="Enter treatment..."></textarea>

          <label class="field-label">Lab</label>
          <textarea id="lab" class="input-control" placeholder="Lab requests, notes..."></textarea>
        </div>

        <div class="space-y-4">
          <label class="field-label">Weight</label>
          <input id="wight" type="text" placeholder="kg" class="input-control" />

          <label class="field-label">Height</label>
          <input id="height" type="text" placeholder="cm" class="input-control" />

          <label class="field-label">Cost</label>
          <input id="coast" type="text" class="input-control" />

          <label class="field-label">Paid</label>
          <input id="payed" type="text" class="input-control" />

          <label class="field-label">Debit</label>
          <input id="debit" type="text" class="input-control" />
        </div>

        <div style="grid-column:1/ -1;">
          <label class="field-label">Details</label>
          <textarea id="details" class="input-control" rows="6">Details</textarea>
        </div>
      </form>

      <div class="mt-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex flex-wrap gap-2">
          <button id="firstButton" class="ghost-btn">First</button>
          <button id="prevButton" class="ghost-btn">Prev</button>
          <button id="nextButton" class="ghost-btn">Next</button>
          <button id="lastButton" class="ghost-btn">Last</button>
        </div>

        <div class="flex items-center gap-3">
          <input id="search" type="date" class="input-control" style="width:200px;" />
          <button id="searchButton" class="ghost-btn">Search</button>
        </div>
      </div>

    </div>
  </div>

  <!-- File modal -->
  <div id="fileModal" class="modal-backdrop">
    <div class="modal-card">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Patient Files</h3>
        <button id="closeModal" class="text-gray-600 hover:text-gray-900">&times;</button>
      </div>

      <div class="mb-4 flex gap-3">
        <button class="folder-btn px-3 py-2 rounded bg-[var(--accent)]/10" data-folder="drs">Doctor</button>
        <button class="folder-btn px-3 py-2 rounded" data-folder="lab">Lab</button>
        <button class="folder-btn px-3 py-2 rounded" data-folder="radiology">Radiology</button>
        <button class="folder-btn px-3 py-2 rounded" data-folder="pharmacies">Pharmacy</button>
      </div>

      <!-- uploadControls: we will show/hide this depending on selected folder -->
      <div id="uploadControls" class="flex items-center gap-3 mb-4">
        <input id="fileInput" type="file" multiple class="hidden" />
        <button id="chooseFile" class="px-3 py-2 rounded bg-gray-800 text-white">Choose files</button>
        <button id="uploadFiles" class="px-3 py-2 rounded bg-[var(--secondary)] text-white">Upload</button>

        <div id="uploadProgressContainer" class="ml-auto hidden items-center gap-2">
          <label class="text-sm">Uploading</label>
          <progress id="fileUploadProgress" value="0" max="100" class="w-56 h-3"></progress>
          <span id="progressText" class="text-sm"></span>
        </div>
      </div>

      <div id="filePreviews" class="grid grid-cols-3 gap-3"></div>
    </div>
  </div>

  <div id="toastContainer" class="toast"></div>

  <script>
    // small helpers
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    function showToast(text, type = 'info') {
      const c = $('#toastContainer');
      const el = document.createElement('div');
      el.className = 'item';
      el.textContent = text;
      if (type === 'error') el.style.background = '#B91C1C';
      if (type === 'success') el.style.background = '#059669';
      c.appendChild(el);
      setTimeout(()=> { el.style.opacity = '0'; setTimeout(()=> el.remove(), 400); }, 3000);
    }

    // menu toggle + bindings
    document.addEventListener('DOMContentLoaded', () => {
      const menuBtn = document.querySelector('.hamburger-menu');
      const menuBar = document.getElementById('menuBar');
      menuBtn.addEventListener('click', () => menuBar.classList.toggle('menu-active'));

      // buttons
      $('#searchButton').addEventListener('click', search);
      $('#prevButton').addEventListener('click', prev);
      $('#nextButton').addEventListener('click', next);
      $('#firstButton').addEventListener('click', first);
      $('#lastButton').addEventListener('click', last);
      $('#saveBtn').addEventListener('click', tacc);
      $('#openFolderBtn').addEventListener('click', () => openFile());
      $('#printBtn').addEventListener('click', () => { tacc(); printVisit(); });

      // file modal
      $('#closeModal').addEventListener('click', closeFileModal);
      $('#chooseFile').addEventListener('click', () => $('#fileInput').click());
      $('#fileInput').addEventListener('change', onFilesSelected);
      $('#uploadFiles').addEventListener('click', uploadFile);

      $$('.folder-btn').forEach(b => b.addEventListener('click', (e) => {
        $$('.folder-btn').forEach(x => x.classList.remove('bg-[var(--accent)]/20'));
        e.currentTarget.classList.add('bg-[var(--accent)]/20');
        selectFolder(e.currentTarget.dataset.folder || 'drs');
      }));

      // keyboard focus flow
      const entryWidgets = {
        visit_date: $('#visitDate'),
        drname: $('#drname'),
        diagnosis: $('#diagnosis'),
        treatment: $('#treatment'),
        lab: $('#lab'),
        wight: $('#wight'),
        height: $('#height'),
        coast: $('#coast'),
        payed: $('#payed'),
        debit: $('#debit'),
        details: $('#details'),
        search: $('#search')
      };
      Object.values(entryWidgets).forEach(widget => {
        if (!widget) return;
        widget.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            const fields = Object.values(entryWidgets).filter(Boolean);
            const idx = fields.indexOf(widget);
            if (idx >= 0 && idx < fields.length - 1) fields[idx + 1].focus();
          }
        });
      });

      fetchPatientData();
    });

    // state
    let visits = [];
    let currentVisitIndex = 0;
    let patientNumber = '';
    let selectedFolder = 'drs';

    function fetchPatientData() {
      fetch('/getPatientData')
        .then(r => r.json())
        .then(data => {
          visits = data.visits || [];
          patientNumber = (data.patientss_number || 0) + 1;
          if (visits.length) { currentVisitIndex = 0; populatePatientData(visits[0]); showToast('Patient data loaded', 'success'); }
          else { const t = { visit_date: '', drname:'', diagnosis:'', treatment:'', lab:'', wight: '0', height: '0', coast:0, payed:0, debit:0, details:'', vno:1 }; visits=[t]; currentVisitIndex=0; populatePatientData(t); }
        })
        .catch(err => { console.error(err); showToast('Failed to load patient data', 'error'); });
    }

    function populatePatientData(visit) {
      $('#visitDate').value = visit.visit_date || '';
      $('#drname').value = visit.drname || '';
      $('#diagnosis').value = visit.diagnosis || '';
      $('#treatment').value = visit.treatment || '';
      $('#lab').value = visit.lab || '';
      $('#wight').value = visit.wight ?? '0';
      $('#height').value = visit.height ?? '0';
      $('#coast').value = visit.coast ?? '0';
      $('#payed').value = visit.payed ?? '0';
      $('#debit').value = visit.debit ?? '0';
      $('#details').value = visit.details || 'Details';

      const printed = !!visit.printed;
      if (printed) {
        $$('#visitForm input, #visitForm textarea').forEach(el => el.disabled = true);
        $('#search').disabled = false;
        showToast('This visit is locked (printed).', 'info');
      } else {
        $$('#visitForm input, #visitForm textarea').forEach(el => el.disabled = false);
      }
      if (!visit.drname || visit.drname.trim() === '') $('#drname').disabled = false;
      else $('#drname').disabled = true;
    }

    // navigation
    function first() { fetch('/getPatientData').then(r=>r.json()).then(d=>{ visits = d.visits || visits; if (visits.length){ currentVisitIndex = 0; populatePatientData(visits[0]); } }); }
    function prev() { fetch('/getPatientData').then(r=>r.json()).then(d=>{ visits = d.visits || visits; if (currentVisitIndex > 0){ currentVisitIndex--; populatePatientData(visits[currentVisitIndex]); } }); }
    function next() { fetch('/getPatientData').then(r=>r.json()).then(d=>{ visits = d.visits || visits; const newIdx = currentVisitIndex + 1; if (visits[newIdx]){ currentVisitIndex = newIdx; populatePatientData(visits[newIdx]); } else { const t = { visit_date:'', drname:'', treatment:'', diagnosis:'', lab:'', wight:'0', height:'0', coast:0, payed:0, debit:0, details:'', vno:visits.length+1 }; visits.push(t); currentVisitIndex = visits.length-1; populatePatientData(t); } }); }
    function last() { fetch('/getPatientData').then(r=>r.json()).then(d=>{ visits = d.visits || visits; if (visits.length) { currentVisitIndex = visits.length - 1; populatePatientData(visits[currentVisitIndex]); } }); }

    function search() {
      const dateToSearch = $('#search').value;
      fetch('/getPatientData').then(r=>r.json()).then(data => {
        visits = data.visits || [];
        const found = visits.find(v => v.visit_date === dateToSearch);
        if (found) { currentVisitIndex = visits.indexOf(found); populatePatientData(found); showToast('Visit found', 'success'); }
        else showToast('No visit for that date', 'info');
      });
    }

    // save
    function tacc() {
      const visitData = {
        visit_date: $('#visitDate').value.trim(),
        drname: $('#drname').value.trim(),
        treatment: $('#treatment').value.trim(),
        diagnosis: $('#diagnosis').value.trim(),
        lab: $('#lab').value.trim(),
        wight: $('#wight').value || '0',
        height: $('#height').value || '0',
        debit: parseFloat($('#debit').value) || 0,
        payed: parseFloat($('#payed').value) || 0,
        coast: parseFloat($('#coast').value) || 0,
        details: ($('#details').value === 'Details' ? '' : $('#details').value.trim()),
        vno: (visits[currentVisitIndex] && visits[currentVisitIndex].vno) || (currentVisitIndex + 1)
      };
      if (!visitData.visit_date) { showToast('Visit date is required', 'error'); return; }
      totald(visitData);
      fetch('/updateVisitData', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(visitData) })
        .then(r=>r.json().catch(()=>({})))
        .then(()=> fetch('/updatePatientTotals', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ totalDebit: visitData.debit }) }))
        .then(()=> { showToast('Visit saved', 'success'); fetchPatientData(); })
        .catch(err => { console.error(err); showToast('Error saving visit', 'error'); });
    }

    function totald(visitData) {
      try {
        if (parseFloat(visitData.payed) > 0 && parseFloat(visitData.coast) > 0) {
          const res = parseFloat(visitData.coast) - parseFloat(visitData.payed);
          $('#debit').value = res; visitData.debit = res;
        } else if (parseFloat(visitData.debit) !== 0 && parseFloat(visitData.coast) > 0) {
          if (parseFloat(visitData.debit) > 0) {
            const res = parseFloat(visitData.coast) - parseFloat(visitData.debit);
            $('#payed').value = res; visitData.payed = res;
          } else {
            const res = parseFloat(visitData.coast) + parseFloat(visitData.debit);
            $('#payed').value = res; visitData.payed = res;
          }
        } else if (parseFloat(visitData.debit) !== 0 && parseFloat(visitData.payed) > 0) {
          const res = parseFloat(visitData.payed) + parseFloat(visitData.debit);
          $('#coast').value = res; visitData.coast = res;
        } else if (parseFloat(visitData.coast) > 0) {
          const res = parseFloat(visitData.coast);
          $('#debit').value = res; visitData.debit = res;
        }
      } catch(e) { console.error('totald error', e); }
      return visitData;
    }

    function printVisit() {
      if (!confirm("After printing you can't change this visit's info. Continue?")) return;
      fetch('/kkprint', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vno: currentVisitIndex }) })
      .then(resp => { if (!resp.ok) throw new Error('Print failed'); return resp.blob(); })
      .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'visit.docx'; document.body.appendChild(a); a.click();
        url && window.URL.revokeObjectURL(url);
        showToast('Visit printed and locked', 'success');
        fetchPatientData();
      })
      .catch(err => { console.error(err); showToast('Print failed', 'error'); });
    }

    // FILE MANAGER: implemented selectFolder behavior to show upload controls only for 'drs'
    function openFile() {
      $('#fileModal').style.display = 'flex';
      $('#fileModal').style.alignItems = 'center';
      $('#fileModal').style.justifyContent = 'center';
      selectFolder('drs'); // default open doctor folder
    }
    function closeFileModal() {
      $('#fileModal').style.display = 'none';
      $('#filePreviews').innerHTML = '';
    }

    function selectFolder(folder) {
      selectedFolder = folder || 'drs';
      const uploadControls = $('#uploadControls');
      const fileInput = $('#fileInput');
      const uploadButton = $('#uploadFiles');
      // Show upload input only for the 'drs' folder
      if (selectedFolder === 'drs') {
        // make upload controls visible and interactive
        uploadControls.style.display = 'flex';
        // ensure choose/upload are visible (fileInput stays hidden but triggered by chooseFile)
        if (fileInput) fileInput.disabled = false;
        if (uploadButton) uploadButton.disabled = false;
      } else {
        // hide upload controls for other folders
        uploadControls.style.display = 'none';
        if (fileInput) fileInput.disabled = true;
        if (uploadButton) uploadButton.disabled = true;
      }
      fetchFiles();
    }

    function onFilesSelected(e) {
      if ($('#fileInput').files.length) {
        showToast(`${$('#fileInput').files.length} files selected`, 'info');
      }
    }

    function uploadFile() {
      const files = $('#fileInput').files;
      if (!files || files.length === 0) { showToast('No files selected', 'error'); return; }
      if (selectedFolder !== 'drs') { showToast("Uploads allowed only in Doctor folder", 'error'); return; }

      const patientNo = patientNumber;
      const totalFiles = files.length;
      let currentIndex = 0;
      $('#uploadProgressContainer').classList.remove('hidden');

      function uploadNext() {
        if (currentIndex >= totalFiles) {
          $('#uploadProgressContainer').classList.add('hidden');
          $('#fileInput').value = '';
          showToast('All files uploaded', 'success');
          fetchFiles();
          return;
        }
        const file = files[currentIndex];
        const form = new FormData();
        form.append('file', file);
        form.append('patient_no', patientNo);
        form.append('folder', selectedFolder);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/uploadFile', true);
        xhr.upload.onprogress = function (ev) {
          if (!ev.lengthComputable) return;
          const filePercent = (ev.loaded / ev.total) * 100;
          const overall = Math.round(( (currentIndex / totalFiles) * 100) + (filePercent / totalFiles));
          $('#fileUploadProgress').value = overall;
          $('#progressText').textContent = `${overall}%`;
        };
        xhr.onload = function () {
          if (xhr.status === 200) { currentIndex++; uploadNext(); }
          else { showToast('Upload failed: ' + xhr.statusText, 'error'); $('#uploadProgressContainer').classList.add('hidden'); }
        };
        xhr.onerror = function () { showToast('Upload error', 'error'); $('#uploadProgressContainer').classList.add('hidden'); };
        xhr.send(form);
      }
      uploadNext();
    }

    function fetchFiles() {
      const patientNo = patientNumber || '';
      const folder = encodeURIComponent(selectedFolder || 'drs');
      fetch(`/getFiles?patient_no=${patientNo}&folder=${folder}`).then(r=>r.json()).then(files => renderFiles(files || [])).catch(err => { console.error(err); showToast('Failed to fetch files', 'error'); });
    }

    function renderFiles(files) {
      const container = $('#filePreviews'); container.innerHTML = '';
      if (!files || !files.length) { container.innerHTML = '<div class="text-gray-500">No files</div>'; return; }
      files.forEach(file => {
        const div = document.createElement('div'); div.className = 'file-preview';
        const link = document.createElement('a'); link.href = file.data; link.target = '_blank';
        if (file.file_type.includes('image')) { const img = document.createElement('img'); img.src = file.data; link.appendChild(img); }
        else if (file.file_type.includes('video')) { const v = document.createElement('video'); v.src = file.data; v.controls = true; v.className = 'rounded'; link.appendChild(v); }
        else { const txt = document.createElement('div'); txt.className='p-3 border rounded txtPrev'; txt.textContent = file.name || 'file'; link.appendChild(txt); }
        if (selectedFolder === 'drs') {
          const rem = document.createElement('div'); rem.className = 'file-remove'; rem.innerHTML = '&times;';
          rem.addEventListener('click', (e) => { e.preventDefault(); if (!confirm('Delete this file?')) return; deleteFile(file.data); });
          div.appendChild(rem);
        }
        div.appendChild(link); container.appendChild(div);
      });
    }

    function deleteFile(url) { fetch(`/deleteFile?url=${encodeURIComponent(url)}`, { method:'DELETE' }).then(r=>r.json()).then(()=>{ showToast('File deleted', 'success'); fetchFiles(); }).catch(e=>{ console.error(e); showToast('Delete failed', 'error'); }); }

    window.openFile = openFile;
    window.printVisit = printVisit;
  </script>
</body>
</html>
