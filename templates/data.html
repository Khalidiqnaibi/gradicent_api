<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Binder Medical</title>
  <link rel="icon" href="/static/images/w3.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #ce7a35;
      --secondary: #78cee6;
      --bg-main: #d8bda4;
      --card: rgba(255,255,255,0.97);
    }
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial;
      background: linear-gradient(180deg, var(--bg-main), #f9f5f1 65%);
    }
/* Hamburger lines */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display: block;
      width: 25px;
      height: 3px;
      background-color: var(--accent);
      position: relative;
      border-radius: 6px;
      transition: 0.3s ease;
    }
    .menu__btn span::before,
    .menu__btn span::after {
      content: "";
      position: absolute;
      left: 0;
    }
    .menu__btn span::before { top: -8px; }
    .menu__btn span::after { top: 8px; }

    /* Toggle open */
    .menu-active .menu__btn span {
      transform: rotate(45deg);
      background-color: var(--accent);
    }
    .menu-active .menu__btn span::before {
      transform: rotate(90deg);
      top: 0;
    }
    .menu-active .menu__btn span::after {
      opacity: 0;
    }

    /* Menu transitions */
    .menu__box {
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateX(-100%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }
    /* Card */
    .card { background: var(--card); border-radius: 18px; padding: 2rem;
      max-width: 1100px; width: 100%; box-shadow: 0 12px 36px rgba(0,0,0,0.08);}
    .input-control {border-radius:10px; padding:0.75rem; background:#fff;
      border:1.5px solid var(--accent); width:100%; transition:.2s;}
    .input-control:focus {outline:none; border-color:var(--secondary);
      box-shadow:0 0 0 4px rgba(187,220,229,0.35);}
    .btn {padding:0.6rem 1rem; border-radius:10px; font-weight:600;
      transition:.15s; cursor:pointer;}
    .btn-accent {background:var(--accent); color:#000;}
    .btn-ghost {background:#fff; border:1px solid var(--accent);}
    .btn:hover {transform:translateY(-2px);}

    /* Toast */
    #toastContainer .item {padding:0.75rem 1rem; border-radius:10px;
      color:white; font-weight:500; box-shadow:0 4px 12px rgba(0,0,0,.15);
      opacity:1; transform:translateX(0);
      transition:opacity .4s ease, transform .4s ease;}
    #toastContainer .item.info{background:#3b82f6;}
    #toastContainer .item.success{background:#10b981;}
    #toastContainer .item.error{background:#ef4444;}
    #toastContainer .item.hide{opacity:0; transform:translateX(30px);}

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999; /* make sure it’s above modal */
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-container .item {
      background: #333;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      opacity: 1;
      transition: opacity 0.4s;
      box-shadow: 0 4px 8px rgba(0,0,0,.2);
    }
    .toast-container .item.success { background: #059669; }
    .toast-container .item.error   { background: #B91C1C; }
    .toast-container .item.info    { background: #2563EB; }
    .toast-container .item.hide    { opacity: 0; }

    textarea{
      height: 41px;
    }

    #details{
      height: 125px;
    }

    /* File Modal */
    #fileModal {display:none;}
    .file-preview img, .file-preview video {max-height:120px; border-radius:8px;}
    .txtPrev {padding:1rem; border:1px solid #ddd; border-radius:8px;
      text-align:center; font-size:.85rem; background:#f3f3f3;}
    
    #filePreviews{
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <!-- Toasts -->
  <div id="toastContainer" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50"></div>

  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/back">
            <img class="icoo w-6 h-6" src="/static/images/back.png" alt="Back"/>
            <h6 class="text-sm font-medium">Back</h6>
          </a>
        </li>
        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- MAIN -->
  <div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="card">
      <div class="flex flex-col md:flex-row md:justify-between mb-6 gap-4">
        <div class="flex gap-4 items-center">
          <img src="/static/images/w3.jpg" class="w-16 h-16 rounded-full shadow">
          <div><h2 class="text-2xl font-semibold">Patient Visit</h2>
            <p class="text-gray-500 text-sm">Manage visit entries, attach files, print or lock visits.</p></div>
        </div>
        <div class="flex gap-2 items-center">
          <input id="search" type="date" class="input-control w-44"/>
          <button id="searchButton" class="btn btn-ghost">Search</button>
        </div>
      </div>

      <!-- Visit Form -->
      <form id="visitForm" class="grid md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <label>Visit Date</label><input id="visitDate" type="date" class="input-control"/>
          <label>Doctor</label><input id="drname" type="text" class="input-control"/>
          <label>Diagnosis</label><textarea id="diagnosis" class="input-control" placeholder="Enter diagnosis..."></textarea>
          <label>Treatment</label><textarea id="treatment" class="input-control" placeholder="Enter treatment..."></textarea>
          <label>Lab</label><textarea id="lab" class="input-control" placeholder="Enter lab results..."></textarea>
        </div>
        <div class="space-y-4">
          <label>Weight (kg)</label><input id="wight" class="input-control" placeholder="Enter weight..."/>
          <label>Height (cm)</label><input id="height" class="input-control" placeholder="Enter height..."/>
          <label>Coast</label><input id="coast" class="input-control" placeholder="Enter coast..."/>
          <label>Paid</label><input id="payed" class="input-control" placeholder="Enter paid amount..."/>
          <label>Debt</label><input id="debt" class="input-control" placeholder="Enter debt amount..."/>
        </div>
        <div class="md:col-span-2">
          <label>Notes</label><textarea id="details" class="input-control" rows="5" placeholder="Enter additional notes..."></textarea>
        </div>
      </form>

      <!-- Controls -->
      <div class="mt-6 flex flex-col md:flex-row md:justify-between gap-4">
        <div class="flex flex-wrap gap-2">
          <button id="firstButton" class="btn btn-ghost">First</button>
          <button id="prevButton" class="btn btn-ghost">Prev</button>
          <button id="nextButton" class="btn btn-ghost">Next</button>
          <button id="lastButton" class="btn btn-ghost">Last</button>
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="openFolderBtn" class="btn btn-accent">Patient Folder</button>
          <button id="printBtn" class="btn btn-accent">Print Visit</button>
          <button id="saveBtn" class="btn btn-ghost">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- File Modal -->
  <div id="fileModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50">
    <div class="bg-white rounded-2xl p-6 shadow-xl w-full max-w-3xl mx-auto my-10 flex flex-col relative">
      <button id="closeModal" class="absolute top-4 right-4 text-2xl">&times;</button>
      <h3 class="text-xl font-semibold mb-4">Patient Files</h3>
      <div class="flex gap-2 mb-4">
        <button class="folder-btn btn btn-ghost" data-folder="drs">Doctor</button>
        <button class="folder-btn btn btn-ghost" data-folder="radio">Radiology</button>
        <button class="folder-btn btn btn-ghost" data-folder="lab">Lab</button>
      </div>
      <div id="uploadControls" class="hidden flex flex-col gap-3 mb-4">
        <div id="dropZone" class="w-full border-2 border-dashed rounded-xl p-6 text-center text-gray-500 cursor-pointer hover:border-[var(--accent)]">
          Drag & Drop or click Choose
        </div>
        <div class="flex gap-2">
          <button id="chooseFile" class="btn btn-ghost">Choose</button>
          <input id="fileInput" type="file" class="hidden" multiple />
          <button id="uploadFiles" class="btn btn-accent">Upload</button>
        </div>
        <div id="uploadProgressContainer" class="hidden">
          <progress id="fileUploadProgress" value="0" max="100" class="w-full h-3 rounded-lg"></progress>
          <span id="progressText" class="block text-center text-sm mt-1 text-gray-600"></span>
        </div>
      </div>
      <div id="filePreviews" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4"></div>
    </div>
  </div>

  <script>
  // Helpers
  const $  = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));
  
  /**
   * Tracks real active time on the page and sends ONLY one final value:
   * { seconds: totalActiveSeconds }
   *
   * Usage:
   * startUsageTracker("/track_time");
   */
  function startUsageTracker(endpoint) {

    let totalActiveSeconds = 0;
    let active = true;

    // Count only when the page is visible & focused
    document.addEventListener("visibilitychange", () => {
      active = !document.hidden;
    });

    window.addEventListener("blur", () => { active = false; });
    window.addEventListener("focus", () => { active = true; });

    // Tick every second → adds to active use
    setInterval(() => {
      if (active) totalActiveSeconds += 1;
    }, 1000);

    // Send the final total when the session ends
    function sendFinal() {
      if (totalActiveSeconds <= 0) return;

      const payload = JSON.stringify({ seconds: totalActiveSeconds });

      // Use sendBeacon so it always sends before page unload
      navigator.sendBeacon(endpoint, payload);
    }

    // On close / refresh / navigation
    window.addEventListener("beforeunload", sendFinal);

    // Return API for manual flush if needed
    return {
      getSeconds: () => totalActiveSeconds,
      flush: sendFinal
    };
  }

  // Toast system
  function showToast(text, type = 'info') {
    const c = document.getElementById('toastContainer');
    if (!c) return;

    const el = document.createElement('div');
    el.className = `item ${type}`;
    el.textContent = text;
    c.appendChild(el);

    // animate out after 3s
    setTimeout(() => {
      el.classList.add('hide');
      setTimeout(() => el.remove(), 400);
    }, 3000);
  }

  // State
  const API_TIMEOUT_MS = 10_000;
  const POLL_TRACK_INTERVAL_MS = 60_000;
  let visits = [];
  let currentVisitIndex = 0;
  let patientNumber = '{{client}}';
  let selectedFolder = 'drs';
  let domain = "";
  
  async function safe_fetch(url, opts = {}) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
    opts.signal = controller.signal;

    try {
      const res = await fetch(url, opts);
      clearTimeout(timeout);
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        const err = new Error(`HTTP ${res.status} ${res.statusText}`);
        err.status = res.status;
        err.body = text;
        throw err;
      }
      // assume JSON by default
      const ct = (res.headers.get('content-type') || '');
      if (ct.includes('application/json')) return res.json();
      return res.text();
    } catch (err) {
      clearTimeout(timeout);
      throw err;
    }
  }

  async function get_domain() {
    try {
      const data = await safe_fetch('/api/binder/get_domain', { method: 'GET' });
      if (data && (typeof data.data === 'string' || typeof data.domain === 'string')) {
        return data.data || data.domain;
      }
    } catch (err) {
      console.log(err)
    }
    console.log("nigga error in domain")
    return "medical";
  }

  document.addEventListener('DOMContentLoaded', async function() {
    // Hamburger menu
    domain = await get_domain();
    const menuBtn = document.querySelector('.hamburger-menu');
    const menuBar = document.getElementById('menuBar');
    menuBtn.addEventListener('click', () => {
      menuBar.classList.toggle('menu-active');
    });
    const usage = startUsageTracker("/track_time");
    // Button bindings
    $('#searchButton').addEventListener('click', search);
    $('#prevButton').addEventListener('click', prev);
    $('#nextButton').addEventListener('click', next);
    $('#firstButton').addEventListener('click', first);
    $('#lastButton').addEventListener('click', last);
    $('#saveBtn').addEventListener('click', save);
    $('#openFolderBtn').addEventListener('click', openFile);
    $('#printBtn').addEventListener('click', () => { save(); printVisit(); });

    // File modal
    $('#closeModal').addEventListener('click', closeFileModal);
    $('#chooseFile').addEventListener('click', () => $('#fileInput').click());
    $('#fileInput').addEventListener('change', onFilesSelected);
    $('#uploadFiles').addEventListener('click', uploadFile);

    $$('.folder-btn').forEach(b => b.addEventListener('click', (e) => {
      $$('.folder-btn').forEach(x => x.classList.remove('bg-[var(--accent)]/20'));
      e.currentTarget.classList.add('bg-[var(--accent)]/20');
      selectFolder(e.currentTarget.dataset.folder || 'drs');
    }));

    // Keyboard flow
    const entryWidgets = {
      visit_date: $('#visitDate'), drname: $('#drname'),
      diagnosis: $('#diagnosis'), treatment: $('#treatment'),
      lab: $('#lab'), wight: $('#wight'),
      height: $('#height'), coast: $('#coast'),
      payed: $('#payed'), debit: $('#debt'),
      details: $('#details'), search: $('#search')
    };
    Object.values(entryWidgets).forEach(widget => {
      if (!widget) return;
      widget.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey && widget.tagName !== 'TEXTAREA') {
          e.preventDefault();
          const fields = Object.values(entryWidgets).filter(Boolean);
          const idx = fields.indexOf(widget);
          if (idx >= 0 && idx < fields.length - 1) fields[idx + 1].focus();
        }
      });
    });

    fetchPatientData();
  });

  // Patient data
  function fetchPatientData() {
    fetch(`/api/binder/clients/${patientNumber}?domain=${domain}`)
      .then(r => r.json())
      .then(data => {
        console.log(data);
        data = data.data;
        console.log(data);
        visits = data.visits || [];
        if (visits.length) {
          currentVisitIndex = 0;
          populatePatientData(visits[0]);
          showToast('Patient data loaded', 'success');
        } else {
          const t = { visit_date: '', drname:'', diagnosis:'', treatment:'', lab:'', wight:'0', height:'0', coast:0, payed:0, debit:0, details:'', vno:1 };
          visits=[t]; currentVisitIndex=0; populatePatientData(t);
        }
      })
      .catch(err => { console.error(err); showToast('Failed to load client data', 'error'); });
  }

  function populatePatientData(visit) {
    $('#visitDate').value = visit.visit_date || '';
    $('#drname').value = visit.drname || '';
    $('#diagnosis').value = visit.diagnosis || '';
    $('#treatment').value = visit.treatment || '';
    $('#lab').value = visit.lab || '';
    $('#wight').value = visit.wight ?? '0';
    $('#height').value = visit.height ?? '0';
    $('#coast').value = visit.coast ?? '0';
    $('#payed').value = visit.payed ?? '0';
    $('#debt').value = visit.debit ?? '0';
    $('#details').value = visit.details || '';

    const printed = !!visit.printed;
    if (printed) {
      $$('#visitForm input, #visitForm textarea').forEach(el => el.disabled = true);
      $('#search').disabled = false;
      showToast('This visit is locked (printed).', 'info');
    } else {
      $$('#visitForm input, #visitForm textarea').forEach(el => el.disabled = false);
    }
    if (!visit.drname || visit.drname.trim() === '') $('#drname').disabled = false;
    else $('#drname').disabled = true;
  }

  // Navigation
  function first() { if(visits.length){ currentVisitIndex=0; populatePatientData(visits[0]); } }
  function prev() { if(currentVisitIndex>0){ currentVisitIndex--; populatePatientData(visits[currentVisitIndex]); } }
  function next() {
    const newIdx=currentVisitIndex+1;
    if(visits[newIdx]){ currentVisitIndex=newIdx; populatePatientData(visits[newIdx]); }
    else {
      const t={visit_date:'', drname:'', treatment:'', diagnosis:'', lab:'', wight:'0', height:'0', coast:0, payed:0, debit:0, details:'', vno:visits.length+1};
      visits.push(t); currentVisitIndex=visits.length-1; populatePatientData(t);
    }
  }
  function last() { if(visits.length){ currentVisitIndex=visits.length-1; populatePatientData(visits[currentVisitIndex]); } }

  function search() {
    const dateToSearch=$('#search').value;
    const found=visits.find(v=>v.visit_date===dateToSearch);
    if(found){ currentVisitIndex=visits.indexOf(found); populatePatientData(found); showToast('Visit found','success'); }
    else showToast('No visit for that date','info');
  }

  // Save
  function save() {
    const visitData = {
      visit_date: $('#visitDate').value.trim(),
      drname: $('#drname').value.trim(),
      treatment: $('#treatment').value.trim(),
      diagnosis: $('#diagnosis').value.trim(),
      lab: $('#lab').value.trim(),
      wight: $('#wight').value || '0',
      height: $('#height').value || '0',
      debit: parseFloat($('#debt').value) || 0,
      payed: parseFloat($('#payed').value) || 0,
      coast: parseFloat($('#coast').value) || 0,
      details: $('#details').value.trim(),
      vno: (visits[currentVisitIndex] && visits[currentVisitIndex].vno) || (currentVisitIndex+1)
    };
    if (!visitData.visit_date) { showToast('Visit date is required','error'); return; }
    totald(visitData);
    fetch(`/api/binder/clients/${patientNumber}/interactions`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({"user_id":user_id,"interaction_no" : currentVisitIndex +1,"domain":domain,"patch":visitData})})
      .then(()=> { showToast('Visit saved','success'); fetchPatientData(); })
      .catch(err=>{console.error(err); showToast('Error saving visit','error');});
  }

  function totald(visitData){
    try{
      if(parseFloat(visitData.payed)>0 && parseFloat(visitData.coast)>0){
        const res=parseFloat(visitData.coast)-parseFloat(visitData.payed);
        $('#debt').value=res; visitData.debit=res;
      } else if(parseFloat(visitData.debit)!==0 && parseFloat(visitData.coast)>0){
        if(parseFloat(visitData.debit)>0){
          const res=parseFloat(visitData.coast)-parseFloat(visitData.debit);
          $('#payed').value=res; visitData.payed=res;
        } else {
          const res=parseFloat(visitData.coast)+parseFloat(visitData.debit);
          $('#payed').value=res; visitData.payed=res;
        }
      } else if(parseFloat(visitData.debit)!==0 && parseFloat(visitData.payed)>0){
        const res=parseFloat(visitData.payed)+parseFloat(visitData.debit);
        $('#coast').value=res; visitData.coast=res;
      } else if(parseFloat(visitData.coast)>0){
        const res=parseFloat(visitData.coast);
        $('#debt').value=res; visitData.debit=res;
      }
    } catch(e){ console.error('totald error',e);}
    return visitData;
  }

  function printVisit(){
    if(!confirm("After printing you can't change this visit's info. Continue?")) return;
    fetch('/kkprint',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ vno: currentVisitIndex })})
      .then(resp=>{ if(!resp.ok) throw new Error('Print failed'); return resp.blob(); })
      .then(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='visit.docx';
        document.body.appendChild(a); a.click();
        url && URL.revokeObjectURL(url);
        showToast('Visit printed and locked','success');
        fetchPatientData();
      })
      .catch(err=>{console.error(err); showToast('Print failed','error');});
  }

  // File manager
  function openFile(){ $('#fileModal').style.display='flex'; selectFolder('drs'); }
  function closeFileModal(){ $('#fileModal').style.display='none'; $('#filePreviews').innerHTML=''; }

  function selectFolder(folder){
    selectedFolder=folder||'drs';
    const uploadControls=$('#uploadControls');
    if(selectedFolder==='drs'){ uploadControls.style.display='flex'; }
    else { uploadControls.style.display='none'; }
    fetchFiles();
  }

  function onFilesSelected(e){
    if($('#fileInput').files.length) showToast(`${$('#fileInput').files.length} files selected`,'info');
  }

  function uploadFile(){
    const files=$('#fileInput').files;
    if(!files||files.length===0){ showToast('No files selected','error'); return; }
    if(selectedFolder!=='drs'){ showToast('Uploads only allowed in Doctor folder','error'); return; }

    const totalFiles=files.length; let currentIndex=0;
    $('#uploadProgressContainer').classList.remove('hidden');
    function uploadNext(){
      if(currentIndex>=totalFiles){
        $('#uploadProgressContainer').classList.add('hidden'); $('#fileInput').value='';
        showToast('All files uploaded','success'); fetchFiles(); return;
      }
      const file=files[currentIndex]; const form=new FormData();
      form.append('file',file); form.append('patient_no',patientNumber); form.append('folder',selectedFolder);

      const xhr=new XMLHttpRequest();
      xhr.open('POST','/uploadFile',true);
      xhr.upload.onprogress=function(ev){
        if(!ev.lengthComputable)return;
        const filePercent=(ev.loaded/ev.total)*100;
        const overall=Math.round(((currentIndex/totalFiles)*100)+(filePercent/totalFiles));
        $('#fileUploadProgress').value=overall; $('#progressText').textContent=`${overall}%`;
      };
      xhr.onload=function(){ if(xhr.status===200){ currentIndex++; uploadNext(); } else { showToast('Upload failed','error'); $('#uploadProgressContainer').classList.add('hidden'); }};
      xhr.onerror=function(){ showToast('Upload error','error'); $('#uploadProgressContainer').classList.add('hidden'); };
      xhr.send(form);
    }
    uploadNext();
  }

  function fetchFiles(){
    const folder=encodeURIComponent(selectedFolder||'drs');
    fetch(`/getFiles?patient_no=${patientNumber}&folder=${folder}`)
      .then(r=>r.json()).then(files=>renderFiles(files||[]))
      .catch(err=>{console.error(err); showToast('Failed to fetch files','error');});
  }

  function renderFiles(files){
    const c=$('#filePreviews'); c.innerHTML='';
    if(!files||!files.length){ c.innerHTML='<div class="text-gray-500">No files</div>'; return; }
    files.forEach(file=>{
      const div=document.createElement('div'); div.className='file-preview';
      const link=document.createElement('a'); link.href=file.data; link.target='_blank';
      if(file.file_type.includes('image')){ const img=document.createElement('img'); img.src=file.data; link.appendChild(img);}
      else if(file.file_type.includes('video')){ const v=document.createElement('video'); v.src=file.data; v.controls=true; v.className='rounded'; link.appendChild(v);}
      else { const txt=document.createElement('div'); txt.className='p-3 border rounded txtPrev'; txt.textContent=file.name||'file'; link.appendChild(txt);}
      if(selectedFolder==='drs'){ const rem=document.createElement('div'); rem.className='file-remove'; rem.innerHTML='&times;'; rem.onclick=(e)=>{e.preventDefault(); if(confirm('Delete this file?')) deleteFile(file.data);}; div.appendChild(rem);}
      div.appendChild(link); c.appendChild(div);
    });
  }

  function deleteFile(url){
    fetch(`/deleteFile?url=${encodeURIComponent(url)}`,{method:'DELETE'})
      .then(r=>r.json()).then(()=>{ showToast('File deleted','success'); fetchFiles(); })
      .catch(e=>{console.error(e); showToast('Delete failed','error');});
  }

  window.openFile=openFile;
  window.printVisit=printVisit;
</script>

</body>
</html>
