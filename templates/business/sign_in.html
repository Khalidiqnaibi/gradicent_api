<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome — Binder Business</title>
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <!-- Entity theme + onboarding styles -->
  <link href="/static/css/entity.css" rel="stylesheet">
  <link href="/static/css/signin.css" rel="stylesheet">
</head>

<body>
  <!-- Centered onboarding shell -->
  <div class="onboard-wrap">
    <div class="card" role="main" aria-labelledby="welcome-title">

      <!-- LEFT PANEL: intro, steps, and policy notes -->
      <div class="left-panel">
        <img src="/static/images/w3.jpg" alt="Binder logo" class="logo" />

        <div>
          <div class="h1" id="welcome-title">
            Almost there — set up your business
          </div>
          <div class="muted" style="margin-top:6px">
            Quick setup: business name, industry, location and phone.
            This helps clients find and contact you.
          </div>
        </div>

        <div class="step" style="width:100%; margin-top:8px;">
          <div style="min-width:120px;">
            <div class="muted">Account setup</div>
            <div style="font-weight:700">Step 2 of 2</div>
          </div>

          <div style="flex:1;">
            <div class="progress"><i></i></div>
          </div>
        </div>

        <p class="note" style="margin-top:10px;">
          By continuing you agree to our
          <a href="/terms" class="underline" style="color:var(--secondary)">Terms</a>
          and
          <a href="/privacy" class="underline" style="color:var(--secondary)">Privacy</a>.
        </p>
      </div>

      <!-- RIGHT PANEL: business setup form -->
      <div class="right-panel">
        <form id="signupForm"
              onsubmit="event.preventDefault(); sign();"
              novalidate>

          <!-- Business name field -->
          <div>
            <label class="field">Business name</label>
            <input
              id="drname"
              class="input"
              type="text"
              inputmode="text"
              autocomplete="organization"
              placeholder="Binder Solutions Ltd"
              required
            />
          </div>

          <!-- Business type / industry selector -->
          <div>
            <label class="field">Business Type</label>

            <div class="specialty" id="specialtyRoot">
              <button
                type="button"
                id="specBtn"
                class="spec-button"
                aria-haspopup="listbox"
                aria-expanded="false"
                onclick="toggleDropdown()">

                <img src="/static/images/down.png" alt="" aria-hidden="true" />
                <span id="specValue" class="muted">
                  Select a business type
                </span>
                <div style="margin-left:auto; font-size:13px; color:var(--text-muted)">
                  Select / Search
                </div>
              </button>

              <!-- Dropdown: searchable list of business types -->
              <div
                id="specDropdown"
                class="dropdown"
                role="listbox"
                aria-label="Business type list"
                style="display:none;">

                <div class="search">
                  <input
                    id="specSearch"
                    type="search"
                    placeholder="Search business types…"
                    aria-label="Search business types"
                    oninput="filterFunction()"
                  />
                </div>

                <div class="list" id="specList" tabindex="0">
                  <!-- populated by JS -->
                </div>
              </div>
            </div>
          </div>

          <!-- Location field -->
          <div>
            <label class="field">Business location</label>
            <input
              id="location"
              class="input"
              type="text"
              placeholder="Hebron, Palestine (street / area)"
              required
            />
          </div>

          <!-- Phone field -->
          <div>
            <label class="field">Phone number</label>
            <input
              id="phone"
              class="input"
              type="tel"
              inputmode="tel"
              placeholder="+970 59 000 0000"
              required
            />
          </div>

          <!-- Submit action -->
          <div style="display:flex; gap:12px; align-items:center; margin-top:8px; flex-wrap:wrap;">
            <button type="submit" class="btn-primary">
              Finish setup
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- Toasts: status messages (success/error) -->
  <div id="toasts" class="toast-wrap" aria-live="polite" aria-atomic="true"></div>

  <!-- Onboarding behavior (dropdown, validation, submit) -->
  <script src="/static/js/signin.js"></script>
</body>
</html>
