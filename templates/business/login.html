<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <title>Login — Binder Business</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/entity.css" rel="stylesheet">
  <link href="/static/css/login.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="card login-card">
      <!-- Header -->
      <div class="login-header">
        <img src="/static/images/w3.jpg" alt="Binder Logo" />
        <h1>Welcome to Binder</h1>
        <p>Your secure business records assistant</p>
      </div>

      <!-- Terms & Privacy -->
      <div class="terms-box">
        <input id="tr" type="checkbox">
        <label for="tr">
          I agree to the
          <a href="/terms" target="_blank">Terms & Conditions</a>
          and
          <a href="/privacy" target="_blank">Privacy Notice</a>.
        </label>
      </div>

      <!-- Google Login -->
      <div class="auth-section">
        <button id="login-btn" class="btn btn-primary" style="width: 100%;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px; display: inline; margin-right: 8px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v18m0 0l9-9m-9 9l-9-9"/>
          </svg>
          Log in with Google
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">Or</div>

      <!-- Permission Code -->
      <div class="code-section">
        <label for="activationCodeInput">Permission Code</label>
        <div class="code-input-group">
          <input 
            id="activationCodeInput"
            type="text"
            placeholder="XXXX-XXXX-XXXX"
            class="form-input"
          />
          <button id="actvbtn" type="button" class="btn btn-secondary" onclick="checkActivationCode()">
            Activate
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
