<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binder — Clients</title>
  <link rel="icon" href="/static/images/w3.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/entity.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="/static/images/w3.jpg" alt="Binder" class="sidebar-logo">
      <span class="sidebar-brand">Binder</span>
      <button class="sidebar-close" onclick="EntityManager.closeSidebar()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Management</div>
        <a href="/client" class="sidebar-link active">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Clients
        </a>
        <a href="/prod" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          Products
        </a>
        <a href="/service" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Services
        </a>
        <a href="/employee" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Employees
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Overview</div>
        <a href="/stats" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Analytics
        </a>
        <a href="/plan" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 10h20"/></svg>
          Plans
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Account</div>
        <a href="/acc" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Account
        </a>
        <a href="/settings" class="sidebar-link">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </div>
    </nav>
  </aside>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Main Content -->
  <div class="app-container">
    <!-- Top Bar -->
    <header class="top-bar">
      <button id="menu-toggle" class="menu-toggle">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="search-container">
        <input type="text" id="query_input" class="search-input" placeholder="Search clients...">
        <button id="search_btn" class="btn-search" title="Search">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </button>
      </div>
      <button id="add_toggle" class="btn-add">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        <span>Add New</span>
      </button>
    </header>

    <main class="main-content">
      <!-- Page Header -->
      <div class="page-title-row">
        <h1 class="page-title">Clients</h1>
        <p class="page-subtitle">Manage your client database</p>
      </div>

      <!-- Add Form -->
      <section id="add-form" class="add-form-section" style="display:none;">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Add New Client</h2>
            <button class="btn-close" onclick="EntityManager.toggleAddForm()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Client Name *</label>
                <input type="text" id="name" class="form-input" placeholder="Full name">
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="email@example.com">
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" id="phone" class="form-input" placeholder="+1 234 567 8900">
              </div>
              <div class="form-group">
                <label class="form-label">Company</label>
                <input type="text" id="company" class="form-input" placeholder="Company name">
              </div>
              <div class="form-group full-width">
                <label class="form-label">Address</label>
                <input type="text" id="address" class="form-input" placeholder="Full address">
              </div>
              <div class="form-group full-width">
                <label class="form-label">Notes</label>
                <input type="text" id="notes" class="form-input" placeholder="Additional notes...">
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-secondary" onclick="EntityManager.toggleAddForm()">Cancel</button>
              <button id="add_btn" class="btn btn-primary">Add Client</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Results -->
      <section id="results" class="results-section"></section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-content">
        <span class="footer-copyright">© 2026 <span class="footer-brand">Gradicent</span>. All rights reserved.</span>
        <div class="footer-links">
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Toast -->
  <div id="toasts" class="toast-container"></div>

  <script>
    window.__ENTITY_TYPE__ = "client";
    window.__ENTITY_CONFIG__ = {
      apiBase: '/api/binder/clients',
      fields: {
        search: ['name', 'email', 'phone', 'company'],
        add: ['name', 'email', 'phone', 'company', 'address', 'notes'],
        display: ['name', 'email', 'phone', 'company']
      },
      labels: {
        singular: 'Client',
        plural: 'Clients'
      }
    };
  </script>
  <script src="/static/js/entity.js"></script>
</body>
</html>
