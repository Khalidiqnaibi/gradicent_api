<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Binder — Search</title>
  <link rel="icon" href="/static/images/w3.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/css/srch.css" rel="stylesheet">
</head>

<body>
  <!-- Page -->
  <div class="wrap">
    <header class="sitehead">
      <img class="logo" src="/static/images/w3.jpg" alt="Binder" />
      <div>
        <h1 class="title">Client Search</h1>
        <p class="muted text-sm">Find clients, companies, or leads</p>
      </div>
    </header>

    <section class="panel">
      <div id="controls">
        <div class="search-row">
          <!-- Menu Toggle -->
          <div id="menuBar" class="hamburger-menu">
            <label class="menu__btn cursor-pointer">
              <span></span>
            </label>
            <ul class="menu__box">
              <li>
                <a class="menu__item" href="/acc" title="Account">
                  <img class="icoo" src="/static/images/acc.png" alt="Account">
                  <h6>Account</h6>
                </a>
              </li>
              <li>
                <a class="menu__item" href="/home_page" title="Add Client">
                  <img class="icoo" src="/static/images/hoo1.png" alt="Add">
                  <h6>Add Client</h6>
                </a>
              </li>
              <li>
                <a class="menu__item" href="/srch" title="Search Records">
                  <img class="icoo" src="/static/images/sss.png" alt="Search">
                  <h6>Search</h6>
                </a>
              </li>
              <li>
                <a class="menu__item" href="/stats" title="Business Analytics">
                  <img class="icoo" src="/static/images/stst.png" alt="Stats">
                  <h6>Analytics</h6>
                </a>
              </li>
              <li>
                <a id="appa" class="menu__item" href="/appointments" title="Meetings">
                  <img id="appimg" class="icoo" src="/static/images/appoint.png" alt="Meetings">
                  <h6 id="apph6">Meetings</h6>
                </a>
              </li>
              <li class="divider"></li>
              <li>
                <a class="menu__item" href="/settings" title="Settings">
                  <img class="icoo" src="/static/images/sett.png" alt="Settings">
                  <h6>Settings</h6>
                </a>
              </li>
              <li>
                <a class="menu__item" href="/support" title="Support">
                  <img class="icoo" src="/static/images/supp.png" alt="Support">
                  <h6>Support</h6>
                </a>
              </li>
            </ul>
          </div>

          <input
            id="query_input"
            class="search-input"
            placeholder="Client name, phone, company, email, or client ID"
            aria-label="Search clients"
          />
          <button id="search_btn" class="search-btn">Search</button>
        </div>
      </div>

      <div id="results" class="results" aria-live="polite">
        <!-- business search results injected here -->
      </div>
    </section>
  </div>

  <!-- Toasts -->
  <div id="toasts" class="toast-wrap" aria-live="polite"></div>
  <script>
    window.__GAIA_LIST__ = {{ clients | default([]) | tojson | safe }};
    window.__client__ = "{{client}}";
  </script>

  <script src="/static/js/srch.js"></script>

</body>
</html>
