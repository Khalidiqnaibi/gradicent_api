<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Binder — Search</title>
  <link rel="icon" href="/static/images/w3.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/css/srch.css" rel="stylesheet">
</head>

<body>
  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="">
            <h6 class="text-sm font-medium">Add Client</h6>
          </a>
        </li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg bg-[var(--accent)]/30" href="/srch">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments">
            <img class="icoo w-6 h-6" src="/static/images/appoint.png" alt="">
            <h6 class="text-sm font-medium">Meetings</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Page -->
  <div class="wrap">
    <header class="sitehead">
      <img class="logo" src="/static/images/w3.jpg" alt="Binder" />
      <div>
        <h1 class="title">Client Search</h1>
        <p class="muted text-sm">Find clients, companies, or leads</p>
      </div>
    </header>

    <section class="panel">
      <div id="controls">
        <div class="search-row">
          <input
            id="query_input"
            class="search-input"
            placeholder="Client name, phone, company, email, or client ID"
            aria-label="Search clients"
          />
          <button id="search_btn" class="search-btn">Search</button>
        </div>
      </div>

      <div id="results" class="results" aria-live="polite">
        <!-- business search results injected here -->
      </div>
    </section>
  </div>

  <!-- Toasts -->
  <div id="toasts" class="toast-wrap" aria-live="polite"></div>
  <script>
    window.__GAIA_LIST__ = {{ clients | default([]) | tojson | safe }};
  </script>

  <script src="/static/js/srch.js"></script>

</body>
</html>
