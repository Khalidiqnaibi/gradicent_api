    <div id="topp-frame">
        <div class="ree">
            <div class="inpuu">
                <label for="details-entry">Visit Details:</label>
                <input type="text" id="details-entry" class="details-entry">
            </div>
        </div>
        <div class="ll" id="ll">
            <div class="checkbox-wrapper-3">
                <label for="show-date" class="checkbox-label">Date</label>
                <input type="checkbox" id="show-date" onclick="toggleDateEntries()" />
                <label for="show-date" class="toggle"><span></span></label>
            </div>
            <div class="checkbox-wrapper-3">
                <label for="show-visit-info" class="checkbox-label">Visit Info</label>
                <input type="checkbox" id="show-visit-info" onclick="toggleDateEntries()" />
                <label for="show-visit-info" class="toggle"><span></span></label>
            </div>
        </div>
    </div>

    <div id="mm-frame">
        <div id="search-entries">
            <div id="leftl-frame">
                <label for="start-date-entry">Start Date:</label>
                <input type="date" id="start-date-entry" class="date-entry">
            </div>
            <div id="rightr-frame">
                <label for="end-date-entry">End Date:</label>
                <input type="date" id="end-date-entry" class="date-entry">
            </div>
        </div>

        <div id="dropp-frame">
            <div id="left-frame">
                <div class="inpuu">
                    <label for="loc">Location:</label>

                </div>
                <div class="inpuu">
                    <label for="treatment">Treatment:</label>
                    <input type="text" id="treatment" class="input-field">
                </div>
            </div>

            <div id="right-frame">
                <div class="inpuu">
                    <label for="diagnosis">Diagnosis:</label>
                    <input type="text" id="diagnosis" class="input-field">
                </div>
                <div class="inpuu">
                    <label for="lab">Lab:</label>
                    <input type="text" id="lab" class="input-field">
                </div>
            </div>
        </div>
    </div>

            </div>
            <div class="inpuu">

    <script>
        const plan = '{{plan}}';
        let patss = [];

        function toggleDateEntries() {
            const showDateCheckbox = document.getElementById("show-date");
            const showVisitInfoCheckbox = document.getElementById("show-visit-info");
            const droppFrame = document.getElementById("dropp-frame");
            const dateFrame = document.getElementById("search-entries");
            const resultFrame = document.getElementById("result-frame");
            const searchButton = document.getElementById("searchButton");

            if (showDateCheckbox.checked && showVisitInfoCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                dateFrame.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "flex";
                droppFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else if (showDateCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else if (showVisitInfoCheckbox.checked) {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                dateFrame.style.display = "none";
                droppFrame.style.display = "flex";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            } else {
                resultFrame.style.display = "none";
                searchButton.style.display = "none";
                droppFrame.style.display = "none";
                dateFrame.style.display = "none";
                resultFrame.style.display = "flex";
                searchButton.style.display = "block";
            }
        }


        document.addEventListener("DOMContentLoaded", function() {

            if (plan === 'sec') {
                document.getElementById('mo').style.display = 'none';
                document.getElementById('mymyChart').style.display = 'none';
                document.getElementById('result-frame').style.justifyContent = 'center';
            }

            document.getElementById("patients").style.display = 'none';

            document.getElementById("patients").addEventListener("click", function () {
                if (patss.length > 0) {
                    showpats();
                }
            });

            document.getElementById("searchButton").addEventListener("click", function () {
                ssearch();
            });


            const showDateCheckbox = document.getElementById("show-date");
            const showVisitInfoCheckbox = document.getElementById("show-visit-info");
            const droppFrame = document.getElementById("dropp-frame");
            const dateFrame = document.getElementById("search-entries");
            const resultFrame = document.getElementById("result-frame");
            const searchButton = document.getElementById("searchButton");


            resultFrame.style.display = "none";
            searchButton.style.display = "none";
            droppFrame.style.display = "none";
            dateFrame.style.display = "none";
            resultFrame.style.display = "flex";
            searchButton.style.display = "block";

            // Chart.js initialization for financial data
            const cctx = document.getElementById('mymyChart').getContext('2d');
            const mycChart = new Chart(cctx, {
                type: 'line',  // Changed to line chart
                data: {
                    labels: [],  // Empty initially, will be filled with dates
                    datasets: [{
                        label: 'Total Debit',
                        data: [],
                        borderColor: 'rgb(203 163 64)',
                        backgroundColor: 'rgb(255 182 0)',
                        borderWidth: 2
                    }, {
                        label: 'Total Revenue ',
                        data: [],
                        borderColor: 'rgb(96 56 196)',
                        backgroundColor: 'rgb(99 46 234)',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            function updatecChart(patients, searchParams) {
                const visitsData = [];
                const startDate = showDateCheckbox.checked && searchParams.startDate ? new Date(searchParams.startDate) : null;
                const endDate = showDateCheckbox.checked && searchParams.endDate ? new Date(searchParams.endDate) : null;

                patients.forEach(patient => {
                    patient.visits.forEach(visit => {
                        const visitDate = new Date(visit.visit_date);

                        // Check if the visit is within the date range, if provided
                        const isWithinDateRange = (!startDate || visitDate >= startDate) && (!endDate || visitDate <= endDate);

                        // Check if additional search parameters are matched
                        const isDetailsMatched = !searchParams.details || visit.details.includes(searchParams.details);
                        const isLocationMatched = !searchParams.location || patient.location.includes(searchParams.location);
                        const isTreatmentMatched = !searchParams.treatment || visit.treatment.includes(searchParams.treatment);
                        const isDiagnosisMatched = !searchParams.diagnosis || visit.diagnosis.includes(searchParams.diagnosis);
                        const isLabMatched = !searchParams.lab || visit.lab.includes(searchParams.lab);

                        // Add the visit data to the visitsData array if all criteria are met
                        if ((!showDateCheckbox.checked || isWithinDateRange) &&
                            isDetailsMatched &&
                            (!showVisitInfoCheckbox.checked || (isLocationMatched && isTreatmentMatched && isDiagnosisMatched && isLabMatched))) {
                            visitsData.push({
                                visitDate: visitDate.toISOString().split('T')[0]  ,  // Use ISO date string for consistency
                                debit: visit.debit,
                                payed: visit.payed
                            });
                        }
                    });
                });

                // Aggregate data by date
                const aggregatedData = visitsData.reduce((acc, curr) => {
                    if (!acc[curr.visitDate]) {
                        acc[curr.visitDate] = { debit: 0, payed: 0 };
                    }
                    acc[curr.visitDate].debit += parseFloat(curr.debit);
                    acc[curr.visitDate].payed += parseFloat(curr.payed);
                    return acc;
                }, {});

                // Convert aggregated data to arrays for Chart.js
                const labels = Object.keys(aggregatedData);
                const debitData = labels.map(date => aggregatedData[date].debit);
                const payedData = labels.map(date => aggregatedData[date].payed);

                // Sort the dates and associated data
                const sortedData = labels.map(date => ({
                    date: new Date(date),
                    debit: aggregatedData[date].debit,
                    payed: aggregatedData[date].payed
                })).sort((a, b) => a.date - b.date);

                // Extract sorted data
                const sortedLabels = sortedData.map(data => data.date.toISOString().split('T')[0]);
                const sortedDebitData = sortedData.map(data => data.debit);
                const sortedPayedData = sortedData.map(data => data.payed);

                // Update the chart with sorted data
                mycChart.data.labels = sortedLabels;
                mycChart.data.datasets[0].data = sortedDebitData;
                mycChart.data.datasets[1].data = sortedPayedData;
                mycChart.update();
            }

            // Chart.js initialization for patients data
            const ctx = document.getElementById('myChart').getContext('2d');
            const myChart = new Chart(ctx, {
                type: 'bar',  // Changed to line chart
                data: {
                    labels: [],  // Empty initially, will be filled with dates
                    datasets: [{
                        label: 'Total Patients',
                        data: [],
                        borderColor: 'rgb(52 160 196)',
                        backgroundColor: 'rgb(0 191 255)',
                        borderWidth: 2
                    }, {
                        label: 'Patients with Debit',
                        data: [],
                        borderColor: 'rgb(194 56 132)',
                        backgroundColor: 'rgb(252 4 140)',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            function updateChart(patients, searchParams) {
                const datePatientCount = {};
                const datePatientWithDebitCount = {};
                const { startDate, endDate, details, location, treatment, diagnosis, lab } = searchParams;

                // Convert date strings to Date objects for comparison
                const start = showDateCheckbox.checked && startDate ? new Date(startDate) : null;
                const end = showDateCheckbox.checked && endDate ? new Date(endDate) : null;

                // Loop through patients and visits to count the number of patients per date
                patients.forEach(patient => {
                    patient.visits.forEach(visit => {
                        const visitDate = new Date(visit.visit_date);

                        const isWithinDateRange = (!start || visitDate >= start) && (!end || visitDate <= end);

                        // Check if visit date is within the specified time period
                        if (!showDateCheckbox.checked || isWithinDateRange) {
                            // Check if the other search parameters match (if filled)
                            if ((!details || visit.details.includes(details)) &&
                                (!showVisitInfoCheckbox.checked || (!location || patient.location.includes(location)) &&
                                (!treatment || visit.treatment.includes(treatment)) &&
                                (!diagnosis || visit.diagnosis.includes(diagnosis)) &&
                                (!lab || visit.lab.includes(lab)))) {

                                const dateString = visitDate.toISOString().split('T')[0];

                                // Initialize counters if date is not already present
                                if (!datePatientCount[dateString]) {
                                    datePatientCount[dateString] = 0;
                                    datePatientWithDebitCount[dateString] = 0;
                                }

                                // Count total patients per date
                                datePatientCount[dateString]++;

                                // Count patients with debit per date
                                if (visit.debit > 0) {
                                    datePatientWithDebitCount[dateString]++;
                                }
                            }
                        }
                    });
                });

                // Convert counts object to arrays and sort by date
                const sortedDates = Object.keys(datePatientCount).map(date => ({
                    date: new Date(date),
                    totalPatients: datePatientCount[date],
                    patientsWithDebit: datePatientWithDebitCount[date]
                })).sort((a, b) => a.date - b.date);

                // Extract sorted data
                const labels = sortedDates.map(data => data.date.toISOString().split('T')[0]);
                const totalPatientsData = sortedDates.map(data => data.totalPatients);
                const patientsWithDebitData = sortedDates.map(data => data.patientsWithDebit);

                // Update the chart with the sorted data
                myChart.data.labels = labels;
                myChart.data.datasets[0].data = totalPatientsData;
                myChart.data.datasets[1].data = patientsWithDebitData;
                myChart.update();
            }

            function getSearchParams() {
                return {
                    startDate: document.getElementById("start-date-entry").value,
                    endDate: document.getElementById("end-date-entry").value,
                    details: document.getElementById("details-entry").value,
                    location: document.getElementById("loc").value,
                    treatment: document.getElementById("treatment").value,
                    diagnosis: document.getElementById("diagnosis").value,
                    lab: document.getElementById("lab").value,
                    showDate: showDateCheckbox.checked,
                    showVisitInfo: showVisitInfoCheckbox.checked
                };
            }

            function showpats() {
                window.location.href = `/search_stats`;
            }
            // Search functionality
            function ssearch() {
                const searchParams = getSearchParams();

                fetch('/ssearch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(searchParams)
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data)
                    document.getElementById('totalPatients').value = data.total_customers;
                    document.getElementById('patientsWithDebit').value = data.unpaid_customers;
                    document.getElementById('totalDebit').value = data.total_debit;
                    document.getElementById('totalPayed').value = data.total_payed;
                    document.getElementById("patients").style.display = 'block';
                    patss = data.patients;

                    // Update charts with only the patients returned from the search
                    updateChart(data.patients, getSearchParams());
                    updatecChart(data.patients, getSearchParams());
                })
                .catch(error => console.error('Error:', error));
            }

        });

    </script>

</body>
</html>
