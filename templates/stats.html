<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/static/images/w3.jpg">
  <title>Binder Medical</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg-main: #D9C4B0;
      --accent:  #ce7a35;
      --secondary:#78cee6;
      --w: white;
      --text: #2b2b2b;
    }

    /* Global layout fixes to prevent overflow */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--bg-main) 0%, #E6D6C0 60%);
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      margin: 0;
    }

    /* Hamburger + slide menu */
    .menu__btn span,
    .menu__btn span::before,
    .menu__btn span::after {
      display:block;
      width:26px;
      height:3px;
      background:var(--accent);
      border-radius:6px;
      transition:0.28s ease;
      position:relative;
    }
    .menu__btn span::before,
    .menu__btn span::after { content:""; position:absolute; left:0; }
    .menu__btn span::before { top:-8px; }
    .menu__btn span::after { top:8px; }

    .menu__box {
      transition: transform 0.28s cubic-bezier(.2,.9,.2,1), opacity .22s;
      transform: translateX(-110%);
      opacity: 0;
    }
    .menu-active .menu__box {
      transform: translateX(0);
      opacity: 1;
    }
    .menu-active .menu__btn span { transform: rotate(45deg); background:var(--accent); }
    .menu-active .menu__btn span::before { top:0; transform: rotate(90deg); }
    .menu-active .menu__btn span::after { opacity:0; }

    /* Small niceties for chart canvases in older CSS-only layout */
    canvas { border-radius: 10px; }

    /* Toggle styles tuned to palette */
    .checkbox-wrapper-3 .toggle:before {
      background: #9A9999;
    }
    .checkbox-wrapper-3 #show-date:checked + .toggle:before,
    .checkbox-wrapper-3 #show-visit-info:checked + .toggle:before {
      background: var(--secondary);
    }
    .checkbox-wrapper-3 #show-date:checked + .toggle span,
    .checkbox-wrapper-3 #show-visit-info:checked + .toggle span {
      background: #fff;
      transform: translateX(20px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    /* Decorative card style */
    .decorative-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,255,255,0.68));
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 8px 28px rgba(18,18,18,0.06);
    }
    main {
        max-height: 100%;
        overflow-y: auto;
    }
  </style>
</head>
<body>

  <!-- Menu -->
  <div id="menuBar" class="fixed top-4 left-4 z-50">
    <div class="hamburger-menu p-2">
      <label class="menu__btn cursor-pointer inline-flex items-center justify-center p-2 rounded-lg">
        <span></span>
      </label>

      <ul class="menu__box absolute mt-3 left-0 w-64 bg-[var(--bg-main)]/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 space-y-2 border border-[var(--secondary)]">
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/acc" title="Account">
            <img class="icoo w-6 h-6" src="/static/images/acc.png" alt="Account">
            <h6 class="text-sm font-medium">Account</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/home_page" title="Add">
            <img class="icoo w-6 h-6" src="/static/images/hoo.png" alt="Add">
            <h6 class="text-sm font-medium">Add</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/srch" title="Search">
            <img class="icoo w-6 h-6" src="/static/images/sss.png" alt="Search">
            <h6 class="text-sm font-medium">Search</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/stats" title="Stats">
            <img class="icoo w-6 h-6" src="/static/images/stst.png" alt="Stats">
            <h6 class="text-sm font-medium">Stats</h6>
          </a>
        </li>
        <li>
          <a id="appa" class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/appointments" title="Appointments">
            <img id="appimg" class="icoo w-6 h-6" src="/static/images/appoint.png" alt="Appointments">
            <h6 id="apph6" class="text-sm font-medium">Appointments</h6>
          </a>
        </li>

        <li class="border-t border-[var(--secondary)] my-1"></li>

        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/settings" title="Settings">
            <img class="icoo w-6 h-6" src="/static/images/sett.png" alt="Settings">
            <h6 class="text-sm font-medium">Settings</h6>
          </a>
        </li>
        <li>
          <a class="menu__item flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--accent)]/35 transition" href="/support" title="Support">
            <img class="icoo w-6 h-6" src="/static/images/supp.png" alt="Support">
            <h6 class="text-sm font-medium">Support</h6>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Page content container -->
  <main class="min-h-screen flex flex-col items-center pt-24 px-6 pb-12">

    <!-- Controls (top area) -->
    <section id="topp-frame" class="w-full max-w-4xl mb-6">
      <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-4 decorative-card border border-[rgba(0,0,0,0.04)] shadow-sm">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div class="flex-1">
            <label for="details-entry" class="block text-sm font-semibold mb-1">Visit Details</label>
            <input id="details-entry" type="text" class="w-full rounded-xl px-4 py-2 border border-[var(--secondary)] focus:ring-2 focus:ring-[var(--accent)] bg-white/90" placeholder="Search inside visit details..." />
          </div>

          <div class="flex items-center gap-4">
            <div class="checkbox-wrapper-3 flex items-center gap-2">
              <label for="show-date" class="text-sm">Date</label>
              <input type="checkbox" id="show-date" class="hidden" />
              <label for="show-date" class="toggle inline-block w-10 h-6 rounded-full bg-gray-300 relative cursor-pointer">
                <span class="block absolute left-0 top-0 w-6 h-6 rounded-full bg-white shadow-md transition-transform"></span>
              </label>
            </div>

            <div class="checkbox-wrapper-3 flex items-center gap-2">
              <label for="show-visit-info" class="text-sm">Visit Info</label>
              <input type="checkbox" id="show-visit-info" class="hidden" />
              <label for="show-visit-info" class="toggle inline-block w-10 h-6 rounded-full bg-gray-300 relative cursor-pointer">
                <span class="block absolute left-0 top-0 w-6 h-6 rounded-full bg-white shadow-md transition-transform"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Search options (dates / visit info) -->
    <section id="mm-frame" class="w-full max-w-4xl mb-6">
      <div id="search-entries" class="hidden bg-white/70 backdrop-blur-sm rounded-2xl p-4 mb-4 border border-[rgba(0,0,0,0.04)]">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1" for="start-date-entry">Start Date</label>
            <input id="start-date-entry" type="date" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1" for="end-date-entry">End Date</label>
            <input id="end-date-entry" type="date" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
          </div>
        </div>
      </div>

      <div id="dropp-frame" class="hidden bg-white/70 backdrop-blur-sm rounded-2xl p-4 mb-4 border border-[rgba(0,0,0,0.04)]">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1" for="loc">Location</label>
            <input id="loc" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
            <label class="block text-sm font-semibold mt-3 mb-1" for="treatment">Treatment</label>
            <input id="treatment" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
          </div>

          <div>
            <label class="block text-sm font-semibold mb-1" for="diagnosis">Diagnosis</label>
            <input id="diagnosis" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
            <label class="block text-sm font-semibold mt-3 mb-1" for="lab">Lab</label>
            <input id="lab" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90 focus:ring-2 focus:ring-[var(--accent)]" />
          </div>
        </div>
      </div>
    </section>

    <!-- Results summary -->
    <section id="result-frame" class="w-full max-w-4xl bg-white/85 backdrop-blur-sm rounded-2xl p-4 mb-6 border border-[rgba(0,0,0,0.04)] flex flex-col sm:flex-row gap-4 justify-between">
      <div class="flex flex-col gap-3 w-full sm:w-1/2">
        <div>
          <label class="block text-sm font-semibold mb-1" for="totalPatients">Total Patients</label>
          <input id="totalPatients" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90" readonly />
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1" for="patientsWithDebit">Patients With Debit</label>
          <input id="patientsWithDebit" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90" readonly />
        </div>
      </div>

      <div id="mo" class="flex flex-col gap-3 w-full sm:w-1/2">
        <div>
          <label class="block text-sm font-semibold mb-1" for="totalDebit">Total Debit</label>
          <input id="totalDebit" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90" readonly />
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1" for="totalPayed">Total Revenue</label>
          <input id="totalPayed" type="text" class="w-full rounded-xl px-3 py-2 border border-[var(--secondary)] bg-white/90" readonly />
        </div>
      </div>
    </section>

    <!-- Charts -->
    <section id="chart-frame" class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
      <div class="bg-white/85 p-4 rounded-2xl border border-[rgba(0,0,0,0.04)]">
        <canvas id="myChart" height="220"></canvas>
      </div>
      <div class="bg-white/85 p-4 rounded-2xl border border-[rgba(0,0,0,0.04)]">
        <canvas id="mymyChart" height="220"></canvas>
      </div>
    </section>

    <!-- Actions -->
    <div class="lmaooo flex gap-4">
      <button id="patients" class="px-4 py-2 rounded-xl bg-[var(--secondary)] text-white font-semibold shadow-md hidden">See patients</button>
      <button id="searchButton" class="px-4 py-2 rounded-xl bg-[var(--accent)] text-[var(--text)] font-semibold shadow-md hidden">Search</button>
    </div>
  </main>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Page JS (keeps original logic & endpoints; chart colors updated to theme) -->
  <script>
    const plan = '{{plan}}';
    let patss = [];

    setInterval(() => {
      fetch("/track_time", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({seconds: 60})
      });
    }, 60000); // log 1 min active time

    /* Utility: convert hex to rgba string */
    function hexToRgba(hex, alpha=1) {
      if (!hex) return `rgba(0,0,0,${alpha})`;
      const h = hex.replace('#','').trim();
      const bigint = parseInt(h.length === 3 ? h.split('').map(ch=>ch+ch).join('') : h, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function toggleDateEntries() {
      const showDateCheckbox = document.getElementById("show-date");
      const showVisitInfoCheckbox = document.getElementById("show-visit-info");
      const droppFrame = document.getElementById("dropp-frame");
      const dateFrame = document.getElementById("search-entries");
      const resultFrame = document.getElementById("result-frame");
      const searchButton = document.getElementById("searchButton");

      if (showDateCheckbox.checked && showVisitInfoCheckbox.checked) {
        dateFrame.classList.remove('hidden');
        droppFrame.classList.remove('hidden');
        resultFrame.classList.remove('hidden');
        searchButton.classList.remove('hidden');
      } else if (showDateCheckbox.checked) {
        dateFrame.classList.remove('hidden');
        droppFrame.classList.add('hidden');
        resultFrame.classList.remove('hidden');
        searchButton.classList.remove('hidden');
      } else if (showVisitInfoCheckbox.checked) {
        dateFrame.classList.add('hidden');
        droppFrame.classList.remove('hidden');
        resultFrame.classList.remove('hidden');
        searchButton.classList.remove('hidden');
      } else {
        dateFrame.classList.add('hidden');
        droppFrame.classList.add('hidden');
        resultFrame.classList.remove('hidden');
        searchButton.classList.remove('hidden');
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const menuBtn = document.querySelector('.hamburger-menu');
      const menuBar = document.getElementById('menuBar');

      // Toggle menu and spin transition
      menuBtn.addEventListener('click', () => {
        menuBar.classList.toggle('menu-active');
      });

      if (plan === 'sec') {
        document.getElementById('mo').style.display = 'none';
        document.getElementById('mymyChart').style.display = 'none';
        document.getElementById('result-frame').style.justifyContent = 'center';
      }

      document.getElementById("patients").style.display = 'none';

      document.getElementById("patients").addEventListener("click", function () {
        if (patss.length > 0) {
          showpats();
        }
      });

      document.getElementById("searchButton").addEventListener("click", function () {
        ssearch();
      });

      const showDateCheckbox = document.getElementById("show-date");
      const showVisitInfoCheckbox = document.getElementById("show-visit-info");

      const droppFrame = document.getElementById("dropp-frame");
      const dateFrame = document.getElementById("search-entries");
      const resultFrame = document.getElementById("result-frame");
      const searchButton = document.getElementById("searchButton");

      // initial visibility (use the toggle function so behavior is centralized)
      // Attach listeners to the checkboxes so the UI updates when the user toggles them
      showDateCheckbox.addEventListener('change', toggleDateEntries);
      showVisitInfoCheckbox.addEventListener('change', toggleDateEntries);

      // call once at load to set the correct visibility based on initial checkbox state
      toggleDateEntries();

      // Chart.js initialization for financial data (themed)
      const styles = getComputedStyle(document.documentElement);
      const accent = styles.getPropertyValue('--accent').trim() || '#BBDCE5';
      const secondary = styles.getPropertyValue('--secondary').trim() || '#CFAB8D';
      const bgMain = styles.getPropertyValue('--bg-main').trim() || '#D9C4B0';
      const textColor = styles.getPropertyValue('--text').trim() || '#2b2b2b';

      const cctx = document.getElementById('mymyChart').getContext('2d');
      const lineGradDebit = cctx.createLinearGradient(0, 0, 0, 220);
      lineGradDebit.addColorStop(0, hexToRgba(secondary, 0.92));
      lineGradDebit.addColorStop(1, hexToRgba(secondary, 0.08));

      const lineGradPayed = cctx.createLinearGradient(0, 0, 0, 220);
      lineGradPayed.addColorStop(0, hexToRgba(accent, 0.95));
      lineGradPayed.addColorStop(1, hexToRgba(accent, 0.08));

      const mycChart = new Chart(cctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Total Debit',
            data: [],
            borderColor: hexToRgba(secondary, 1),
            backgroundColor: lineGradDebit,
            borderWidth: 2,
            tension: 0.28,
            pointRadius: 3,
            pointHoverRadius: 6,
            fill: true
          }, {
            label: 'Total Revenue',
            data: [],
            borderColor: hexToRgba(accent, 1),
            backgroundColor: lineGradPayed,
            borderWidth: 2,
            tension: 0.28,
            pointRadius: 3,
            pointHoverRadius: 6,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: textColor, boxWidth: 12, boxHeight: 6, padding: 12 }
            },
            tooltip: {
              titleColor: textColor,
              bodyColor: textColor,
              backgroundColor: '#ffffff',
              borderColor: hexToRgba(accent, 0.9),
              borderWidth: 1,
              padding: 10,
              usePointStyle: true
            }
          },
          scales: {
            x: {
              ticks: { color: textColor },
              grid: { color: 'rgba(0,0,0,0.04)' }
            },
            y: {
              ticks: { color: textColor },
              grid: { color: 'rgba(0,0,0,0.04)' },
              beginAtZero: true
            }
          }
        }
      });

      function updatecChart(patients, searchParams) {
        const visitsData = [];
        const startDate = showDateCheckbox.checked && searchParams.startDate ? new Date(searchParams.startDate) : null;
        const endDate = showDateCheckbox.checked && searchParams.endDate ? new Date(searchParams.endDate) : null;

        patients.forEach(patient => {
          (patient.visits || []).forEach(visit => {
            const visitDate = new Date(visit.visit_date);
            const isWithinDateRange = (!startDate || visitDate >= startDate) && (!endDate || visitDate <= endDate);
            const isDetailsMatched = !searchParams.details || (visit.details || "").includes(searchParams.details);
            const isLocationMatched = !searchParams.location || (patient.location || "").includes(searchParams.location);
            const isTreatmentMatched = !searchParams.treatment || (visit.treatment || "").includes(searchParams.treatment);
            const isDiagnosisMatched = !searchParams.diagnosis || (visit.diagnosis || "").includes(searchParams.diagnosis);
            const isLabMatched = !searchParams.lab || (visit.lab || "").includes(searchParams.lab);

            if ((!showDateCheckbox.checked || isWithinDateRange) &&
                isDetailsMatched &&
                (!showVisitInfoCheckbox.checked || (isLocationMatched && isTreatmentMatched && isDiagnosisMatched && isLabMatched))) {
              visitsData.push({
                visitDate: visitDate.toISOString().split('T')[0],
                debit: parseFloat(visit.debit || 0),
                payed: parseFloat(visit.payed || 0)
              });
            }
          });
        });

        const aggregated = visitsData.reduce((acc, curr) => {
          acc[curr.visitDate] = acc[curr.visitDate] || { debit: 0, payed: 0 };
          acc[curr.visitDate].debit += curr.debit;
          acc[curr.visitDate].payed += curr.payed;
          return acc;
        }, {});

        const sorted = Object.keys(aggregated).map(d => ({ date: new Date(d), debit: aggregated[d].debit, payed: aggregated[d].payed }))
          .sort((a,b) => a.date - b.date);

        mycChart.data.labels = sorted.map(s => s.date.toISOString().split('T')[0]);
        mycChart.data.datasets[0].data = sorted.map(s => s.debit);
        mycChart.data.datasets[1].data = sorted.map(s => s.payed);
        mycChart.update();
      }

      // Bar chart (patient counts)
      const ctx = document.getElementById('myChart').getContext('2d');

      // Create bar gradients
      const barGradA = ctx.createLinearGradient(0, 0, 0, 220);
      barGradA.addColorStop(0, hexToRgba(accent, 0.95));
      barGradA.addColorStop(1, hexToRgba(accent, 0.12));

      const barGradB = ctx.createLinearGradient(0, 0, 0, 220);
      barGradB.addColorStop(0, hexToRgba(secondary, 0.95));
      barGradB.addColorStop(1, hexToRgba(secondary, 0.12));

      const myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{
            label: 'Total Patients',
            data: [],
            borderColor: hexToRgba(accent, 1),
            backgroundColor: barGradA,
            borderWidth: 1
          }, {
            label: 'Patients with Debit',
            data: [],
            borderColor: hexToRgba(secondary, 1),
            backgroundColor: barGradB,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: textColor, boxWidth: 12, boxHeight: 6, padding: 12 }
            },
            tooltip: {
              titleColor: textColor,
              bodyColor: textColor,
              backgroundColor: '#ffffff',
              borderColor: hexToRgba(secondary, 0.9),
              borderWidth: 1,
              padding: 10
            }
          },
          scales: {
            x: {
              ticks: { color: textColor },
              grid: { color: 'rgba(0,0,0,0.04)' }
            },
            y: {
              ticks: { color: textColor },
              grid: { color: 'rgba(0,0,0,0.04)' },
              beginAtZero: true
            }
          }
        }
      });

      function updateChart(patients, searchParams) {
        const datePatientCount = {};
        const datePatientWithDebitCount = {};
        const { startDate, endDate, details, location, treatment, diagnosis, lab } = searchParams;
        const start = showDateCheckbox.checked && startDate ? new Date(startDate) : null;
        const end = showDateCheckbox.checked && endDate ? new Date(endDate) : null;

        patients.forEach(patient => {
          (patient.visits || []).forEach(visit => {
            const visitDate = new Date(visit.visit_date);
            const isWithinDateRange = (!start || visitDate >= start) && (!end || visitDate <= end);

            if (!showDateCheckbox.checked || isWithinDateRange) {
              if ((!details || (visit.details || "").includes(details)) &&
                  (!showVisitInfoCheckbox.checked || (!location || (patient.location || "").includes(location)) &&
                   (!treatment || (visit.treatment || "").includes(treatment)) &&
                   (!diagnosis || (visit.diagnosis || "").includes(diagnosis)) &&
                   (!lab || (visit.lab || "").includes(lab)))) {

                const dStr = visitDate.toISOString().split('T')[0];
                datePatientCount[dStr] = (datePatientCount[dStr] || 0) + 1;
                if ((visit.debit || 0) > 0) datePatientWithDebitCount[dStr] = (datePatientWithDebitCount[dStr] || 0) + 1;
              }
            }
          });
        });

        const sortedDates = Object.keys(datePatientCount).map(date => ({
          date: new Date(date),
          totalPatients: datePatientCount[date],
          patientsWithDebit: datePatientWithDebitCount[date] || 0
        })).sort((a,b) => a.date - b.date);

        myChart.data.labels = sortedDates.map(d => d.date.toISOString().split('T')[0]);
        myChart.data.datasets[0].data = sortedDates.map(d => d.totalPatients);
        myChart.data.datasets[1].data = sortedDates.map(d => d.patientsWithDebit);
        myChart.update();
      }

      function getSearchParams() {
        return {
          startDate: document.getElementById("start-date-entry").value,
          endDate: document.getElementById("end-date-entry").value,
          details: document.getElementById("details-entry").value,
          location: document.getElementById("loc").value,
          treatment: document.getElementById("treatment").value,
          diagnosis: document.getElementById("diagnosis").value,
          lab: document.getElementById("lab").value,
          showDate: showDateCheckbox.checked,
          showVisitInfo: showVisitInfoCheckbox.checked
        };
      }

      function showpats() {
        window.location.href = `/search_stats`;
      }

      function ssearch() {
        const searchParams = getSearchParams();
        fetch('/ssearch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(searchParams)
        })
        .then(response => response.json())
        .then(data => {
          document.getElementById('totalPatients').value = data.total_customers;
          document.getElementById('patientsWithDebit').value = data.unpaid_customers;
          document.getElementById('totalDebit').value = data.total_debit;
          document.getElementById('totalPayed').value = data.total_payed;
          document.getElementById("patients").style.display = 'block';
          patss = data.patients || [];

          updateChart(patss, getSearchParams());
          updatecChart(patss, getSearchParams());
        })
        .catch(error => {
          console.error('Error:', error);
          alert('Search failed — see console for details.');
        });
      }

    }); // DOMContentLoaded
  </script>
</body>
</html>
